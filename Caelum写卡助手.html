<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Caelum写卡助手</title>
<style>
  :root, [data-theme="dark"] {
    --bg:#0f1117; --surface:#1a1d27; --surface2:#22263a; --border:#2e3350;
    --accent:#7c6af7; --accent2:#5eead4; --text:#e2e8f0; --text-muted:#7c8bad;
    --danger:#f87171; --success:#4ade80; --warning:#fbbf24;
    --shadow:rgba(0,0,0,.45); --scrollbar:#2e3350; --badge-text:#fff;
    --ai-user:#7c6af7; --ai-bot:#5eead4;
  }
  [data-theme="light"] {
    --bg:#f0f2f8; --surface:#fff; --surface2:#eef0f8; --border:#d0d5e8;
    --accent:#5b4fd4; --accent2:#0d9488; --text:#1e2240; --text-muted:#6b7280;
    --danger:#dc2626; --success:#16a34a; --warning:#d97706;
    --shadow:rgba(0,0,0,.12); --scrollbar:#c5cae0; --badge-text:#fff;
    --ai-user:#5b4fd4; --ai-bot:#0d9488;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--bg);color:var(--text);
    font-family:'Segoe UI','PingFang SC','Helvetica Neue',sans-serif;
    height:100vh;overflow:hidden;display:flex;flex-direction:column;
    transition:background .25s,color .25s;
  }

  /* Header */
  header{
    background:var(--surface);border-bottom:1px solid var(--border);
    padding:0 20px;height:52px;flex-shrink:0;display:flex;align-items:center;gap:12px;
    z-index:200;box-shadow:0 2px 8px var(--shadow);
    transition:background .25s,border-color .25s,box-shadow .25s;
  }
  header h1{font-size:1.05rem;font-weight:700;letter-spacing:.03em;white-space:nowrap}
  header h1 span{color:var(--accent)}
  .header-logo{font-size:1.4rem;line-height:1}
  .header-actions{margin-left:auto;display:flex;align-items:center;gap:7px}
  .theme-toggle{display:flex;align-items:center;background:var(--surface2);border:1px solid var(--border);border-radius:18px;padding:2px;gap:1px}
  .theme-btn{display:flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:14px;border:none;cursor:pointer;font-size:.8rem;background:transparent;color:var(--text-muted);transition:background .18s,color .18s}
  .theme-btn.active{background:var(--accent);color:#fff}
  .theme-divider{width:1px;height:18px;background:var(--border);margin:0 3px}

  /* Buttons */
  .btn{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;border-radius:7px;border:none;font-size:.8rem;font-weight:600;cursor:pointer;white-space:nowrap;transition:filter .15s,transform .1s,background .2s}
  .btn:hover{filter:brightness(1.12)} .btn:active{transform:scale(.96)}
  .btn-primary{background:var(--accent);color:#fff}
  .btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
  .btn-danger{background:color-mix(in srgb,var(--danger) 15%,var(--surface2));color:var(--danger);border:1px solid color-mix(in srgb,var(--danger) 35%,var(--border))}
  .btn-success{background:color-mix(in srgb,var(--success) 15%,var(--surface2));color:var(--success);border:1px solid color-mix(in srgb,var(--success) 35%,var(--border))}
  .btn-warning{background:color-mix(in srgb,var(--warning) 15%,var(--surface2));color:var(--warning);border:1px solid color-mix(in srgb,var(--warning) 35%,var(--border))}
  .btn-sm{padding:4px 9px;font-size:.74rem}
  .btn-xs{padding:3px 7px;font-size:.68rem;border-radius:5px}

  /* Workspace */
  .workspace{display:flex;flex:1;min-height:0;overflow:hidden}
  .workspace-vdivider{width:5px;flex-shrink:0;background:var(--border);cursor:col-resize;position:relative;transition:background .15s;z-index:10}
  .workspace-vdivider:hover,.workspace-vdivider.dragging{background:var(--accent)}
  .workspace-vdivider::after{content:'';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:3px;height:30px;border-radius:2px;background:var(--text-muted);opacity:.4}

  /* Editor Panel */
  .editor-panel{flex:1;min-width:280px;display:flex;flex-direction:column;min-height:0;overflow:hidden;background:var(--bg);transition:background .25s}
  .editor-toolbar{background:var(--surface);border-bottom:1px solid var(--border);padding:6px 14px;display:flex;align-items:center;gap:8px;row-gap:4px;flex-shrink:0;flex-wrap:wrap;min-height:34px;font-size:.73rem;color:var(--text-muted)}
  .editor-body{flex:1;min-height:0;overflow:hidden;display:flex;flex-direction:column}

  /* Bottom Tabs */
  .bottom-tabs{background:var(--surface);border-top:1px solid var(--border);padding:0 10px;display:flex;align-items:center;gap:1px;flex-shrink:0;height:38px;transition:background .25s,border-color .25s}
  .bottom-tab{padding:5px 12px;font-size:.74rem;font-weight:600;cursor:pointer;color:var(--text-muted);border:none;background:transparent;border-bottom:3px solid transparent;transition:color .15s,border-color .15s;white-space:nowrap;border-radius:0}
  .bottom-tab.active{color:var(--accent2);border-bottom-color:var(--accent2)}
  .bottom-tab:hover:not(.active){color:var(--text)}

  /* Editor Panes */
  .editor-pane{display:none;flex:1;flex-direction:column;min-height:0;overflow-y:auto}
  .editor-pane.active{display:flex}

  /* Two-panel split (preset/wb/regex) */
  .editor-split{display:flex;flex:1;min-height:0;overflow:hidden}
  .editor-list-panel{width:272px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column;min-height:0;overflow:hidden;background:color-mix(in srgb,var(--surface) 70%,var(--bg))}
  .editor-list-header{padding:8px 10px;border-bottom:1px solid var(--border);font-size:.7rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
  .editor-list-body{flex:1;overflow-y:auto;padding:4px}
  .editor-detail-panel{flex:1;min-height:0;overflow-y:auto;padding:14px 18px;display:flex;flex-direction:column;gap:12px}

  /* Entry items */
  .entry-item{display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:6px;cursor:pointer;border:1px solid transparent;margin-bottom:2px;transition:background .12s,border-color .12s;user-select:none;font-size:.75rem}
  .entry-item:hover{background:var(--surface2)}
  .entry-item.active{background:var(--surface2);border-color:var(--accent)}
  .entry-item.drag-over{border-color:var(--accent2);background:color-mix(in srgb,var(--accent2) 10%,var(--surface2))}
  .drag-handle{cursor:grab;color:var(--text-muted);font-size:.7rem;flex-shrink:0}
  .drag-handle:active{cursor:grabbing}

  /* ── Preset Batch Mode ── */
  .entry-item.pb-checked{background:color-mix(in srgb,var(--accent) 15%,var(--surface2));border-color:var(--accent)}
  .entry-item .pb-cb{width:13px;height:13px;accent-color:var(--accent);cursor:pointer;flex-shrink:0;margin:0;opacity:0;transition:opacity .12s}
  .entry-item.pb-show-cb .pb-cb{opacity:1}
  .entry-item.pb-show-cb .drag-handle{opacity:.4}
  .pb-batch-bar{display:flex;align-items:center;gap:6px;padding:4px 10px;background:color-mix(in srgb,var(--accent) 8%,var(--surface));border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
  .pb-batch-bar .pb-batch-count{font-size:.68rem;color:var(--text-muted);margin-right:4px}
  .pb-batch-bar .pb-batch-btn{font-size:.65rem;padding:2px 8px;border-radius:4px;border:none;cursor:pointer;font-weight:600;transition:all .12s;white-space:nowrap}
  .pb-batch-bar .pb-batch-btn:hover{filter:brightness(1.12)}
  .pb-batch-bar .pb-batch-btn:disabled{opacity:.4;cursor:default}
  .editor-list-header.pb-header{background:color-mix(in srgb,var(--accent) 10%,var(--surface))}

  /* Right Panel */
  .right-panel{width:360px;min-width:180px;flex-shrink:0;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;min-height:0;overflow:hidden;transition:background .25s,border-color .25s}
  .right-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
  .right-tab{flex:1;padding:8px 6px;font-size:.71rem;font-weight:600;text-align:center;cursor:pointer;color:var(--text-muted);border:none;background:transparent;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;white-space:nowrap}
  .right-tab.active{color:var(--accent2);border-bottom-color:var(--accent2)}
  .right-tab:hover:not(.active){color:var(--text)}
  .right-pane{display:none;flex:1;flex-direction:column;min-height:0;overflow:hidden}
  .right-pane.active{display:flex}

  /* JSON Preview */
  .preview-body{flex:1;overflow-y:auto;padding:12px}
  .preview-body pre{font-family:'Cascadia Code','Fira Code','Consolas',monospace;font-size:.72rem;line-height:1.65;color:var(--accent2);white-space:pre-wrap;word-break:break-all;transition:color .25s}

  /* AI Assistant */
  .ai-config-bar{padding:8px 10px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .ai-config-bar input,.ai-config-bar select{width:auto;font-size:.7rem;padding:4px 7px;min-width:0}
  .ai-config-bar input[type="password"]{width:130px}
  .ai-config-bar input[type="text"]{width:150px}
  .ai-chat-area{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px}
  .ai-msg{max-width:95%;padding:8px 11px;border-radius:10px;font-size:.76rem;line-height:1.55;white-space:pre-wrap;word-break:break-word;animation:fadeIn .2s}
  .ai-msg.user{align-self:flex-end;background:var(--ai-user);color:#fff;border-bottom-right-radius:3px;margin-left:20px}
  .ai-msg.assistant{align-self:flex-start;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-bottom-left-radius:3px;margin-right:20px}
  .ai-msg.system{font-size:.7rem;color:var(--text-muted);align-self:center;text-align:center;background:transparent;padding:4px}
  @keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
  .ai-input-row{display:flex;gap:6px;padding:8px 10px;border-top:1px solid var(--border);flex-shrink:0}
  .ai-input-row textarea{flex:1;min-height:40px;max-height:80px;font-size:.76rem;resize:none;padding:7px 10px}
  .ai-loading{display:flex;align-items:center;gap:6px;padding:8px;font-size:.72rem;color:var(--text-muted)}
  .ai-loading .spinner{width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* Form Elements */
  .field-group{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:13px;transition:background .25s,border-color .25s}
  .field-group>label,.field-group>.group-label{display:block;font-size:.72rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:9px;font-weight:700}
  .sub-label{font-size:.71rem;color:var(--text-muted);margin-bottom:4px;display:block}
  input[type="text"],input[type="number"],input[type="password"],select,textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:inherit;font-size:.84rem;padding:7px 10px;outline:none;transition:border-color .15s,background .25s,color .25s}
  input:focus,select:focus,textarea:focus{border-color:var(--accent)}
  textarea{resize:vertical;min-height:90px;font-family:'Cascadia Code','Fira Code',monospace;font-size:.78rem;line-height:1.6;background-image:linear-gradient(to top,color-mix(in srgb,var(--border) 6%,transparent) 0%,transparent 18px);background-repeat:no-repeat;background-position:bottom;transition:background .2s,border-color .15s}
  textarea:focus{background-image:linear-gradient(to top,color-mix(in srgb,var(--accent) 10%,transparent) 0%,transparent 18px)}
  textarea::-webkit-resizer{border-width:6px;border-style:solid;border-color:transparent var(--text-muted) var(--text-muted) transparent;opacity:.35;transition:opacity .2s}
  textarea:hover::-webkit-resizer{opacity:.7}
  textarea.short{min-height:45px}
  select option{background:var(--surface2);color:var(--text)}
  .field-row{display:flex;gap:10px}.field-row>*{flex:1}
  .checkbox-row{display:flex;align-items:center;gap:8px;padding:2px 0}
  .checkbox-row input[type="checkbox"]{width:14px;height:14px;accent-color:var(--accent);cursor:pointer;flex-shrink:0}
  .checkbox-row label{margin:0;text-transform:none;letter-spacing:0;font-size:.81rem;color:var(--text);cursor:pointer}
  .param-label{font-size:.7rem;color:var(--text-muted);margin-bottom:4px;display:flex;align-items:center;gap:4px}
  .param-label span{font-weight:700}
  .param-hint{font-size:.65rem;color:var(--text-muted);opacity:.75;margin-top:2px}
  .slider-row{display:flex;align-items:center;gap:7px}
  .slider-row input[type="range"]{flex:1;accent-color:var(--accent);height:4px;padding:0;border:none;background:transparent;cursor:pointer}
  .slider-row input[type="number"]{width:60px;flex-shrink:0;padding:4px 6px;font-size:.78rem;text-align:center}
  .param-section{background:var(--surface);border:1px solid var(--border);border-radius:9px;overflow:hidden;transition:background .25s,border-color .25s}
  .param-section-header{padding:7px 11px;background:color-mix(in srgb,var(--accent) 8%,var(--surface));border-bottom:1px solid var(--border);font-size:.7rem;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.07em;display:flex;align-items:center;gap:5px}
  .param-section-body{padding:10px;display:flex;flex-direction:column;gap:8px}
  .macro-strip{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
  .order-section{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:12px;transition:background .25s,border-color .25s}
  .order-chips{display:flex;flex-wrap:wrap;gap:6px}
  .order-chip{display:flex;align-items:center;gap:5px;padding:3px 9px;border-radius:18px;background:var(--surface2);border:1px solid var(--border);font-size:.73rem}
  .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;height:100%;color:var(--text-muted);font-size:.85rem}
  .empty-state .icon{font-size:2.8rem}
  .toggle-enabled{width:12px;height:12px;border-radius:50%;flex-shrink:0;cursor:pointer;border:2px solid var(--border);transition:background .15s,border-color .15s}
  .toggle-enabled.on{background:var(--accent2);border-color:var(--accent2)}
  .toggle-enabled.off{background:transparent}
  .tag-row{display:flex;flex-wrap:wrap;gap:5px;align-items:center}
  .tag-chip{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:12px;font-size:.7rem;font-weight:600;background:var(--surface2);border:1px solid var(--border);color:var(--text)}
  .tag-chip.on{background:color-mix(in srgb,var(--accent2) 18%,var(--surface2));border-color:var(--accent2)}
  .tag-chip.off{opacity:.55}
  .regex-test-area{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:10px;margin-top:5px}
  .regex-test-result{margin-top:7px;padding:8px 11px;border-radius:5px;font-family:'Cascadia Code','Fira Code',monospace;font-size:.73rem;white-space:pre-wrap;word-break:break-all;min-height:18px;border:1px dashed var(--border);color:var(--text)}
  .regex-test-result.match{border-color:var(--success);background:color-mix(in srgb,var(--success) 8%,transparent)}
  .regex-test-result.nomatch{border-color:var(--danger);background:color-mix(in srgb,var(--danger) 8%,transparent);color:var(--danger)}
  .regex-test-preview{margin-top:5px;padding:10px 14px;border-radius:7px;background:var(--bg);border:1px solid var(--border);min-height:24px;display:none;font-size:.8rem;line-height:1.6;overflow-x:auto}
  .regex-test-preview hr{border-color:var(--border);margin:6px 0}
  .regex-error-msg{font-size:.7rem;color:var(--danger);margin-top:3px}
  #backToTop{position:fixed;bottom:26px;right:26px;width:36px;height:36px;border-radius:50%;background:var(--accent);color:#fff;border:none;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px var(--shadow);opacity:0;pointer-events:none;transform:translateY(10px);transition:opacity .25s,transform .25s;z-index:999}
  #backToTop.visible{opacity:1;pointer-events:auto;transform:translateY(0)}
  #backToTop:hover{filter:brightness(1.15)}
  #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(14px);background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:8px 20px;font-size:.81rem;opacity:0;pointer-events:none;transition:opacity .28s,transform .28s;z-index:9999;white-space:nowrap;box-shadow:0 4px 16px var(--shadow)}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  ::-webkit-scrollbar{width:4px;height:4px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--scrollbar);border-radius:3px}
  .badge{display:inline-flex;align-items:center;justify-content:center;font-size:.62rem;font-weight:700;padding:2px 6px;border-radius:9px;background:var(--accent);color:var(--badge-text)}

  /* ══════════════════════════════════════════
     API Settings Modal
  ══════════════════════════════════════════ */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9998;display:none;align-items:center;justify-content:center}
  .modal-overlay.show{display:flex}
  .modal-dialog{background:var(--surface);border:1px solid var(--border);border-radius:12px;width:440px;max-height:85vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.5);padding:20px 24px;display:flex;flex-direction:column;gap:14px}
  .modal-dialog h3{font-size:.95rem;font-weight:700;color:var(--text);margin:0}
  .modal-dialog .modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:4px}

  /* ══════════════════════════════════════════
     教程 / 模板 — 左右分栏模态窗
  ══════════════════════════════════════════ */
  .guide-modal{width:960px;max-width:95vw;height:660px;max-height:90vh}
  .guide-layout{display:flex;flex:1;min-height:0;overflow:hidden;gap:0}
  .guide-sidebar{width:210px;flex-shrink:0;border-right:1px solid var(--border);overflow-y:auto;padding:6px 0}
  .guide-toc-item{padding:7px 14px;font-size:.76rem;cursor:pointer;color:var(--text-muted);transition:all .12s;border-left:3px solid transparent;user-select:none}
  .guide-toc-item:hover{background:var(--surface2);color:var(--text)}
  .guide-toc-item.active{background:color-mix(in srgb,var(--accent) 10%,var(--surface2));color:var(--accent);border-left-color:var(--accent);font-weight:700}
  .guide-toc-cat{margin-bottom:1px}
  .guide-toc-cat-title{padding:5px 10px;font-size:.7rem;font-weight:700;color:var(--accent2);cursor:pointer;user-select:none;display:flex;align-items:center;gap:4px;transition:background .12s}
  .guide-toc-cat-title:hover{background:color-mix(in srgb,var(--accent2) 6%,var(--surface2))}
  .guide-toc-cat-title::before{content:'▶';font-size:.52rem;transition:transform .18s;display:inline-block;width:10px;flex-shrink:0}
  .guide-toc-cat.open>.guide-toc-cat-title::before{transform:rotate(90deg)}
  .guide-toc-cat-body{display:none}
  .guide-toc-cat.open>.guide-toc-cat-body{display:block}
  .guide-content{flex:1;overflow-y:auto;padding:16px 22px;font-size:.82rem;line-height:1.75;scroll-behavior:smooth}
  .guide-content h2{font-size:1rem;margin:0 0 10px;color:var(--accent)}
  .guide-content h3{font-size:.85rem;margin:14px 0 6px;color:var(--accent2)}
  .guide-content p{margin:0 0 8px}
  .guide-content code{background:var(--surface2);padding:2px 6px;border-radius:4px;font-size:.75rem}
  .guide-content ul,.guide-content ol{margin:4px 0 12px;padding-left:20px}
  .guide-content li{margin:3px 0}

  /* 蕼的教程 — 叠甲声明框 */
  .si-disclaimer{margin:0 0 16px;padding:10px 14px;border:1.5px dashed var(--border);border-radius:8px;font-size:.72rem;color:var(--text-muted);line-height:1.6;opacity:.8}
  .si-disclaimer p{margin:2px 0;font-size:.72rem}

  /* 蕼的教程 — 代码框 + 复制按钮 */
  .code-box{position:relative;margin:10px 0;background:var(--surface2);border:1px solid var(--border);border-radius:8px;overflow:hidden}
  .code-box .code-box-header{display:flex;align-items:center;justify-content:space-between;padding:5px 10px;background:color-mix(in srgb,var(--surface) 60%,var(--surface2));border-bottom:1px solid var(--border);font-size:.68rem;color:var(--text-muted)}
  .code-box .copy-btn{font-size:.65rem;padding:2px 8px;cursor:pointer;background:var(--surface);border:1px solid var(--border);border-radius:4px;color:var(--text-muted);transition:all .15s}
  .code-box .copy-btn:hover{color:var(--accent);border-color:var(--accent)}
  .code-box .copy-btn.copied{color:var(--success);border-color:var(--success)}
  .code-box pre{margin:0!important;border:none!important;border-radius:0!important;max-height:360px;overflow-y:auto}
  .code-box pre code{font-size:.72rem;line-height:1.6}
  .code-box.collapsed pre{max-height:0;overflow:hidden}
  .code-box .expand-toggle{font-size:.65rem;cursor:pointer;color:var(--accent);user-select:none}
	/* 触发方式切换按钮 */
	.trigger-toggle{display:flex;gap:0;border-radius:8px;overflow:hidden;border:1px solid var(--border);width:fit-content}
	.trigger-toggle button{padding:7px 16px;font-size:.78rem;font-weight:600;border:none;cursor:pointer;background:var(--surface2);color:var(--text-muted);transition:all .18s;white-space:nowrap}
	.trigger-toggle button:first-child{border-right:1px solid var(--border)}
	.trigger-toggle button.active{background:var(--accent);color:#fff}
	.trigger-toggle button:hover:not(.active){color:var(--text);background:color-mix(in srgb,var(--accent) 8%,var(--surface2))}

  /* 蕼的教程 — 折叠模板块 */
  .si-collapse{margin:10px 0;border:1px solid var(--border);border-radius:8px;overflow:hidden}
  .si-collapse-header{padding:8px 14px;background:var(--surface2);cursor:pointer;user-select:none;display:flex;align-items:center;justify-content:space-between;font-size:.78rem;font-weight:600;color:var(--accent2)}
  .si-collapse-header:hover{background:color-mix(in srgb,var(--accent2) 6%,var(--surface2))}
  .si-collapse-header::after{content:'▶';font-size:.6rem;transition:transform .2s}
  .si-collapse.open .si-collapse-header::after{transform:rotate(90deg)}
  .si-collapse-body{display:none;padding:10px 14px;background:var(--bg);max-height:420px;overflow-y:auto}
  .si-collapse.open .si-collapse-body{display:block}
  .si-collapse .code-box{margin:4px 0}

  /* ══════════════════════════════════════════
     更多弹出菜单
  ══════════════════════════════════════════ */
  .popover{position:absolute;top:100%;right:0;margin-top:6px;background:var(--surface);border:1px solid var(--border);border-radius:10px;box-shadow:0 6px 28px var(--shadow);z-index:9999;min-width:220px;padding:14px 16px;display:none;font-size:.78rem}
  .popover a{color:var(--accent2);text-decoration:none;word-break:break-all}
  .popover a:hover{text-decoration:underline}
  .popover .popover-divider{height:1px;background:var(--border);margin:10px 0}

  /* ══════════════════════════════════════════
     角色卡创作界面
  ══════════════════════════════════════════ */
  .cc-image-section{display:flex;gap:12px;align-items:flex-start}
  .cc-image-preview{width:96px;height:96px;border-radius:10px;border:2px dashed var(--border);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;background:var(--surface2);transition:border-color .15s}
  .cc-image-preview img{width:100%;height:100%;object-fit:cover}
  .cc-image-preview.has-image{border-style:solid;border-color:var(--accent)}
  .cc-image-actions{display:flex;flex-direction:column;gap:5px}
  .cc-bind-section{background:var(--surface);border:1px solid var(--border);border-radius:9px;overflow:hidden;transition:background .25s,border-color .25s}
  .cc-bind-header{padding:8px 12px;background:color-mix(in srgb,var(--accent2) 8%,var(--surface));border-bottom:1px solid var(--border);font-size:.7rem;font-weight:700;color:var(--accent2);text-transform:uppercase;letter-spacing:.07em;display:flex;align-items:center;justify-content:space-between}
  .cc-bind-body{padding:8px;max-height:180px;overflow-y:auto;display:flex;flex-direction:column;gap:3px}
  .cc-bind-item{display:flex;align-items:center;gap:7px;padding:4px 8px;border-radius:5px;cursor:pointer;font-size:.73rem;transition:background .12s}
  .cc-bind-item:hover{background:var(--surface2)}
  .cc-bind-item input[type="checkbox"]{width:13px;height:13px;accent-color:var(--accent2);cursor:pointer;flex-shrink:0}
  .cc-bind-item span{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cc-empty-hint{font-size:.7rem;color:var(--text-muted);padding:6px 8px;text-align:center}

  /* ══════════════════════════════════════════
     编辑台 (Edit Desk)
  ══════════════════════════════════════════ */
  .editdesk-wrapper{display:flex;flex:1;min-height:0;overflow:hidden}
  .editdesk-modebar{width:44px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;overflow-y:auto}
  .editdesk-modebtn{width:34px;height:34px;border-radius:7px;border:none;cursor:pointer;font-size:1rem;background:transparent;color:var(--text-muted);transition:all .15s;display:flex;align-items:center;justify-content:center;position:relative}
  .editdesk-modebtn:hover{background:var(--surface2);color:var(--text)}
  .editdesk-modebtn.active{background:var(--accent);color:#fff}
  .editdesk-modebtn .mode-tooltip{display:none;position:absolute;left:42px;background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:3px 8px;font-size:.65rem;white-space:nowrap;z-index:100;pointer-events:none}
  .editdesk-modebtn:hover .mode-tooltip{display:block}
  .editdesk-body{flex:1;display:flex;flex-direction:column;min-width:0;min-height:0;overflow:hidden}

  /* Vertical divider (reusable) */
  .ed-vdivider{width:5px;flex-shrink:0;background:var(--border);cursor:col-resize;position:relative;transition:background .15s;z-index:10}
  .ed-vdivider:hover,.ed-vdivider.dragging{background:var(--accent)}
  .ed-vdivider::after{content:'';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:3px;height:28px;border-radius:2px;background:var(--text-muted);opacity:.4}

  /* Upper Panel — source files (tab-style) */
  .editdesk-upper{overflow:hidden;display:flex;min-height:0;background:var(--bg)}
  .editdesk-source-panel{flex:1;display:flex;flex-direction:column;min-height:0;min-width:140px;overflow:hidden;background:color-mix(in srgb,var(--surface) 50%,var(--bg))}

  /* Source tab bar */
  .ed-tab-bar-wrapper{display:flex;align-items:stretch;flex-shrink:0;background:var(--surface);border-bottom:1px solid var(--border);min-height:32px}
  .ed-tab-scroll-btn{display:flex;align-items:center;justify-content:center;width:20px;flex-shrink:0;cursor:pointer;color:var(--text-muted);font-size:.55rem;background:transparent;border:none;transition:all .12s;user-select:none}
  .ed-tab-scroll-btn:hover{background:var(--surface2);color:var(--text)}
  .ed-tab-scroll-btn:active{color:var(--accent)}
  .ed-tab-bar{display:flex;align-items:stretch;gap:0;flex:1;overflow-x:auto;overflow-y:hidden;scroll-behavior:smooth}
  .ed-tab-bar::-webkit-scrollbar{height:0;display:none}
  .ed-tab{display:flex;align-items:center;gap:4px;padding:5px 10px;font-size:.7rem;font-weight:600;white-space:nowrap;cursor:pointer;user-select:none;border-right:1px solid var(--border);color:var(--text-muted);background:color-mix(in srgb,var(--surface2) 30%,var(--surface));transition:all .12s;flex-shrink:0;max-width:160px}
  .ed-tab:hover{background:var(--surface2);color:var(--text)}
  .ed-tab.active{background:var(--bg);color:var(--accent);border-bottom:2px solid var(--accent);margin-bottom:-1px}
  .ed-tab .ed-tab-icon{font-size:.7rem;flex-shrink:0}
  .ed-tab .ed-tab-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;font-size:.69rem}
  .ed-tab .ed-tab-count{font-size:.58rem;color:var(--text-muted);flex-shrink:0}
  .ed-tab .ed-tab-close{font-size:.55rem;color:var(--text-muted);cursor:pointer;padding:1px 3px;flex-shrink:0;opacity:0;transition:opacity .12s;border-radius:3px}
  .ed-tab:hover .ed-tab-close{opacity:1}
  .ed-tab .ed-tab-close:hover{color:var(--danger);background:color-mix(in srgb,var(--danger) 15%,transparent)}
  .ed-tab-add{display:flex;align-items:center;justify-content:center;padding:5px 10px;flex-shrink:0;cursor:pointer;font-size:.8rem;font-weight:700;color:var(--text-muted);background:transparent;border:none;border-right:1px solid var(--border);transition:all .12s}
  .ed-tab-add:hover{background:var(--surface2);color:var(--accent)}

  /* Source entries (below tab bar) */
  .editdesk-source-entries{flex:1;overflow-y:auto;padding:4px}

  /* Source entry (inside active tab) */
  .ed-sf-entry{display:flex;align-items:center;gap:4px;padding:3px 8px;border-radius:4px;cursor:pointer;font-size:.69rem;transition:background .1s;user-select:none}
  .ed-sf-entry:hover{background:var(--surface2)}
  .ed-sf-entry.active{background:color-mix(in srgb,var(--accent) 15%,var(--surface2));color:var(--accent)}
  .ed-sf-entry .ed-sf-eidx{font-size:.58rem;color:var(--text-muted);width:16px;flex-shrink:0;text-align:right}

  /* ── Source Entry Batch Mode ── */
  .ed-sf-entry .sf-cb{width:12px;height:12px;accent-color:var(--accent);cursor:pointer;flex-shrink:0;margin:0;opacity:0;transition:opacity .1s}
  .ed-sf-entry.sf-batch-show .sf-cb{opacity:1}
  .ed-sf-entry.sf-checked{background:color-mix(in srgb,var(--accent) 18%,var(--surface2))!important;color:var(--accent)}
  .sf-batch-bar{display:flex;align-items:center;gap:5px;padding:3px 8px;background:color-mix(in srgb,var(--accent) 8%,var(--surface));border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;font-size:.65rem}
  .sf-batch-bar .sf-batch-count{color:var(--text-muted);margin-right:3px}
  .sf-batch-bar .sf-batch-btn{font-size:.62rem;padding:1px 7px;border-radius:4px;border:none;cursor:pointer;font-weight:600;transition:all .1s;white-space:nowrap}
  .sf-batch-bar .sf-batch-btn:hover{filter:brightness(1.12)}
  .sf-batch-bar .sf-batch-btn:disabled{opacity:.4;cursor:default}

  /* Source preview (upper right) */
  .editdesk-source-preview{width:30%;min-width:160px;flex-shrink:0;overflow-y:auto;padding:8px 12px;display:flex;flex-direction:column;gap:6px;background:color-mix(in srgb,var(--surface) 30%,var(--bg));border-left:1px solid var(--border)}

  /* Draggable Divider (horizontal, between upper/lower) */
  .editdesk-divider{height:5px;flex-shrink:0;background:var(--border);cursor:row-resize;position:relative;transition:background .15s;z-index:10}
  .editdesk-divider:hover,.editdesk-divider.dragging{background:var(--accent)}
  .editdesk-divider::after{content:'';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:30px;height:3px;border-radius:2px;background:var(--text-muted);opacity:.4}

  /* Lower Panel — working preset */
  .editdesk-lower{flex:1;display:flex;min-height:0;overflow:hidden;background:var(--bg)}
  .editdesk-working-list{flex:1;display:flex;flex-direction:column;min-height:0;min-width:120px;overflow:hidden;background:color-mix(in srgb,var(--surface) 60%,var(--bg))}
  .editdesk-working-list-header{padding:6px 10px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:space-between;font-size:.68rem;font-weight:700;color:var(--accent2);text-transform:uppercase;letter-spacing:.05em}
  .editdesk-working-list-body{flex:1;overflow-y:auto;padding:3px}
  .editdesk-working-editor{width:55%;min-width:180px;flex-shrink:0;overflow-y:auto;padding:10px 14px;display:flex;flex-direction:column;gap:9px;background:var(--bg);border-left:1px solid var(--border)}
  .editdesk-working-toolbar{background:var(--surface);border-top:1px solid var(--border);padding:5px 10px;display:flex;align-items:center;gap:5px;flex-shrink:0;flex-wrap:wrap}
  /* ── Ed Working Item ── */
  .ed-working-item{display:flex;align-items:center;gap:5px;padding:5px 8px;border-radius:5px;cursor:pointer;font-size:.73rem;border:1px solid transparent;transition:all .12s;user-select:none}
  .ed-working-item:hover{background:var(--surface2)}
  .ed-working-item.active{background:var(--surface2);border-color:var(--accent)}
  .ed-working-item.drag-over{border-color:var(--accent2);background:color-mix(in srgb,var(--accent2) 10%,var(--surface2))}
  .ed-working-item .ed-wcb{width:13px;height:13px;accent-color:var(--accent);cursor:pointer;flex-shrink:0;margin:0;opacity:0;transition:opacity .12s}
  .ed-working-item.ed-batch-show .ed-wcb{opacity:1}
  .ed-working-item.ed-batch-checked{background:color-mix(in srgb,var(--accent) 15%,var(--surface2));border-color:var(--accent)}
  .ed-working-item .ed-widx{font-size:.63rem;color:var(--text-muted);width:16px;flex-shrink:0;text-align:right}
  .ed-working-item .ed-wname{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ed-working-item .ed-wdel{font-size:.6rem;color:var(--text-muted);cursor:pointer;padding:0 2px;flex-shrink:0;opacity:0;transition:opacity .12s}
  .ed-working-item:hover .ed-wdel{opacity:1}
  .ed-working-item .ed-wdel:hover{color:var(--danger)}
  .ed-working-item.ed-batch-show .ed-wdel{display:none}
  .ed-batch-bar{display:flex;align-items:center;gap:6px;padding:4px 8px;background:color-mix(in srgb,var(--accent) 8%,var(--surface));border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
  .ed-batch-bar .ed-batch-count{font-size:.68rem;color:var(--text-muted);margin-right:4px}
  .ed-batch-bar .ed-batch-btn{font-size:.65rem;padding:2px 8px;border-radius:4px;border:none;cursor:pointer;font-weight:600;transition:all .12s}
  .ed-batch-bar .ed-batch-btn:hover{filter:brightness(1.12)}

  /* Empty states for edit desk */
  .ed-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;height:100%;color:var(--text-muted);font-size:.75rem;padding:20px;text-align:center}
  .ed-empty .ed-empty-icon{font-size:2rem;opacity:.5}


  .draft-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px}
  .draft-card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px;cursor:pointer;transition:all .12s}
  .draft-card:hover{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 5%,var(--surface2))}
  .draft-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
  .draft-card-header span:first-child{font-size:.62rem;font-weight:700;padding:1px 7px;border-radius:8px;background:color-mix(in srgb,var(--accent2) 15%,transparent);color:var(--accent2)}
  .draft-card-title{font-weight:700;font-size:.78rem;margin:4px 0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .draft-card-preview{font-size:.67rem;color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .draft-tag{transition:all .12s}
  .draft-tag.active{background:var(--accent)!important;color:#fff!important}
</style>
</head>
<body>

<header>
  <span class="header-logo">🌌</span>
  <h1>Caelum<span>写卡助手</span></h1>
  <div class="header-actions"><button class="btn btn-secondary btn-xs" onclick="showDrafts()" title="存储管理器" style="margin-right:2px">📦</button><button class="btn btn-secondary btn-xs" onclick="showCustomPersonaModal()" title="自定义AI助手" style="margin-right:2px">+</button>
    <!-- AI 助手选择 -->
    <select id="aiPersonaSelect" onchange="switchAIPersona(this.value)" style="width:auto;font-size:.73rem;padding:5px 8px" title="选择 AI 助手人格">
      <option value="caelum">🌌 山停 · 万能辅助</option>
      <option value="ying">🎭 影 · 角色塑造</option>
      <option value="xian">🎪 弦 · 情节设计</option>
      <option value="rang">🌍 壤 · 世界观构筑</option>
    </select>
    <button class="btn btn-secondary btn-xs" onclick="editPersonaPrompt()" title="编辑当前助手的系统提示词" style="padding:4px 7px">✏️</button>
    <!-- API 配置按钮 -->
    <button class="btn btn-secondary btn-sm" onclick="openAPISettings()" title="配置 API 连接和参数">🔌 API设置</button>
    <div class="theme-divider"></div>
    <button class="btn btn-warning btn-sm" onclick="clearAll()" title="一键清除所有数据">🗑 一键清除</button>
    <div class="theme-divider"></div>
    <div class="theme-toggle" title="切换主题">
      <button class="theme-btn active" id="btnDark"  onclick="setTheme('dark')" title="深色">🌙</button>
      <button class="theme-btn"        id="btnLight" onclick="setTheme('light')" title="浅色">☀️</button>
    </div>
    <div class="theme-divider"></div>
    <button class="btn btn-secondary" onclick="showGuide()">📖 指南</button>
    <button class="btn btn-warning btn-sm" onclick="showSiTutorial()">📝 蕼的写卡教程</button>
    <div style="position:relative;display:inline-flex">
      <button class="btn btn-secondary" onclick="toggleMorePopover()" id="btnMore">⋯ 更多</button>
      <div class="popover" id="morePopover">
        <div style="font-weight:700;margin-bottom:4px;font-size:.78rem">📂 仓库地址</div>
        <a href="https://github.com/ShanTing-sy/character-card-converter" target="_blank" rel="noopener">github.com/ShanTing-sy/character-card-converter</a>
      </div>
    </div>
  </div>
</header>

<div class="workspace">

  <!-- ═══════ 编辑区 ═══════ -->
  <div class="editor-panel" id="editorPanel">
    <div class="editor-toolbar" id="editorToolbar">
      <span>💡 选择左侧条目进行编辑，可使用底部标签切换编辑器</span>
    </div>
    <div class="editor-body" id="editorBody">
      <div class="editor-pane active" id="panePreset"></div>
      <div class="editor-pane" id="paneWorldBook"></div>
      <div class="editor-pane" id="paneRegex"></div>
      <div class="editor-pane" id="paneGlobal"></div>
      <div class="editor-pane" id="paneCharCard"></div>
      <div class="editor-pane" id="paneEditDesk"></div>
    </div>
    <div class="bottom-tabs">
      <button class="bottom-tab" id="btabEditDesk" onclick="switchEditorMode('editdesk')">🗂 编辑台</button>
      <button class="bottom-tab active" id="btabPreset" onclick="switchEditorMode('preset')">📝 预设</button>
      <button class="bottom-tab" id="btabWorldBook" onclick="switchEditorMode('worldbook')">📚 世界书</button>
      <button class="bottom-tab" id="btabRegex" onclick="switchEditorMode('regex')">🔧 正则</button>
      <button class="bottom-tab" id="btabGlobal" onclick="switchEditorMode('global')">⚙️ 全局参数</button>
      <button class="bottom-tab" id="btabCharCard" onclick="switchEditorMode('charcard')">🎭 角色卡</button>
    </div>
  </div>

  <div class="workspace-vdivider" id="wsVdivider" onmousedown="startWSVDividerDrag(event)"></div>

  <!-- ═══════ 右侧面板 ═══════ -->
  <div class="right-panel" id="rightPanel">
    <div class="right-tabs">
      <button class="right-tab active" id="rtabPreview" onclick="switchRightTab('preview')">📄 JSON预览</button>
      <button class="right-tab" id="rtabAI" onclick="switchRightTab('ai')">🤖 AI助手</button>
    </div>

    <!-- JSON 预览 -->
    <div class="right-pane active" id="rpanePreview">
      <div style="padding:8px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0">
        <span style="font-size:.71rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em">JSON 实时预览</span>
        <button class="btn btn-secondary btn-xs" onclick="copyJson()">📋 复制</button>
      </div>
      <div class="preview-body"><pre id="jsonPreview">{}</pre></div>
    </div>

    <!-- AI 助手 -->
    <div class="right-pane" id="rpaneAI">
      <div style="padding:6px 10px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:space-between">
        <span style="font-size:.7rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em" id="aiPersonaLabel">🤖 山停 · 万能辅助</span>
        <button class="btn btn-secondary btn-xs" onclick="clearAIChat()" title="清空对话">🗑</button>
      </div>
      <div class="ai-chat-area" id="aiChatArea">
        <div class="ai-msg system">💡 在左侧编辑内容时，可在此与 AI 探讨写作思路。<br>点击「注入上下文」将当前编辑内容发送给 AI 作为参考。</div>
      </div>
      <div class="ai-input-row">
        <button class="btn btn-secondary btn-xs" onclick="injectContext()" title="将当前编辑内容发送给AI" style="flex-shrink:0">📥 注入上下文</button>
        <textarea id="aiInput" placeholder="输入问题…" rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendAIMessage()}"></textarea>
        <button class="btn btn-primary btn-sm" onclick="sendAIMessage()" style="flex-shrink:0">▶</button>
      </div>
    </div>
  </div>
</div>

<button id="backToTop" onclick="scrollToTop()" title="回到顶部">↑</button>
<div id="toast"></div>
<input type="file" id="fileInput" accept=".json" style="display:none" onchange="handleFileImport(event)"/>
<input type="file" id="ccImageInput" accept="image/*" style="display:none" onchange="handleCCImageImport(event)"/>

<!-- ═══════ API 设置弹窗 ═══════ -->
<div class="modal-overlay" id="apiModal" onclick="if(event.target===this)closeAPISettings()">
  <div class="modal-dialog" onclick="event.stopPropagation()">
    <h3>🔌 API 连接设置</h3>
    <div class="field-row">
      <div style="flex:2"><span class="sub-label">Base URL</span><input type="text" id="apiBaseUrl" placeholder="https://api.openai.com/v1"/></div>
      <div style="flex:2"><span class="sub-label">API Key</span><input type="password" id="apiApiKey" placeholder="sk-..."/></div>
    </div>
    <div style="display:flex;gap:6px;align-items:flex-end">
      <div style="flex:1"><span class="sub-label">模型 (Model)</span><select id="apiModel"><option value="">请先拉取模型列表</option></select></div>

loadCustomPersonas();

function toast(m){const e=document.getElementById('toast');e.textContent=m;e.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>e.classList.remove('show'),2200)}

function makePrompt(id){return{identifier:`prompt_${id}`,name:'新提示词',system_prompt:false,role:'system',content:'',enabled:true,marker:false,injection_position:0,injection_depth:4,injection_order:100,forbid_overrides:false}}

function wbToST(e,i){
  return{
    uid:i,disable:!e.enabled,use_regex:e.use_regex||false,name:e.comment||'',comment:e.comment||'',
    content:e.content||'',constant:e.constant!==undefined?e.constant:false,vectorized:false,
    position:typeof e.position==='string'?0:(e.position||0),depth:e.depth||4,role:null,
    key:e.keys?e.keys.split(',').map(k=>k.trim()).filter(Boolean):[],keysecondary:[],
    selective:e.selective||false,selectiveLogic:0,caseSensitive:false,matchWholeWords:true,
    scanDepth:2,useGroupScoring:false,excludeRecursion:e.exclude_recursion||false,
    preventRecursion:false,delayUntilRecursion:false,useProbability:true,probability:e.probability||100,
    sticky:e.constant?5:0,cooldown:0,delay:0,group:'',groupOverride:false,groupWeight:100,
    display_index:i+1,order:e.order||100,displayIndex:i,addMemo:true,ignoreBudget:false,
    matchPersonaDescription:false,matchCharacterDescription:false,matchCharacterPersonality:false,
    matchCharacterDepthPrompt:false,matchScenario:false,matchCreatorNotes:false,outletName:'',automationId:'',triggers:[]
  }
}
/* ── 世界书格式转换：SillyTavern 标准格式 → 内部格式 ── */
function stToWB(en,uid){
  var keysVal='';
  if(Array.isArray(en.key))keysVal=en.key.join(', ');
  else if(typeof en.keys==='string')keysVal=en.keys;
  else if(Array.isArray(en.keys))keysVal=en.keys.join(', ');
  var enabledVal=en.enabled!==undefined?en.enabled:!(en.disable===undefined?false:en.disable);
  return{
    uid:uid,keys:keysVal,content:en.content||'',comment:en.comment||'',
    selective:en.selective||false,constant:en.constant||false,
    position:en.position||0,depth:en.depth||4,order:en.order||100,
    probability:en.probability||100,use_regex:en.use_regex||false,
    exclude_recursion:en.excludeRecursion||en.exclude_recursion||false,enabled:enabledVal
  }
}
function makeRegexEntry(id){return{uid:`regex_${id}`,id:'',scriptName:'',findRegex:'',replaceString:'',trimStrings:[],placement:[2],disabled:false,markdownOnly:false,promptOnly:false,runOnEdit:true,substituteRegex:0,minDepth:null,maxDepth:null}}

/* ═══════════════════════════════════════════
   Preset Editor (two-panel)
═══════════════════════════════════════════ */
function selectPrompt(i){selectedIndex=i;if(editorMode!=='preset')switchEditorMode('preset');else renderEditor()}

function renderEditor(){
  if(editorMode!=='preset')return;
  const pane=document.getElementById('panePreset');
  const prompts=state.prompts;
  const roleEmoji={system:'⚙️',user:'👤',assistant:'🤖'};
  const roleName={system:'系统',user:'用户',assistant:'助手'};

  let h=`<div class="editor-split">
    <div class="editor-list-panel">
      <div class="editor-list-header${presetBatchMode?' pb-header':''}"><span>📝 提示词 (${prompts.length})</span>
        <button class="btn btn-primary btn-xs" onclick="addPrompt()">+</button>
        <button class="btn btn-secondary btn-xs ${presetBatchMode?'btn-warning':''}" onclick="togglePresetBatchMode()" title="批量操作模式" style="font-size:.65rem;padding:2px 7px">☑</button>
      </div>
      ${presetBatchMode?renderPresetBatchBar():''}
      <div class="editor-list-body" id="promptListBody">`;
  if(!prompts.length)h+=`<div style="padding:16px;text-align:center;color:var(--text-muted);font-size:.78rem">暂无提示词</div>`;
  else prompts.forEach((p,i)=>{h+=`
    <div class="entry-item${i===selectedIndex?' active':''}${presetBatchSet.has(i)?' pb-checked':''}${presetBatchMode?' pb-show-cb':''}" onclick="${presetBatchMode?'event.stopPropagation();togglePresetBatchCheck('+i+')':'selectPrompt('+i+')'}" draggable="${presetBatchMode?'false':'true'}" data-pidx="${i}" id="pitem_${i}">
      <input type="checkbox" class="pb-cb"${presetBatchSet.has(i)?' checked':''} onclick="event.stopPropagation();togglePresetBatchCheck(${i})" title="选择/取消">
      <span class="drag-handle" title="拖拽排序" onclick="event.stopPropagation()">⠿</span>
      <span style="font-size:.82rem;flex-shrink:0">${roleEmoji[p.role]||'📄'}</span>
      <div style="flex:1;min-width:0">
        <div class="entry-title" style="font-size:.77rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escHtml(p.name||'未命名')}</div>
        <div style="font-size:.66rem;color:var(--text-muted)">${roleName[p.role]||p.role}${p.marker?' · 标记':''}${p.system_prompt?' · 系统':''}</div>
      </div>
      <span class="toggle-enabled ${p.enabled?'on':'off'}" title="启用/禁用" onclick="event.stopPropagation();${presetBatchMode?'togglePresetBatchCheck('+i+')':'state.prompts['+i+'].enabled=!state.prompts['+i+'].enabled;renderEditor();updatePreview()'}"></span>
    </div>`;});
  h+=`</div></div><div class="editor-detail-panel" id="presetDetail">`;

  if(selectedIndex>=0&&selectedIndex<prompts.length)h+=renderPromptDetail(prompts[selectedIndex],selectedIndex);
  else h+=`<div class="empty-state"><span class="icon">👆</span><span>从左侧列表选择一条提示词进行编辑</span></div>`;

  h+=`</div></div>`;
  const oldScroll=document.getElementById('promptListBody')?.scrollTop||0;
  const oldDetailScroll=document.getElementById('presetDetail')?.scrollTop||0;
  pane.innerHTML=h;
  const newList=document.getElementById('promptListBody');
  if(newList&&oldScroll>0)newList.scrollTop=oldScroll;
  const newDetail=document.getElementById('presetDetail');
  if(newDetail&&oldDetailScroll>0)newDetail.scrollTop=oldDetailScroll;

  // 拖拽
  setTimeout(()=>{
    document.querySelectorAll('#promptListBody .entry-item').forEach(el=>{
      el.addEventListener('dragstart',e=>{dragSrcIndex=parseInt(el.dataset.pidx);e.dataTransfer.effectAllowed='move'});
      el.addEventListener('dragover',e=>{e.preventDefault();el.classList.add('drag-over')});
      el.addEventListener('dragleave',e=>{el.classList.remove('drag-over')});
      el.addEventListener('drop',e=>{e.preventDefault();el.classList.remove('drag-over');const src=dragSrcIndex,dst=parseInt(el.dataset.pidx);if(src!==dst&&src>=0&&dst>=0){const m=state.prompts.splice(src,1)[0];state.prompts.splice(dst,0,m);syncPromptOrder();selectedIndex=dst;renderEditor();updatePreview()}});
      el.addEventListener('dragend',()=>{document.querySelectorAll('#promptListBody .entry-item').forEach(e=>e.classList.remove('drag-over'))});
    });
  },50);
  initScrollWatcher();
}

/* ═══════════════════════════════════════════
   Preset — Batch Operations
═══════════════════════════════════════════ */
function renderPresetBatchBar(){
  const n=presetBatchSet.size;
  return `<div class="pb-batch-bar">
    <span class="pb-batch-count">☑ 已选 ${n} 项</span>
    <button class="pb-batch-btn" style="background:var(--surface2);color:var(--text);border:1px solid var(--border)" onclick="presetBatchSelectAll()">全选</button>
    <button class="pb-batch-btn" style="background:var(--surface2);color:var(--text-muted);border:1px solid var(--border)" onclick="presetBatchClearAll()">取消</button>
    <button class="pb-batch-btn" style="background:color-mix(in srgb,var(--success) 12%,var(--surface2));color:var(--success);border:1px solid color-mix(in srgb,var(--success) 30%,var(--border))" onclick="presetBatchToggleEnabled(true)" ${n===0?'disabled':''}>✅ 启用</button>
    <button class="pb-batch-btn" style="background:color-mix(in srgb,var(--warning) 12%,var(--surface2));color:var(--warning);border:1px solid color-mix(in srgb,var(--warning) 30%,var(--border))" onclick="presetBatchToggleEnabled(false)" ${n===0?'disabled':''}>⏸ 禁用</button>
    <span style="flex:1"></span>
    <button class="pb-batch-btn" style="background:color-mix(in srgb,var(--danger) 15%,var(--surface2));color:var(--danger);border:1px solid color-mix(in srgb,var(--danger) 35%,var(--border))" onclick="presetBatchDelete()" ${n===0?'disabled':''}>🗑 批量删除</button>
  </div>`;
}

function togglePresetBatchMode(){
  presetBatchMode=!presetBatchMode;
  if(!presetBatchMode) presetBatchSet=new Set();
  renderEditor();
}

function togglePresetBatchCheck(idx){
  if(presetBatchSet.has(idx)) presetBatchSet.delete(idx);
  else presetBatchSet.add(idx);
  renderEditor();
}

function presetBatchSelectAll(){
  for(let i=0;i<state.prompts.length;i++) presetBatchSet.add(i);
  renderEditor();
}

function presetBatchClearAll(){
  presetBatchSet=new Set();
  renderEditor();
}

function presetBatchDelete(){
  const indices=Array.from(presetBatchSet).sort((a,b)=>b-a);
  if(!indices.length) return;
  if(!confirm(`确定要批量删除选中的 ${indices.length} 个提示词吗？`)) return;
  indices.forEach(idx=>state.prompts.splice(idx,1));
  presetBatchSet=new Set();
  selectedIndex=Math.min(selectedIndex,state.prompts.length-1);
  if(!state.prompts.length) selectedIndex=-1;
  syncPromptOrder();
  renderEditor();updatePreview();
  toast('🗑 已批量删除 '+indices.length+' 个提示词');
}

function presetBatchToggleEnabled(on){
  presetBatchSet.forEach(idx=>{state.prompts[idx].enabled=on});
  renderEditor();updatePreview();
  toast((on?'✅ 已批量启用 ':'⏸ 已批量禁用 ')+presetBatchSet.size+' 个提示词');
}

function renderPromptDetail(p,idx){
  const macros=['{{char}}','{{user}}','{{personality}}','{{description}}','{{scenario}}','{{mesExamples}}','{{history}}','{{group}}'];
  return `
    <div class="field-group"><label>标识符 &amp; 名称</label>

        <div><span class="sub-label">identifier</span><input type="text" value="${escHtml(p.identifier)}" oninput="updateField('identifier',this.value)"/></div>
        <div><span class="sub-label">显示名称</span><input type="text" value="${escHtml(p.name)}" oninput="updateField('name',this.value);updateEntryName(this.value)"/></div>
      </div></div>

  h+=`</div></div><div class="editor-detail-panel" id="ccDetail">`;
  if(selectedCharCardIndex>=0&&selectedCharCardIndex<cards.length)h+=renderCharCardDetail(cards[selectedCharCardIndex],selectedCharCardIndex);
  else h+=`<div class="empty-state"><span class="icon">👆</span><span>从左侧选择一张角色卡</span></div>`;

  const oldCcScroll=document.getElementById('ccListBody')?.scrollTop||0;

}

function updateCharCardField(key,value,idx){
  if(idx<0||idx>=state.charcards.length)return;
  state.charcards[idx][key]=value;
  updatePreview();
}
/* 角色名称专用更新：只更新侧边栏DOM，不重渲染整个编辑器，避免输入框丢焦点 */
function updateCharCardName(idx,value){
  if(idx<0||idx>=state.charcards.length)return;
  state.charcards[idx].name=value;
  var item=document.getElementById('ccitem_'+idx);
  if(item){var nd=item.querySelector('.cc-item-name');if(nd)nd.textContent=value||'未命名'}
  updatePreview();
}
function toggleCCWBinding(idx,uid,checked){
  if(idx<0||idx>=state.charcards.length)return;
  const cc=state.charcards[idx];
  if(checked){if(!cc.bindWorldBooks.includes(uid))cc.bindWorldBooks.push(uid)}
  else cc.bindWorldBooks=cc.bindWorldBooks.filter(u=>u!==uid);
  updatePreview();
}
function toggleCCRegexBinding(idx,uid,checked){
  if(idx<0||idx>=state.charcards.length)return;
  const cc=state.charcards[idx];
  if(checked){if(!cc.bindRegex.includes(uid))cc.bindRegex.push(uid)}
  else cc.bindRegex=cc.bindRegex.filter(u=>u!==uid);
  updatePreview();
}

function selectAllCCWB(idx){
  if(idx<0||idx>=state.charcards.length)return;
  state.charcards[idx].bindWorldBooks=state.worldbook_entries.map(e=>e.uid);
  renderCharCardEditor();updatePreview();
}
function deselectAllCCWB(idx){
  if(idx<0||idx>=state.charcards.length)return;
  state.charcards[idx].bindWorldBooks=[];
  renderCharCardEditor();updatePreview();
}
function selectAllCCRegex(idx){
  if(idx<0||idx>=state.charcards.length)return;
  state.charcards[idx].bindRegex=state.regex_entries.map(e=>e.uid);
  renderCharCardEditor();updatePreview();
}
function deselectAllCCRegex(idx){
  if(idx<0||idx>=state.charcards.length)return;
  state.charcards[idx].bindRegex=[];
  renderCharCardEditor();updatePreview();
}
function importWBForCC(){
  window._importMode='worldbook';
  document.getElementById('fileInput').click();
  window._ccImportToBind=true;
}
function importRegexForCC(){
  window._importMode='regex';
  document.getElementById('fileInput').click();
  window._ccImportToBind=true;
}

function addCharCard(){
  const c=makeCharCard(Date.now());
  if(selectedCharCardIndex>=0&&selectedCharCardIndex<state.charcards.length){state.charcards.splice(selectedCharCardIndex+1,0,c);selectedCharCardIndex++}
  else{state.charcards.push(c);selectedCharCardIndex=state.charcards.length-1}
  renderCharCardEditor();updatePreview();toast('✅ 已新建角色卡');
}
function deleteCharCard(idx){
  if(idx<0||idx>=state.charcards.length)return;
  state.charcards.splice(idx,1);
  selectedCharCardIndex=Math.min(selectedCharCardIndex,state.charcards.length-1);
  if(!state.charcards.length)selectedCharCardIndex=-1;
  renderCharCardEditor();updatePreview();toast('🗑 已删除');
}

/* ── 图片导入 ── */
function triggerCCImageImport(){
  window._ccImageTargetIdx=selectedCharCardIndex;
  document.getElementById('ccImageInput').click();
}
function handleCCImageImport(e){
  const file=e.target.files[0];if(!file)return;
  const idx=window._ccImageTargetIdx;
  if(idx===undefined||idx<0||idx>=state.charcards.length){toast('⚠️ 请先选中一张角色卡');e.target.value='';return}
  if(!file.type.startsWith('image/')){toast('⚠️ 请选择图片文件');e.target.value='';return}
  if(file.size>10*1024*1024){toast('⚠️ 图片大小不能超过 10MB');e.target.value='';return}
  const reader=new FileReader();
  reader.onload=ev=>{
    state.charcards[idx].image=ev.target.result;
    renderCharCardEditor();updatePreview();
    toast('🖼 图片已导入');
  };
  reader.readAsDataURL(file);
  e.target.value='';
}

/* ── 角色卡导入 ── */
function importCharCard(){
  const input=document.getElementById('fileInput');
  window._importMode='charcard';
  input.accept='.json,.png';
  input.click();
  setTimeout(()=>{input.accept='.json'},500);
}

/* ── 角色卡导出 ── */
function exportCharCard(idx){
  if(idx<0||idx>=state.charcards.length)return;
  const c=state.charcards[idx];
  const o=buildCharCardOutput(c,false);
  downloadJSON(o,`${c.name||'character'}.json`);
  toast(`💾 角色卡「${c.name}」已导出`);
}
function exportCharCardFull(idx){
  if(idx<0||idx>=state.charcards.length)return;
  const c=state.charcards[idx];
  const o=buildCharCardOutput(c,true);
  downloadJSON(o,`${c.name||'character'}_full.json`);
  toast(`📦 角色卡「${c.name}」（含世界书+正则）已导出`);
}
function buildCharCardOutput(c,includeBindings){
  const data={
    name:c.name,
    description:c.description,
    personality:c.personality,
    scenario:c.scenario,
    first_mes:c.first_mes,
    mes_example:c.mes_example,
    system_prompt:c.system_prompt,
    post_history_instructions:c.post_history_instructions,
    creator_notes:c.creator_notes,
    creator:c.creator,
    character_version:c.character_version,
    tags:c.tags?c.tags.split(',').map(t=>t.trim()).filter(Boolean):[],
    alternate_greetings:c.alternate_greetings||[]
  };
  if(includeBindings){
    // 嵌入世界书
    if(c.bindWorldBooks.length>0){
      const boundEntries={};
      c.bindWorldBooks.forEach(uid=>{
        const e=state.worldbook_entries.find(wb=>wb.uid===uid);
        if(e){boundEntries[uid]=wbToST(e,parseInt(uid))}
      });
      if(Object.keys(boundEntries).length>0)data.character_book={entries:boundEntries};
    }
    // 嵌入正则
    if(c.bindRegex.length>0){
      const boundRegex=[];
      c.bindRegex.forEach(uid=>{
        const e=state.regex_entries.find(re=>re.uid===uid);
        if(e){boundRegex.push({id:e.id||e.uid,scriptName:e.scriptName,findRegex:e.findRegex,replaceString:e.replaceString,trimStrings:e.trimStrings||[],placement:e.placement,disabled:e.disabled,markdownOnly:e.markdownOnly,promptOnly:e.promptOnly,runOnEdit:e.runOnEdit,substituteRegex:e.substituteRegex??0,minDepth:e.minDepth,maxDepth:e.maxDepth})}
      });
      if(boundRegex.length>0){if(!data.extensions)data.extensions={};data.extensions.regex_scripts=boundRegex}
    }
  }
  if(c.image)data.image=c.image;
  return {spec:'chara_card_v2',spec_version:'2.0',data};
}

function msf(key,label,value,min,max,step,hint){return`<div><div class="param-label"><span>${label}</span></div><div class="slider-row"><input type="range" class="slider-sync" data-key="${key}" min="${min}" max="${max}" step="${step}" value="${value}"/><input type="number" class="num-sync" data-key="${key}" min="${min}" max="${max}" step="${step}" value="${value}"/></div>${hint?`<div class="param-hint">${hint}</div>`:''}</div>`}

function renderGlobalEditor(){
  if(editorMode!=='global')return;
  const pane=document.getElementById('paneGlobal');
  let h='<div style="padding:14px 18px;display:flex;flex-direction:column;gap:11px">';

  // Sampling
  h+=`<div class="param-section"><div class="param-section-header"><span>🎲 采样参数</span></div><div class="param-section-body">${msf('temperature','Temperature',state.temperature,0,2,0.01,'控制输出随机性。越高越创意，越低越确定')}${msf('top_p','Top P',state.top_p,0,1,0.01,'核采样阈值')}${msf('top_k','Top K',state.top_k,0,200,1,'限制候选Token数，0=不限制')}${msf('top_a','Top A',state.top_a,0,1,0.01,'Top-A采样，0=禁用')}${msf('min_p','Min P',state.min_p,0,1,0.01,'最小概率阈值，0=禁用')}${msf('repetition_penalty','Repetition Penalty',state.repetition_penalty,1,2,0.01,'重复惩罚，>1降低重复')}${msf('frequency_penalty','Frequency Penalty',state.frequency_penalty,-2,2,0.01,'频率惩罚')}${msf('presence_penalty','Presence Penalty',state.presence_penalty,-2,2,0.01,'存在惩罚')}</div></div>`;

  // Context
  h+=`<div class="param-section"><div class="param-section-header"><span>📏 上下文 & Token</span></div><div class="param-section-body"><div class="checkbox-row" style="margin-bottom:8px"><input type="checkbox" id="gp_mcu" ${state.max_context_unlocked?'checked':''} onchange="state.max_context_unlocked=this.checked;updatePreview()"/><label for="gp_mcu">解锁最大上下文 (max_context_unlocked)</label></div><div class="field-row"><div><div class="param-label"><span>openai_max_context</span></div><input type="number" value="${state.openai_max_context}" min="1024" max="2000000" step="1024" oninput="state.openai_max_context=parseInt(this.value)||200000;updatePreview()"/><div class="param-hint">最大上下文 Token 数</div></div><div><div class="param-label"><span>openai_max_tokens</span></div><input type="number" value="${state.openai_max_tokens}" min="256" max="128000" step="256" oninput="state.openai_max_tokens=parseInt(this.value)||4096;updatePreview()"/><div class="param-hint">单次最大生成 Token 数</div></div></div></div></div>`;

  // Behavior
  h+=`<div class="param-section"><div class="param-section-header"><span>🔀 行为开关</span></div><div class="param-section-body">
    <div class="checkbox-row"><input type="checkbox" id="gp_stream" ${state.stream_openai?'checked':''} onchange="state.stream_openai=this.checked;updatePreview()"/><label for="gp_stream">流式输出 (stream_openai)</label></div>
    <div class="checkbox-row"><input type="checkbox" id="gp_wrap" ${state.wrap_in_quotes?'checked':''} onchange="state.wrap_in_quotes=this.checked;updatePreview()"/><label for="gp_wrap">消息包裹引号 (wrap_in_quotes)</label></div>
    <div class="checkbox-row"><input type="checkbox" id="gp_image" ${state.image_inlining?'checked':''} onchange="state.image_inlining=this.checked;updatePreview()"/><label for="gp_image">图片内联发送 (image_inlining)</label></div>
    <div class="checkbox-row"><input type="checkbox" id="gp_video" ${state.video_inlining?'checked':''} onchange="state.video_inlining=this.checked;updatePreview()"/><label for="gp_video">视频内联发送 (video_inlining)</label></div>
    <div style="margin-top:8px"><div class="param-label"><span>names_behavior</span></div><select onchange="state.names_behavior=parseInt(this.value);updatePreview()"><option value="0" ${state.names_behavior===0?'selected':''}>0 · 默认</option><option value="1" ${state.names_behavior===1?'selected':''}>1 · 始终添加名称</option><option value="2" ${state.names_behavior===2?'selected':''}>2 · 从不添加名称</option></select></div>
    <div style="margin-top:8px"><div class="param-label"><span>bias_preset_selected</span></div><input type="text" value="${escHtml(state.bias_preset_selected)}" oninput="state.bias_preset_selected=this.value;updatePreview()"/></div><div class="param-section"><div class="param-section-header"><span>🔗 导出时绑定正则</span></div><div class="param-section-body"><div class="tag-row" id="presetRegexBindArea"></div><div class="param-hint">勾选后导出预设时将弹窗确认是否包含正则</div></div></div>

  // Format

function bindDrag(selector,dataAttr,callback){
  document.querySelectorAll(selector+' .entry-item').forEach(el=>{
    el.addEventListener('dragstart',e=>{dragSrcIndex=parseInt(el.dataset[dataAttr]);e.dataTransfer.effectAllowed='move'});
    el.addEventListener('dragover',e=>{e.preventDefault();el.classList.add('drag-over')});
    el.addEventListener('dragleave',e=>{el.classList.remove('drag-over')});
    el.addEventListener('drop',e=>{e.preventDefault();el.classList.remove('drag-over');const src=dragSrcIndex,dst=parseInt(el.dataset[dataAttr]);if(src!==dst&&src>=0&&dst>=0)callback(src,dst)});
    el.addEventListener('dragend',()=>{document.querySelectorAll(selector+' .entry-item').forEach(e=>e.classList.remove('drag-over'))});
  });
}

  if(!data)return;

  // ── Build TOC ──
  function buildTOC(sections,prefix,depth){
    var t="",indentPx=depth*14;
    sections.forEach(function(sec,si){
      var id=prefix+"_"+si;
      if(sec.title){
        var st=" style=\"padding-left:"+indentPx+"px;font-size:"+(0.78-depth*0.04).toFixed(2)+"rem\"";
        t+="<div class=\"guide-toc-item\" onclick=\"siScrollTo('"+id+"')\" id=\"siTOC_"+id+"\""+st+">"+sec.title+"</div>";
      }
      if(sec.subsections&&sec.subsections.length>0){
        t+=buildTOC(sec.subsections,id,depth+1);
      }
    });
    return t;
  }
  toc.innerHTML=buildTOC(data.sections,"s",1)||"<div style=\"padding:10px;font-size:.7rem;color:var(--text-muted)\">（空）</div>";

  // ── Render full document ──
  var fullHtml="";
  if(data.disclaimerHtml)fullHtml+="<div class=\"si-disclaimer\">"+data.disclaimerHtml+"</div>";

  function renderSection(sec,pref,depth){
    depth=depth||0;
    var tag="h"+(depth<3?depth+2:4);

    fullHtml+=sec.content||"";
    if(sec.subsections&&sec.subsections.length){
      sec.subsections.forEach(function(sub,si){
        renderSection(sub,pref+"_"+si,depth+1);
      });

/* ── 拉取模型列表 ── */
async function fetchModels(){
  const baseUrl=document.getElementById('apiBaseUrl').value.trim()||'https://api.openai.com/v1';
  const apiKey=document.getElementById('apiApiKey').value.trim();
  if(!apiKey){toast('⚠️ 请先输入 API Key');return}
  const status=document.getElementById('apiModelStatus');
  const btn=document.getElementById('btnFetchModels');
  status.textContent='⏳ 正在拉取模型列表…';status.style.color='var(--text-muted)';
  btn.disabled=true;btn.textContent='⏳ …';
  try{
    const resp=await fetch(`${baseUrl}/models`,{headers:{'Authorization':`Bearer ${apiKey}`}});
    if(!resp.ok){const e=await resp.text();throw new Error(`HTTP ${resp.status}: ${e}`)}
    const data=await resp.json();
    const models=(data.data||data.models||data||[]).map(m=>m.id||m.model||m.name||(typeof m==='string'?m:'')).filter(Boolean).sort();
    const sel=document.getElementById('apiModel');sel.innerHTML='';
    if(!models.length){sel.innerHTML='<option value="">未找到模型</option>';status.textContent='⚠️ 未找到可用模型';status.style.color='var(--danger)';return}
    models.forEach(m=>{const o=document.createElement('option');o.value=m;o.textContent=m;sel.appendChild(o)});
    // 恢复之前保存的模型
    if(aiConfig.model&&models.includes(aiConfig.model))sel.value=aiConfig.model;
    status.textContent=`✅ 找到 ${models.length} 个模型`;status.style.color='var(--success)';
  }catch(e){status.textContent=`❌ 拉取失败：${e.message}`;status.style.color='var(--danger)'}
  finally{btn.disabled=false;btn.textContent='📡 拉取模型'}
}

/* ── 测试 API 连接 ── */
async function testAPIConnection(){
  const baseUrl=document.getElementById('apiBaseUrl').value.trim()||'https://api.openai.com/v1';
  const apiKey=document.getElementById('apiApiKey').value.trim();
  const model=document.getElementById('apiModel').value;
  if(!apiKey){toast('⚠️ 请先输入 API Key');return}
  if(!model){toast('⚠️ 请先拉取并选择模型');return}
  const stat=document.getElementById('apiTestStatus');
  const btn=document.getElementById('btnTestConn');
  stat.textContent='⏳ 正在测试连接…';stat.style.color='var(--text-muted)';
  btn.disabled=true;
  try{
    const resp=await fetch(`${baseUrl}/chat/completions`,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${apiKey}`},
      body:JSON.stringify({model:model,messages:[{role:'user',content:'Hi'}],max_tokens:5})
    });
    if(!resp.ok){const e=await resp.text();throw new Error(`HTTP ${resp.status}: ${e}`)}
    const data=await resp.json();
    const reply=data.choices?.[0]?.message?.content||'';
    stat.textContent=`✅ 连接成功！模型回复：「${reply.trim()}」`;stat.style.color='var(--success)';
    toast('✅ API 连接测试通过')
  }catch(e){stat.textContent=`❌ 连接失败：${e.message}`;stat.style.color='var(--danger)'}
  finally{btn.disabled=false}
}

function getCurrentContext(){
  let ctx='';
  if(editorMode==='preset'&&selectedIndex>=0){const p=state.prompts[selectedIndex];ctx=`【预设提示词】\n名称：${p.name}\n角色：${p.role}\n内容：\n${p.content}`}
  else if(editorMode==='worldbook'&&selectedWBIndex>=0){const e=state.worldbook_entries[selectedWBIndex];ctx=`【世界书条目】\n触发词：${e.keys}\n内容：\n${e.content}`}
  else if(editorMode==='regex'&&selectedRegexIndex>=0){const e=state.regex_entries[selectedRegexIndex];ctx=`【正则条目】\n名称：${e.scriptName}\n匹配：${e.findRegex}\n替换：${e.replaceString}`}
  else if(editorMode==='global'){ctx=`【全局参数】\n预设名称：${state.preset_name}\nTemperature:${state.temperature}\nTop P:${state.top_p}\nTop K:${state.top_k}\nMax Context:${state.openai_max_context}\nMax Tokens:${state.openai_max_tokens}`}
  else if(editorMode==='charcard'&&selectedCharCardIndex>=0){const c=state.charcards[selectedCharCardIndex];ctx=`【角色卡】\n名称：${c.name}\n描述：${c.description}\n性格：${c.personality}\n场景：${c.scenario}\n开场白：${c.first_mes}\n对话示例：${c.mes_example}\n系统提示：${c.system_prompt}\n绑定世界书：${c.bindWorldBooks.length}条\n绑定正则：${c.bindRegex.length}条`}
  else if(editorMode==='editdesk'){ctx=`【编辑台】\n模式：${editDesk.mode}\n源文件：${editDesk.sourceFiles.length}个\n工作区条目：${editDesk.workingEntries.length}条`}
  else{ctx='当前未选中任何编辑内容。'}
  return ctx;
}

function injectContext(){
  const ctx=getCurrentContext();
  const chatArea=document.getElementById('aiChatArea');
  const msgDiv=document.createElement('div');msgDiv.className='ai-msg system';msgDiv.textContent=`📥 已注入当前编辑上下文：\n${ctx}`;
  chatArea.appendChild(msgDiv);chatArea.scrollTop=chatArea.scrollHeight;
  aiMessages.push({role:'system',content:`以下为当前编辑内容参考：\n${ctx}`});
  toast('📥 上下文已注入')
}

async function sendAIMessage(){
  if(aiLoading)return;
  const input=document.getElementById('aiInput');
  const text=input.value.trim();
  if(!text)return;
  if(!aiConfig.apiKey){toast('⚠️ 请先点击「🔌 API设置」配置 API Key');return}

  const chatArea=document.getElementById('aiChatArea');
  const userDiv=document.createElement('div');userDiv.className='ai-msg user';userDiv.textContent=text;
  chatArea.appendChild(userDiv);
  aiMessages.push({role:'user',content:text});
  input.value='';
  chatArea.scrollTop=chatArea.scrollHeight;

  const loadDiv=document.createElement('div');loadDiv.className='ai-loading';loadDiv.innerHTML='<div class="spinner"></div><span>AI 思考中…</span>';
  chatArea.appendChild(loadDiv);chatArea.scrollTop=chatArea.scrollHeight;
  aiLoading=true;

  try{
    const persona=AI_PERSONAS[aiCurrentPersona]||AI_PERSONAS.caelum;
    const messages=[{role:'system',content:persona.prompt}];
    const lastSys=aiMessages.filter(m=>m.role==='system').slice(-2);
    const lastUser=aiMessages.filter(m=>m.role==='user').slice(-6);
    messages.push(...lastSys,...lastUser);

    const resp=await fetch(`${aiConfig.baseUrl}/chat/completions`,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${aiConfig.apiKey}`},
      body:JSON.stringify({
        model:aiConfig.model,
        messages:messages,
        max_tokens:aiConfig.maxTokens||2000,
        temperature:aiConfig.temperature??0.7,
        top_p:aiConfig.topP??0.9
      })
    });
    if(!resp.ok){const err=await resp.text();throw new Error(`HTTP ${resp.status}: ${err}`)}
    const data=await resp.json();
    const reply=data.choices?.[0]?.message?.content||'(空回复)';
    loadDiv.remove();
    const botDiv=document.createElement('div');botDiv.className='ai-msg assistant';botDiv.textContent=reply;
    chatArea.appendChild(botDiv);aiMessages.push({role:'assistant',content:reply});
    chatArea.scrollTop=chatArea.scrollHeight;
  }catch(e){
    loadDiv.remove();
    const errDiv=document.createElement('div');errDiv.className='ai-msg system';errDiv.textContent=`❌ 请求失败：${e.message}`;
    chatArea.appendChild(errDiv);
    chatArea.scrollTop=chatArea.scrollHeight;
  }
  aiLoading=false;
}

  }
  h+=`</div></div>`;

  // ── Horizontal divider ──
  h+=`<div class="editdesk-divider" id="edDivider" onmousedown="startDividerDrag(event)"></div>`;

  // ── Lower panel: working preset ──
  h+=`<div class="editdesk-lower" id="edLower" style="flex:1">
    <div class="editdesk-working-list" id="edWorkingListPanel" style="flex:0 0 ${edLSplit}%">
      <div class="editdesk-working-list-header">
        <span>📝 工作区 (${editDesk.workingEntries.length})</span>
        <button class="btn btn-secondary btn-xs" onclick="openTemplateFile()" title="打开已有文件作为模板">📂</button>
        <button class="btn btn-primary btn-xs" onclick="addWorkingEntry()" title="新建空条目">+</button>
        <button class="btn btn-secondary btn-xs ${editDesk.batchMode?'btn-warning':''}" onclick="toggleEdBatchMode()" title="批量操作模式" style="font-size:.65rem;padding:2px 7px">☑</button>
      </div>
      ${editDesk.batchMode?renderEdBatchBar():''}
      <div class="editdesk-working-list-body" id="edWorkingList">`;
  if(!editDesk.workingEntries.length){
    h+=`<div class="ed-empty"><div class="ed-empty-icon">📋</div><span>选中源条目后<br>点击 📥 复制源条目</span></div>`;
  }else{
    editDesk.workingEntries.forEach((e,i)=>{
      const nm=e.name||e.scriptName||e.keys||(e.uid||e.identifier||'');
      const act=i===editDesk.selectedWorkingIndex?' active':'';
      const checked=editDesk.batchSet.has(i)?' checked':'';
      const bchk=editDesk.batchMode?' ed-batch-checked':'';
      h+=`<div class="ed-working-item${act}${bchk}${editDesk.batchMode?' ed-batch-show':''}" onclick="${editDesk.batchMode?'event.stopPropagation();toggleEdWorkingCheck('+i+')':'selectWorkingEntry('+i+')'}" draggable="${editDesk.batchMode?'false':'true'}" data-widx="${i}">
        <input type="checkbox" class="ed-wcb"${checked} onclick="event.stopPropagation();toggleEdWorkingCheck(${i})" title="选择/取消">
        <span class="drag-handle" style="cursor:${editDesk.batchMode?'default':'grab'};font-size:.6rem;color:var(--text-muted);flex-shrink:0" onclick="event.stopPropagation()" title="${editDesk.batchMode?'':'拖拽排序'}">⠿</span>
        <span class="ed-widx">#${i+1}</span>
        <span class="ed-wname">${escHtml(String(nm).substring(0,28))}</span>
        <span class="ed-wdel" onclick="event.stopPropagation();deleteWorkingEntry(${i})" title="删除">✕</span>
      </div>`;
    });
  }
  h+=`</div></div>
    <div class="ed-vdivider" id="edLowerVDivider" onmousedown="startEDVDividerDrag(event,'lower')"></div>
    <div class="editdesk-working-editor" id="edWorkingEditor" style="flex:1">`;
  if(editDesk.selectedWorkingIndex>=0&&editDesk.selectedWorkingIndex<editDesk.workingEntries.length){
    h+=renderEditDeskWorkingDetail(editDesk.workingEntries[editDesk.selectedWorkingIndex],editDesk.selectedWorkingIndex);
  }else{
    h+=`<div class="ed-empty"><div class="ed-empty-icon">👈</div><span>从左侧列表选择条目编辑</span></div>`;
  }
  h+=`</div></div>`;

  // ── Bottom toolbar ──
  if(editDesk.batchMode){
    const n=editDesk.batchSet.size;
    h+=`<div class="editdesk-working-toolbar" style="background:color-mix(in srgb,var(--accent) 10%,var(--surface));border-top:1px solid var(--accent)">
      <span style="font-size:.72rem;font-weight:700;color:var(--accent)">☑ 批量操作</span>
      <span style="font-size:.68rem;color:var(--text-muted)">(已选 ${n} 项)</span>
      <button class="btn btn-secondary btn-xs" onclick="batchSelectAll()" title="全选">📌 全选</button>
      <button class="btn btn-secondary btn-xs" onclick="batchClearAll()" title="取消全选">✕ 取消</button>
      <span style="flex:1"></span>
      <button class="btn btn-danger btn-xs" onclick="batchDeleteWorking()" ${n===0?'disabled':''}>🗑 批量删除</button>
      <button class="btn btn-secondary btn-xs" onclick="batchMoveWorking(-1)" ${n===0?'disabled':''}>⬆ 批量上移</button>
      <button class="btn btn-secondary btn-xs" onclick="batchMoveWorking(1)" ${n===0?'disabled':''}>⬇ 批量下移</button>
      <button class="btn btn-secondary btn-xs" onclick="batchCopyWorking()" ${n===0?'disabled':''}>📋 批量复制</button>
      <button class="btn btn-warning btn-xs" onclick="toggleEdBatchMode()" style="border-color:var(--accent);color:var(--accent)">✕ 退出批量</button>
    </div>`;
  }else{
    h+=`<div class="editdesk-working-toolbar">
      <button class="btn btn-warning btn-xs" onclick="deleteWorkingEntry(editDesk.selectedWorkingIndex)" ${editDesk.selectedWorkingIndex<0?'disabled':''}>🗑 删除</button>
      <button class="btn btn-secondary btn-xs" onclick="moveWorkingEntry(editDesk.selectedWorkingIndex,-1)" ${editDesk.selectedWorkingIndex<=0?'disabled':''}>⬆ 上移</button>
      <button class="btn btn-secondary btn-xs" onclick="moveWorkingEntry(editDesk.selectedWorkingIndex,1)" ${editDesk.selectedWorkingIndex<0||editDesk.selectedWorkingIndex>=editDesk.workingEntries.length-1?'disabled':''}>⬇ 下移</button>

      <button class="btn btn-secondary btn-xs" onclick="copyFromSourceToWorking()" ${!(editDesk.selectedSourceFileId&&editDesk.selectedSourceEntryIndex>=0)?'disabled':''}>📥 复制源条目</button>

  const _wkScroll=document.getElementById('edWorkingList')?.scrollTop||0;
  const _edScroll=document.getElementById('edWorkingEditor')?.scrollTop||0;
  const _prevScroll=document.getElementById('edSourcePreview')?.scrollTop||0;

  pane.innerHTML=h;

  // ⚡ 同步恢复滚动位置（不经过浏览器渲染帧，无抖动）
  const se=document.getElementById('edSourceEntries');if(se&&_srcScroll)se.scrollTop=_srcScroll;
  const wl=document.getElementById('edWorkingList');if(wl&&_wkScroll)wl.scrollTop=_wkScroll;
  const we=document.getElementById('edWorkingEditor');if(we&&_edScroll)we.scrollTop=_edScroll;
  const sp=document.getElementById('edSourcePreview');if(sp&&_prevScroll)sp.scrollTop=_prevScroll;

    document.querySelectorAll('.ed-sf-entry').forEach(el=>{
      el.addEventListener('dragstart',e=>{e.dataTransfer.setData('text/plain',JSON.stringify({sfid:el.dataset.sfid,seidx:parseInt(el.dataset.seidx),src:'source'}));e.dataTransfer.effectAllowed='copy'});
    });
    // Working items: drag reorder + drop target
    document.querySelectorAll('#edWorkingList .ed-working-item').forEach(el=>{
      el.addEventListener('dragstart',e=>{e.dataTransfer.setData('text/plain',JSON.stringify({widx:parseInt(el.dataset.widx),src:'working'}));e.dataTransfer.effectAllowed='move';editDesk._dragSrcWidx=parseInt(el.dataset.widx)});
      el.addEventListener('dragover',e=>{e.preventDefault();el.classList.add('drag-over')});
      el.addEventListener('dragleave',e=>{el.classList.remove('drag-over')});
      el.addEventListener('drop',e=>{e.preventDefault();el.classList.remove('drag-over');try{const d=JSON.parse(e.dataTransfer.getData('text/plain'));
        if(d.src==='source'&&d.sfid){
          // Copy from source
          const sf=editDesk.sourceFiles.find(f=>f.id===d.sfid);
          if(sf&&d.seidx>=0&&d.seidx<sf.entries.length){
            const ee=deepCloneEntry(sf.entries[d.seidx]);
            const di=parseInt(el.dataset.widx);
            editDesk.workingEntries.splice(di+1,0,ee);
            editDesk.selectedWorkingIndex=di+1;
            renderEditDesk();updatePreview();toast('✅ 已复制条目到工作区');
          }
        }else if(d.src==='working'&&d.widx!==undefined){
          // Reorder within working list
          const srcIdx=d.widx,dstIdx=parseInt(el.dataset.widx);
          if(srcIdx!==dstIdx&&srcIdx>=0&&dstIdx>=0&&srcIdx<editDesk.workingEntries.length&&dstIdx<editDesk.workingEntries.length){
            const moved=editDesk.workingEntries.splice(srcIdx,1)[0];
            editDesk.workingEntries.splice(dstIdx,0,moved);
            editDesk.selectedWorkingIndex=dstIdx;
            renderEditDesk();updatePreview();
          }
        }
      }catch(ex){}});
      el.addEventListener('dragend',e=>{editDesk._dragSrcWidx=-1});
    });
  },50);
  initScrollWatcher();
}

  return JSON.parse(JSON.stringify(e));
}
