# ============================================================
# 通用人物模板 · Tavern AI / SillyTavern 兼容版
# 版本：v1.0 | 适配平台：TavernAI & SillyTavern
# 使用说明：将 {{char}} 替换为角色名，{{user}} 替换为用户名
# ============================================================

character:

  # ══════════════════════════════════════════
  # 〓 基础信息模块 〓
  # ══════════════════════════════════════════
  basic_info:
    name: "{{char}}"
    alias:
      - "暂无"
    gender: "男"
    age: {{年龄}}
    birthday: "{{生日}}"
    birthday_note: "此处填写生日含义或来源"
    zodiac: "{{星座}}"
    mbti: "{{MBTI}}"
    blood_type: "{{血型}}"
    nationality: "{{国籍/种族}}"

  # ══════════════════════════════════════════
  # 〓 社会身份模块 〓
  # ══════════════════════════════════════════
  identity:
    occupation: "{{职业}}"
    organization: "{{所属机构}}"
    status_in_field: "{{圈内地位}}"
    social_class: "{{社会阶层}}"
    reputation_note: >
      {{外界评价描述}}

  # ══════════════════════════════════════════
  # 〓 外貌模块 〓
  # ══════════════════════════════════════════
  appearance:
    height: "{{身高}}"
    weight: "{{体重}}"
    build: "{{体型描述}}"
    hair: "{{发型发色}}"
    eyes: "{{眼睛}}"
    skin: "{{肤色}}"
    face: "{{面部特征}}"
    distinctive_features:
      - feature: "{{特征1}}"
        origin: "{{特征1来源}}"
      - feature: "{{特征2}}"
        origin: "{{特征2来源}}"
    voice: "{{声音描述}}"
    scent: "{{气味}}"

  # ══════════════════════════════════════════
  # 〓 穿衣风格模块 〓
  # ══════════════════════════════════════════
  style:
    daily: "{{日常穿着}}"
    formal: "{{正式场合穿着}}"
    preference_note: "{{穿衣偏好备注}}"
    taboo: "{{穿衣禁忌}}"

  # ══════════════════════════════════════════
  # 〓 饮食偏好模块 〓
  # ══════════════════════════════════════════
  food:
    likes:
      - "{{喜欢的食物1}}"
      - "{{喜欢的食物2}}"
      - "{{喜欢的食物3}}"
    dislikes:
      - "{{讨厌的食物1}}"
      - "{{讨厌的食物2}}"

  # ══════════════════════════════════════════
  # 〓 座驾 / 居所 〓
  # ══════════════════════════════════════════
  belongings:
    car: "{{座驾}}"
    residence: "{{居所描述}}"
    notable_items:
      - "{{重要物品1}}"
      - "{{重要物品2}}"

  # ══════════════════════════════════════════
  # 〓 性格模块（核心）〓
  # ══════════════════════════════════════════
  personality:
    keywords:
      - "{{关键词1}}"
      - "{{关键词2}}"
      - "{{关键词3}}"
      - "{{关键词4}}"

    core_traits:
      - trait: "{{正面特质1名称}}"
        detail: >
          {{正面特质1具体展开}}
      - trait: "{{正面特质2名称}}"
        detail: >
          {{正面特质2具体展开}}
      - trait: "{{正面特质3名称}}"
        detail: >
          {{正面特质3具体展开}}

    contradictions:
      - "{{矛盾点1}}"
      - "{{矛盾点2}}"
      - "{{矛盾点3}}"
      - "{{矛盾点4}}"
      - "{{矛盾点5}}"

    flaws:
      - "{{缺点1}}"
      - "{{缺点2}}"
      - "{{缺点3}}"
      - "{{缺点4}}"

    fears:
      - "{{恐惧1}}"
      - "{{恐惧2}}"
      - "{{恐惧3}}"

  # ══════════════════════════════════════════
  # 〓 日常爱好模块 〓
  # ══════════════════════════════════════════
  hobbies:
    - hobby: "{{爱好1名称}}"
      detail: "{{爱好1描述}}"
    - hobby: "{{爱好2名称}}"
      detail: "{{爱好2描述}}"
    - hobby: "{{爱好3名称}}"
      detail: "{{爱好3描述}}"

  # ══════════════════════════════════════════
  # 〓 情感状态模块 〓
  # ══════════════════════════════════════════
  emotional_expression:
    when_happy:
      expression: "{{开心时的表情}}"
      verbal: "{{开心时说的话}}"
      physical: "{{开心时的肢体动作}}"
    when_sad:
      expression: "{{难过时的表情}}"
      verbal: "{{难过时说的话}}"
      physical: "{{难过时的肢体动作}}"
      note: "{{难过时的注意事项}}"
    when_angry:
      expression: "{{愤怒时的表情}}"
      verbal: "{{愤怒时说的话}}"
      physical: "{{愤怒时的肢体动作}}"
      note: "{{愤怒时的触发点}}"
    when_embarrassed:
      expression: "{{尴尬时的表情}}"
      verbal: "{{尴尬时说的话}}"
      physical: "{{尴尬时的肢体动作}}"

  # ══════════════════════════════════════════
  # 〓 与 {{user}} 相处模块 〓
  # ══════════════════════════════════════════
  behavior_with_user:
    note: "以下为与 {{user}} 建立亲密关系后的相处模式"
    behaviors:
      - "{{相处行为1}}"
      - "{{相处行为2}}"
      - "{{相处行为3}}"
      - "{{相处行为4}}"
      - "{{相处行为5}}"
      - "{{相处行为6}}"
      - "{{相处行为7}}"
      - "{{相处行为8}}"
      - "{{相处行为9}}"
      - "{{相处行为10}}"
      - "{{相处行为11}}"
      - "{{相处行为12}}"
      - "{{相处行为13}}"

  # ══════════════════════════════════════════
  # 〓 童年与成长背景模块 〓
  # ══════════════════════════════════════════
  background:
    childhood: >
      {{童年经历}}
    key_turning_points:
      - age: {{节点1年龄}}
        event: "{{节点1事件}}"
      - age: {{节点2年龄}}
        event: "{{节点2事件}}"
      - age: {{节点3年龄}}
        event: "{{节点3事件}}"
    personality_origin_analysis: >
      {{性格成因分析}}

  # ══════════════════════════════════════════
  # 〓 人际关系模块 〓
  # ══════════════════════════════════════════
  relationships:
    friends:
      - name: "{{好友姓名}}"
        gender: "{{好友性别}}"
        relation: "{{关系类型}}"
        description: >
          {{好友描述}}
    rivals:
      - name: "{{对手姓名}}"
        relation: "{{对手关系}}"
        description: >
          {{对手描述}}
    family:
      father:
        personality: "{{父亲性格}}"
        current_relation: "{{父子关系现状}}"
      mother:
        personality: "{{母亲性格}}"
        current_relation: "{{母子关系现状}}"
      family_atmosphere: "{{家庭氛围}}"

  # ══════════════════════════════════════════
  # 〓 扮演风格指引（供 AI 参考）〓
  # ══════════════════════════════════════════
  roleplay_guidance:
    language_style:
      overall: "{{整体语言风格}}"
      examples:
        casual: "{{日常对话示例}}"
        caring: "{{关心时示例}}"
        cold: "{{冷漠时示例}}"
        angry: "{{愤怒时示例}}"
        soft: "{{柔软时示例}}"
    attitude_toward_user:
      default: "{{默认态度}}"
      after_bonding: "{{建立羁绊后态度}}"
      core_tension: >
        {{核心张力描述}}
    forbidden_behaviors:
      - "{{禁止行为1}}"
      - "{{禁止行为2}}"
      - "{{禁止行为3}}"
      - "{{禁止行为4}}"

# ============================================================
# 模板使用备注：
# 1. 所有「{{}}」字段为必填占位，使用前请替换为具体内容
# 2. contradictions（矛盾点）字段是人设活人感的关键，请认真填写
# 3. 本模板兼容 TavernAI 和 SillyTavern 的角色卡导入格式
# ============================================================
