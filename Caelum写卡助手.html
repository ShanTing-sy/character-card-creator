<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Caelum写卡助手</title>
<style>
  :root, [data-theme="dark"] {
    --bg:#0f1117; --surface:#1a1d27; --surface2:#22263a; --border:#2e3350;
    --accent:#7c6af7; --accent2:#5eead4; --text:#e2e8f0; --text-muted:#7c8bad;
    --danger:#f87171; --success:#4ade80; --warning:#fbbf24;
    --shadow:rgba(0,0,0,.45); --scrollbar:#2e3350; --badge-text:#fff;
    --ai-user:#7c6af7; --ai-bot:#5eead4;
  }
  [data-theme="light"] {
    --bg:#f0f2f8; --surface:#fff; --surface2:#eef0f8; --border:#d0d5e8;
    --accent:#5b4fd4; --accent2:#0d9488; --text:#1e2240; --text-muted:#6b7280;
    --danger:#dc2626; --success:#16a34a; --warning:#d97706;
    --shadow:rgba(0,0,0,.12); --scrollbar:#c5cae0; --badge-text:#fff;
    --ai-user:#5b4fd4; --ai-bot:#0d9488;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--bg);color:var(--text);
    font-family:'Segoe UI','PingFang SC','Helvetica Neue',sans-serif;
    height:100vh;overflow:hidden;display:flex;flex-direction:column;
    transition:background .25s,color .25s;
  }

  /* Header */
  header{
    background:var(--surface);border-bottom:1px solid var(--border);
    padding:0 20px;height:52px;flex-shrink:0;display:flex;align-items:center;gap:12px;
    z-index:200;box-shadow:0 2px 8px var(--shadow);
    transition:background .25s,border-color .25s,box-shadow .25s;
  }
  header h1{font-size:1.05rem;font-weight:700;letter-spacing:.03em;white-space:nowrap}
  header h1 span{color:var(--accent)}
  .header-logo{font-size:1.4rem;line-height:1}
  .header-actions{margin-left:auto;display:flex;align-items:center;gap:7px}
  .theme-toggle{display:flex;align-items:center;background:var(--surface2);border:1px solid var(--border);border-radius:18px;padding:2px;gap:1px}
  .theme-btn{display:flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:14px;border:none;cursor:pointer;font-size:.8rem;background:transparent;color:var(--text-muted);transition:background .18s,color .18s}
  .theme-btn.active{background:var(--accent);color:#fff}
  .theme-divider{width:1px;height:18px;background:var(--border);margin:0 3px}

  /* Buttons */
  .btn{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;border-radius:7px;border:none;font-size:.8rem;font-weight:600;cursor:pointer;white-space:nowrap;transition:filter .15s,transform .1s,background .2s}
  .btn:hover{filter:brightness(1.12)} .btn:active{transform:scale(.96)}
  .btn-primary{background:var(--accent);color:#fff}
  .btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
  .btn-danger{background:color-mix(in srgb,var(--danger) 15%,var(--surface2));color:var(--danger);border:1px solid color-mix(in srgb,var(--danger) 35%,var(--border))}
  .btn-success{background:color-mix(in srgb,var(--success) 15%,var(--surface2));color:var(--success);border:1px solid color-mix(in srgb,var(--success) 35%,var(--border))}
  .btn-warning{background:color-mix(in srgb,var(--warning) 15%,var(--surface2));color:var(--warning);border:1px solid color-mix(in srgb,var(--warning) 35%,var(--border))}
  .btn-sm{padding:4px 9px;font-size:.74rem}
  .btn-xs{padding:3px 7px;font-size:.68rem;border-radius:5px}

  /* Workspace */
  .workspace{display:grid;grid-template-columns:1fr 360px;flex:1;min-height:0;overflow:hidden}

  /* Editor Panel */
  .editor-panel{display:flex;flex-direction:column;min-height:0;overflow:hidden;background:var(--bg);transition:background .25s}
  .editor-toolbar{background:var(--surface);border-bottom:1px solid var(--border);padding:6px 14px;display:flex;align-items:center;gap:8px;flex-shrink:0;font-size:.73rem;color:var(--text-muted)}
  .editor-body{flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden}

  /* Bottom Tabs */
  .bottom-tabs{background:var(--surface);border-top:1px solid var(--border);padding:0 10px;display:flex;align-items:center;gap:1px;flex-shrink:0;height:38px;transition:background .25s,border-color .25s}
  .bottom-tab{padding:5px 12px;font-size:.74rem;font-weight:600;cursor:pointer;color:var(--text-muted);border:none;background:transparent;border-bottom:3px solid transparent;transition:color .15s,border-color .15s;white-space:nowrap;border-radius:0}
  .bottom-tab.active{color:var(--accent2);border-bottom-color:var(--accent2)}
  .bottom-tab:hover:not(.active){color:var(--text)}

  /* Editor Panes */
  .editor-pane{display:none;flex:1;flex-direction:column;min-height:0;overflow-y:auto}
  .editor-pane.active{display:flex}

  /* Two-panel split (preset/wb/regex) */
  .editor-split{display:flex;flex:1;min-height:0;overflow:hidden}
  .editor-list-panel{width:272px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column;min-height:0;overflow:hidden;background:color-mix(in srgb,var(--surface) 70%,var(--bg))}
  .editor-list-header{padding:8px 10px;border-bottom:1px solid var(--border);font-size:.7rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
  .editor-list-body{flex:1;overflow-y:auto;padding:4px}
  .editor-detail-panel{flex:1;min-height:0;overflow-y:auto;padding:14px 18px;display:flex;flex-direction:column;gap:12px}

  /* Entry items */
  .entry-item{display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:6px;cursor:pointer;border:1px solid transparent;margin-bottom:2px;transition:background .12s,border-color .12s;user-select:none;font-size:.75rem}
  .entry-item:hover{background:var(--surface2)}
  .entry-item.active{background:var(--surface2);border-color:var(--accent)}
  .entry-item.drag-over{border-color:var(--accent2);background:color-mix(in srgb,var(--accent2) 10%,var(--surface2))}
  .drag-handle{cursor:grab;color:var(--text-muted);font-size:.7rem;flex-shrink:0}
  .drag-handle:active{cursor:grabbing}

  /* Right Panel */
  .right-panel{background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;min-height:0;overflow:hidden;transition:background .25s,border-color .25s}
  .right-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
  .right-tab{flex:1;padding:8px 6px;font-size:.71rem;font-weight:600;text-align:center;cursor:pointer;color:var(--text-muted);border:none;background:transparent;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;white-space:nowrap}
  .right-tab.active{color:var(--accent2);border-bottom-color:var(--accent2)}
  .right-tab:hover:not(.active){color:var(--text)}
  .right-pane{display:none;flex:1;flex-direction:column;min-height:0;overflow:hidden}
  .right-pane.active{display:flex}

  /* JSON Preview */
  .preview-body{flex:1;overflow-y:auto;padding:12px}
  .preview-body pre{font-family:'Cascadia Code','Fira Code','Consolas',monospace;font-size:.72rem;line-height:1.65;color:var(--accent2);white-space:pre-wrap;word-break:break-all;transition:color .25s}

  /* AI Assistant */
  .ai-config-bar{padding:8px 10px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .ai-config-bar input,.ai-config-bar select{width:auto;font-size:.7rem;padding:4px 7px;min-width:0}
  .ai-config-bar input[type="password"]{width:130px}
  .ai-config-bar input[type="text"]{width:150px}
  .ai-chat-area{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px}
  .ai-msg{max-width:95%;padding:8px 11px;border-radius:10px;font-size:.76rem;line-height:1.55;white-space:pre-wrap;word-break:break-word;animation:fadeIn .2s}
  .ai-msg.user{align-self:flex-end;background:var(--ai-user);color:#fff;border-bottom-right-radius:3px;margin-left:20px}
  .ai-msg.assistant{align-self:flex-start;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-bottom-left-radius:3px;margin-right:20px}
  .ai-msg.system{font-size:.7rem;color:var(--text-muted);align-self:center;text-align:center;background:transparent;padding:4px}
  @keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
  .ai-input-row{display:flex;gap:6px;padding:8px 10px;border-top:1px solid var(--border);flex-shrink:0}
  .ai-input-row textarea{flex:1;min-height:40px;max-height:80px;font-size:.76rem;resize:none;padding:7px 10px}
  .ai-loading{display:flex;align-items:center;gap:6px;padding:8px;font-size:.72rem;color:var(--text-muted)}
  .ai-loading .spinner{width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* Form Elements */
  .field-group{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:13px;transition:background .25s,border-color .25s}
  .field-group>label,.field-group>.group-label{display:block;font-size:.72rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:9px;font-weight:700}
  .sub-label{font-size:.71rem;color:var(--text-muted);margin-bottom:4px;display:block}
  input[type="text"],input[type="number"],input[type="password"],select,textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:inherit;font-size:.84rem;padding:7px 10px;outline:none;transition:border-color .15s,background .25s,color .25s}
  input:focus,select:focus,textarea:focus{border-color:var(--accent)}
  textarea{resize:vertical;min-height:110px;font-family:'Cascadia Code','Fira Code',monospace;font-size:.78rem;line-height:1.6}
  textarea.short{min-height:45px}
  select option{background:var(--surface2);color:var(--text)}
  .field-row{display:flex;gap:10px}.field-row>*{flex:1}
  .checkbox-row{display:flex;align-items:center;gap:8px;padding:2px 0}
  .checkbox-row input[type="checkbox"]{width:14px;height:14px;accent-color:var(--accent);cursor:pointer;flex-shrink:0}
  .checkbox-row label{margin:0;text-transform:none;letter-spacing:0;font-size:.81rem;color:var(--text);cursor:pointer}
  .param-label{font-size:.7rem;color:var(--text-muted);margin-bottom:4px;display:flex;align-items:center;gap:4px}
  .param-label span{font-weight:700}
  .param-hint{font-size:.65rem;color:var(--text-muted);opacity:.75;margin-top:2px}
  .slider-row{display:flex;align-items:center;gap:7px}
  .slider-row input[type="range"]{flex:1;accent-color:var(--accent);height:4px;padding:0;border:none;background:transparent;cursor:pointer}
  .slider-row input[type="number"]{width:60px;flex-shrink:0;padding:4px 6px;font-size:.78rem;text-align:center}
  .param-section{background:var(--surface);border:1px solid var(--border);border-radius:9px;overflow:hidden;transition:background .25s,border-color .25s}
  .param-section-header{padding:7px 11px;background:color-mix(in srgb,var(--accent) 8%,var(--surface));border-bottom:1px solid var(--border);font-size:.7rem;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.07em;display:flex;align-items:center;gap:5px}
  .param-section-body{padding:10px;display:flex;flex-direction:column;gap:8px}
  .macro-strip{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
  .order-section{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:12px;transition:background .25s,border-color .25s}
  .order-chips{display:flex;flex-wrap:wrap;gap:6px}
  .order-chip{display:flex;align-items:center;gap:5px;padding:3px 9px;border-radius:18px;background:var(--surface2);border:1px solid var(--border);font-size:.73rem}
  .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;height:100%;color:var(--text-muted);font-size:.85rem}
  .empty-state .icon{font-size:2.8rem}
  .toggle-enabled{width:12px;height:12px;border-radius:50%;flex-shrink:0;cursor:pointer;border:2px solid var(--border);transition:background .15s,border-color .15s}
  .toggle-enabled.on{background:var(--accent2);border-color:var(--accent2)}
  .toggle-enabled.off{background:transparent}
  .tag-row{display:flex;flex-wrap:wrap;gap:5px;align-items:center}
  .tag-chip{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:12px;font-size:.7rem;font-weight:600;background:var(--surface2);border:1px solid var(--border);color:var(--text)}
  .tag-chip.on{background:color-mix(in srgb,var(--accent2) 18%,var(--surface2));border-color:var(--accent2)}
  .tag-chip.off{opacity:.55}
  .regex-test-area{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:10px;margin-top:5px}
  .regex-test-result{margin-top:7px;padding:8px 11px;border-radius:5px;font-family:'Cascadia Code','Fira Code',monospace;font-size:.73rem;white-space:pre-wrap;word-break:break-all;min-height:18px;border:1px dashed var(--border);color:var(--text)}
  .regex-test-result.match{border-color:var(--success);background:color-mix(in srgb,var(--success) 8%,transparent)}
  .regex-test-result.nomatch{border-color:var(--danger);background:color-mix(in srgb,var(--danger) 8%,transparent);color:var(--danger)}
  .regex-error-msg{font-size:.7rem;color:var(--danger);margin-top:3px}
  #backToTop{position:fixed;bottom:26px;right:26px;width:36px;height:36px;border-radius:50%;background:var(--accent);color:#fff;border:none;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px var(--shadow);opacity:0;pointer-events:none;transform:translateY(10px);transition:opacity .25s,transform .25s;z-index:999}
  #backToTop.visible{opacity:1;pointer-events:auto;transform:translateY(0)}
  #backToTop:hover{filter:brightness(1.15)}
  #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(14px);background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:8px 20px;font-size:.81rem;opacity:0;pointer-events:none;transition:opacity .28s,transform .28s;z-index:9999;white-space:nowrap;box-shadow:0 4px 16px var(--shadow)}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  ::-webkit-scrollbar{width:4px;height:4px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--scrollbar);border-radius:3px}
  .badge{display:inline-flex;align-items:center;justify-content:center;font-size:.62rem;font-weight:700;padding:2px 6px;border-radius:9px;background:var(--accent);color:var(--badge-text)}

  /* ══════════════════════════════════════════
     API Settings Modal
  ══════════════════════════════════════════ */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9998;display:none;align-items:center;justify-content:center}
  .modal-overlay.show{display:flex}
  .modal-dialog{background:var(--surface);border:1px solid var(--border);border-radius:12px;width:440px;max-height:85vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.5);padding:20px 24px;display:flex;flex-direction:column;gap:14px}
  .modal-dialog h3{font-size:.95rem;font-weight:700;color:var(--text);margin:0}
  .modal-dialog .modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:4px}

  /* ══════════════════════════════════════════
     角色卡创作界面
  ══════════════════════════════════════════ */
  .cc-image-section{display:flex;gap:12px;align-items:flex-start}
  .cc-image-preview{width:96px;height:96px;border-radius:10px;border:2px dashed var(--border);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;background:var(--surface2);transition:border-color .15s}
  .cc-image-preview img{width:100%;height:100%;object-fit:cover}
  .cc-image-preview.has-image{border-style:solid;border-color:var(--accent)}
  .cc-image-actions{display:flex;flex-direction:column;gap:5px}
  .cc-bind-section{background:var(--surface);border:1px solid var(--border);border-radius:9px;overflow:hidden;transition:background .25s,border-color .25s}
  .cc-bind-header{padding:8px 12px;background:color-mix(in srgb,var(--accent2) 8%,var(--surface));border-bottom:1px solid var(--border);font-size:.7rem;font-weight:700;color:var(--accent2);text-transform:uppercase;letter-spacing:.07em;display:flex;align-items:center;justify-content:space-between}
  .cc-bind-body{padding:8px;max-height:180px;overflow-y:auto;display:flex;flex-direction:column;gap:3px}
  .cc-bind-item{display:flex;align-items:center;gap:7px;padding:4px 8px;border-radius:5px;cursor:pointer;font-size:.73rem;transition:background .12s}
  .cc-bind-item:hover{background:var(--surface2)}
  .cc-bind-item input[type="checkbox"]{width:13px;height:13px;accent-color:var(--accent2);cursor:pointer;flex-shrink:0}
  .cc-bind-item span{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cc-empty-hint{font-size:.7rem;color:var(--text-muted);padding:6px 8px;text-align:center}
</style>
</head>
<body>

<header>
  <span class="header-logo">🌌</span>
  <h1>Caelum<span>写卡助手</span></h1>
  <div class="header-actions">
    <!-- AI 助手选择 -->
    <select id="aiPersonaSelect" onchange="switchAIPersona(this.value)" style="width:auto;font-size:.73rem;padding:5px 8px" title="选择 AI 助手人格">
      <option value="caelum">🌌 山停 · 万能辅助</option>
      <option value="ying">🎭 影 · 角色塑造</option>
      <option value="xian">🎪 弦 · 情节设计</option>
      <option value="rang">🌍 壤 · 世界观构筑</option>
    </select>
    <button class="btn btn-secondary btn-xs" onclick="editPersonaPrompt()" title="编辑当前助手的系统提示词" style="padding:4px 7px">✏️</button>
    <!-- API 配置按钮 -->
    <button class="btn btn-secondary btn-sm" onclick="openAPISettings()" title="配置 API 连接和参数">🔌 API设置</button>
    <div class="theme-divider"></div>
    <button class="btn btn-warning btn-sm" onclick="clearAll()" title="一键清除所有数据">🗑 一键清除</button>
    <div class="theme-divider"></div>
    <div class="theme-toggle" title="切换主题">
      <button class="theme-btn active" id="btnDark"  onclick="setTheme('dark')" title="深色">🌙</button>
      <button class="theme-btn"        id="btnLight" onclick="setTheme('light')" title="浅色">☀️</button>
    </div>
    <div class="theme-divider"></div>
    <button class="btn btn-secondary" onclick="doImport()">📂 导入</button>
    <button class="btn btn-secondary" onclick="newPreset()">✨ 新建</button>
    <button class="btn btn-success"   onclick="exportPreset()">💾 导出</button>
  </div>
</header>

<div class="workspace">

  <!-- ═══════ 编辑区 ═══════ -->
  <div class="editor-panel">
    <div class="editor-toolbar" id="editorToolbar">
      <span>💡 选择左侧条目进行编辑，可使用底部标签切换编辑器</span>
    </div>
    <div class="editor-body" id="editorBody">
      <div class="editor-pane active" id="panePreset"></div>
      <div class="editor-pane" id="paneWorldBook"></div>
      <div class="editor-pane" id="paneRegex"></div>
      <div class="editor-pane" id="paneGlobal"></div>
      <div class="editor-pane" id="paneCharCard"></div>
    </div>
    <div class="bottom-tabs">
      <button class="bottom-tab active" id="btabPreset" onclick="switchEditorMode('preset')">📝 预设</button>
      <button class="bottom-tab" id="btabWorldBook" onclick="switchEditorMode('worldbook')">📚 世界书</button>
      <button class="bottom-tab" id="btabRegex" onclick="switchEditorMode('regex')">🔧 正则</button>
      <button class="bottom-tab" id="btabGlobal" onclick="switchEditorMode('global')">⚙️ 全局参数</button>
      <button class="bottom-tab" id="btabCharCard" onclick="switchEditorMode('charcard')">🎭 角色卡</button>
    </div>
  </div>

  <!-- ═══════ 右侧面板 ═══════ -->
  <div class="right-panel">
    <div class="right-tabs">
      <button class="right-tab active" id="rtabPreview" onclick="switchRightTab('preview')">📄 JSON预览</button>
      <button class="right-tab" id="rtabAI" onclick="switchRightTab('ai')">🤖 AI助手</button>
    </div>

    <!-- JSON 预览 -->
    <div class="right-pane active" id="rpanePreview">
      <div style="padding:8px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0">
        <span style="font-size:.71rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em">JSON 实时预览</span>
        <button class="btn btn-secondary btn-xs" onclick="copyJson()">📋 复制</button>
      </div>
      <div class="preview-body"><pre id="jsonPreview">{}</pre></div>
    </div>

    <!-- AI 助手 -->
    <div class="right-pane" id="rpaneAI">
      <div style="padding:6px 10px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:space-between">
        <span style="font-size:.7rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em" id="aiPersonaLabel">🤖 山停 · 万能辅助</span>
        <button class="btn btn-secondary btn-xs" onclick="clearAIChat()" title="清空对话">🗑</button>
      </div>
      <div class="ai-chat-area" id="aiChatArea">

      placeholder="输入自定义系统提示词…"></textarea>

<script>
/* ═══════════════════════════════════════════
   State
═══════════════════════════════════════════ */
let state = {
  preset_name:'新预设',
  temperature:1, top_p:1, top_k:0, top_a:0, min_p:0,
  repetition_penalty:1, frequency_penalty:0, presence_penalty:0,
  max_context_unlocked:false, openai_max_context:200000, openai_max_tokens:4096,
  stream_openai:true, names_behavior:0,
  wrap_in_quotes:false, image_inlining:false, video_inlining:false,
  send_if_empty:'', impersonation_prompt:'', new_chat_prompt:'',
  new_group_chat_prompt:'[Start a new group chat. Group members: {{group}}]',
  new_example_chat_prompt:'[Example Chat]',
  continue_nudge_prompt:'', group_nudge_prompt:'', bias_preset_selected:'Default (none)',
  wi_format:'{0}', scenario_format:'{{scenario}}', personality_format:'{{personality}}',
  prompts:[], prompt_order:[{character_id:100001,order:[]}],
  worldbook_entries:[], regex_entries:[],
  charcards:[],
};
let selectedIndex=-1, selectedWBIndex=-1, selectedRegexIndex=-1, selectedCharCardIndex=-1;
let dragSrcIndex=-1, editorMode='preset', rightTab='preview';

// AI 状态
let aiConfig={baseUrl:'https://api.openai.com/v1',apiKey:'',model:'gpt-4o',maxTokens:2000,temperature:0.7,topP:0.9};
let aiMessages=[];
let aiLoading=false;
let aiCurrentPersona='caelum';

/* ═══════════════════════════════════════════
   Theme
═══════════════════════════════════════════ */
function setTheme(t){
  document.documentElement.setAttribute('data-theme',t);
  document.getElementById('btnDark').classList.toggle('active',t==='dark');
  document.getElementById('btnLight').classList.toggle('active',t==='light');
  localStorage.setItem('st_editor_theme',t);
}
(function(){setTheme(localStorage.getItem('st_editor_theme')||'dark')})();

/* ═══════════════════════════════════════════
   Right Tab
═══════════════════════════════════════════ */
function switchRightTab(t){
  rightTab=t;
  document.getElementById('rtabPreview').classList.toggle('active',t==='preview');
  document.getElementById('rtabAI').classList.toggle('active',t==='ai');
  document.getElementById('rpanePreview').classList.toggle('active',t==='preview');
  document.getElementById('rpaneAI').classList.toggle('active',t==='ai');
  if(t==='ai') loadAIConfig();
}

/* ═══════════════════════════════════════════
   Editor Mode Switch
═══════════════════════════════════════════ */
function switchEditorMode(mode){
  editorMode=mode;
  selectedWBIndex=-1; selectedRegexIndex=-1;
  const map={preset:['btabPreset','panePreset'],worldbook:['btabWorldBook','paneWorldBook'],regex:['btabRegex','paneRegex'],global:['btabGlobal','paneGlobal'],charcard:['btabCharCard','paneCharCard']};
  Object.entries(map).forEach(([m,[btab,pane]])=>{
    document.getElementById(btab).classList.toggle('active',mode===m);
    document.getElementById(pane).classList.toggle('active',mode===m);
  });
  const tooltips={
    preset:'📝 预设编辑器 — 左侧选择提示词，右侧编辑内容',
    worldbook:'📚 世界书编辑器 — 可拖拽排序条目',
    regex:'🔧 正则编辑器 — 可拖拽排序条目，内置测试工具',
    global:'⚙️ 全局参数 — 配置模型采样、上下文、行为开关等',
    charcard:'🎭 角色卡创作 — 创建角色卡，导入图片，绑定世界书与正则'
  };
  document.getElementById('editorToolbar').innerHTML=`<span>${tooltips[mode]||''}</span>`;
  if(mode==='preset')renderEditor();
  else if(mode==='worldbook')renderWorldBookEditor();
  else if(mode==='regex')renderRegexEditor();
  else if(mode==='global')renderGlobalEditor();
  else if(mode==='charcard')renderCharCardEditor();
  updatePreview();
}

/* ═══════════════════════════════════════════
   Scroll
═══════════════════════════════════════════ */
function initScrollWatcher(){
  const panes=document.querySelectorAll('.editor-pane,.editor-detail-panel,.right-pane');
  const btn=document.getElementById('backToTop');
  panes.forEach(p=>p.addEventListener('scroll',()=>btn.classList.toggle('visible',p.scrollTop>180)));
}
function scrollToTop(){
  const a=document.querySelector('.editor-pane.active,.right-pane.active');
  if(a)a.scrollTo({top:0,behavior:'smooth'});
}

/* ═══════════════════════════════════════════
   Utils
═══════════════════════════════════════════ */
function escHtml(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
let toastTimer;
function toast(m){const e=document.getElementById('toast');e.textContent=m;e.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>e.classList.remove('show'),2200)}

function makePrompt(id){return{identifier:`prompt_${id}`,name:'新提示词',system_prompt:false,role:'system',content:'',enabled:true,marker:false,injection_position:0,injection_depth:4,injection_order:100,forbid_overrides:false}}
function makeWorldBookEntry(id){return{uid:`wb_${id}`,keys:'',content:'',comment:'',selective:false,constant:false,position:0,depth:4,order:100,probability:100,use_regex:false,exclude_recursion:false,enabled:true}}
function makeRegexEntry(id){return{uid:`regex_${id}`,id:'',scriptName:'',findRegex:'',replaceString:'',trimStrings:[],placement:[2],disabled:false,markdownOnly:false,promptOnly:false,runOnEdit:true,substituteRegex:0,minDepth:null,maxDepth:null}}
function makeCharCard(id){return{id:`cc_${id}`,name:'新角色',description:'',personality:'',scenario:'',first_mes:'',mes_example:'',system_prompt:'',post_history_instructions:'',creator_notes:'',creator:'',character_version:'',tags:'',image:'',bindWorldBooks:[],bindRegex:[],alternate_greetings:[]}}

/* ═══════════════════════════════════════════
   Preset Editor (two-panel)
═══════════════════════════════════════════ */
function selectPrompt(i){selectedIndex=i;if(editorMode!=='preset')switchEditorMode('preset');else renderEditor()}

function renderEditor(){
  if(editorMode!=='preset')return;
  const pane=document.getElementById('panePreset');
  const prompts=state.prompts;
  const roleEmoji={system:'⚙️',user:'👤',assistant:'🤖'};
  const roleName={system:'系统',user:'用户',assistant:'助手'};

  let h=`<div class="editor-split">
    <div class="editor-list-panel">
      <div class="editor-list-header"><span>📝 提示词 (${prompts.length})</span>
        <button class="btn btn-primary btn-xs" onclick="addPrompt()">+</button>
      </div>
      <div class="editor-list-body" id="promptListBody">`;
  if(!prompts.length)h+=`<div style="padding:16px;text-align:center;color:var(--text-muted);font-size:.78rem">暂无提示词</div>`;
  else prompts.forEach((p,i)=>{h+=`
    <div class="entry-item${i===selectedIndex?' active':''}" onclick="selectPrompt(${i})" draggable="true" data-pidx="${i}" id="pitem_${i}">
      <span class="drag-handle" title="拖拽排序" onclick="event.stopPropagation()">⠿</span>
      <span style="font-size:.82rem;flex-shrink:0">${roleEmoji[p.role]||'📄'}</span>
      <div style="flex:1;min-width:0">
        <div style="font-size:.77rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escHtml(p.name||'未命名')}</div>
        <div style="font-size:.66rem;color:var(--text-muted)">${roleName[p.role]||p.role}${p.marker?' · 标记':''}${p.system_prompt?' · 系统':''}</div>
      </div>
      <span class="toggle-enabled ${p.enabled?'on':'off'}" title="启用/禁用" onclick="event.stopPropagation();state.prompts[${i}].enabled=!state.prompts[${i}].enabled;renderEditor();updatePreview()"></span>
    </div>`;});
  h+=`</div></div><div class="editor-detail-panel" id="presetDetail">`;

  if(selectedIndex>=0&&selectedIndex<prompts.length)h+=renderPromptDetail(prompts[selectedIndex],selectedIndex);
  else h+=`<div class="empty-state"><span class="icon">👆</span><span>从左侧列表选择一条提示词进行编辑</span></div>`;

  h+=`</div></div>`;
  const oldScroll=document.getElementById('promptListBody')?.scrollTop||0;
  pane.innerHTML=h;
  const newList=document.getElementById('promptListBody');
  if(newList&&oldScroll>0)newList.scrollTop=oldScroll;

  // 拖拽
  setTimeout(()=>{
    document.querySelectorAll('#promptListBody .entry-item').forEach(el=>{
      el.addEventListener('dragstart',e=>{dragSrcIndex=parseInt(el.dataset.pidx);e.dataTransfer.effectAllowed='move'});
      el.addEventListener('dragover',e=>{e.preventDefault();el.classList.add('drag-over')});
      el.addEventListener('dragleave',e=>{el.classList.remove('drag-over')});
      el.addEventListener('drop',e=>{e.preventDefault();el.classList.remove('drag-over');const src=dragSrcIndex,dst=parseInt(el.dataset.pidx);if(src!==dst&&src>=0&&dst>=0){const m=state.prompts.splice(src,1)[0];state.prompts.splice(dst,0,m);syncPromptOrder();selectedIndex=dst;renderEditor();updatePreview()}});
      el.addEventListener('dragend',()=>{document.querySelectorAll('#promptListBody .entry-item').forEach(e=>e.classList.remove('drag-over'))});
    });
  },50);
  initScrollWatcher();
}

function renderPromptDetail(p,idx){
  const macros=['{{char}}','{{user}}','{{personality}}','{{description}}','{{scenario}}','{{mesExamples}}','{{history}}','{{group}}'];
  return `
    <div class="field-group"><label>标识符 &amp; 名称</label>
      <div class="field-row">
        <div><span class="sub-label">identifier</span><input type="text" value="${escHtml(p.identifier)}" oninput="updateField('identifier',this.value)"/></div>
        <div><span class="sub-label">显示名称</span><input type="text" value="${escHtml(p.name)}" oninput="updateField('name',this.value);renderEditor()"/></div>
      </div></div>
    <div class="field-group"><label>角色 &amp; 属性</label>
      <div class="field-row" style="margin-bottom:10px">
        <div><span class="sub-label">role</span><select onchange="updateField('role',this.value);renderEditor()"><option value="system" ${p.role==='system'?'selected':''}>system</option><option value="user" ${p.role==='user'?'selected':''}>user</option><option value="assistant" ${p.role==='assistant'?'selected':''}>assistant</option></select></div>
        <div><span class="sub-label">injection_position</span><select onchange="updateField('injection_position',parseInt(this.value))"><option value="0" ${p.injection_position===0?'selected':''}>0 · 相对位置</option><option value="1" ${p.injection_position===1?'selected':''}>1 · 绝对位置</option></select></div>
      </div>
      <div class="field-row" style="margin-bottom:10px">
        <div><span class="sub-label">injection_depth</span><input type="number" value="${p.injection_depth}" min="0" max="100" oninput="updateField('injection_depth',parseInt(this.value)||0)"/></div>
        <div><span class="sub-label">injection_order</span><input type="number" value="${p.injection_order??100}" min="0" max="1000" oninput="updateField('injection_order',parseInt(this.value)||100)"/></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:5px">${[['chk_enabled','enabled',p.enabled,'启用'],['chk_marker','marker',p.marker,'标记位'],['chk_system','system_prompt',p.system_prompt,'系统提示'],['chk_forbid','forbid_overrides',p.forbid_overrides,'禁止覆盖']].map(([id,key,val,label])=>`<div class="checkbox-row"><input type="checkbox" id="${id}" ${val?'checked':''} onchange="updateField('${key}',this.checked)${key==='enabled'?';renderEditor()':''}"/><label for="${id}">${label}</label></div>`).join('')}</div></div>
    <div class="field-group"><label>内容 (content)</label>
      <textarea rows="10" id="contentArea" placeholder="在此输入提示词内容…" oninput="updateField('content',this.value)">${escHtml(p.content)}</textarea>
      <div class="macro-strip">${macros.map(m=>`<button class="btn btn-secondary btn-xs" onclick="insertMacro('${m}')">${m}</button>`).join('')}</div></div>
    <div class="order-section"><label>Prompt Order · 队列顺序预览</label><p style="font-size:.73rem;color:var(--text-muted);margin-bottom:8px">拖拽列表可调整顺序</p><div class="order-chips">${(state.prompt_order[0]?.order||[]).map((o,i)=>{const f=state.prompts.find(pp=>pp.identifier===o.identifier);return`<div class="order-chip" title="${escHtml(o.identifier)}"><span style="color:var(--text-muted);font-size:.65rem">#${i+1}</span><span>${f?escHtml(f.name):escHtml(o.identifier)}</span><span class="toggle-enabled ${o.enabled?'on':'off'}" style="width:8px;height:8px"></span></div>`;}).join('')}</div></div>
    <div style="display:flex;justify-content:flex-end"><button class="btn btn-danger btn-sm" onclick="deletePrompt()">🗑 删除此提示词</button></div>`;
}

function updateField(key,value){if(selectedIndex<0)return;state.prompts[selectedIndex][key]=value;syncPromptOrder();updatePreview()}
function insertMacro(m){const ta=document.getElementById('contentArea');if(!ta)return;const s=ta.selectionStart,e=ta.selectionEnd,v=ta.value;ta.value=v.substring(0,s)+m+v.substring(e);ta.selectionStart=ta.selectionEnd=s+m.length;updateField('content',ta.value);ta.focus()}
function syncPromptOrder(){const m={};(state.prompt_order[0]?.order||[]).forEach(o=>{m[o.identifier]=o.enabled});state.prompt_order[0]={character_id:state.prompt_order[0]?.character_id??100001,order:state.prompts.map(p=>({identifier:p.identifier,enabled:m[p.identifier]!==undefined?m[p.identifier]:p.enabled}))}}
function addPrompt(){const p=makePrompt(Date.now());if(selectedIndex>=0&&selectedIndex<state.prompts.length){state.prompts.splice(selectedIndex+1,0,p);selectedIndex++}else{state.prompts.push(p);selectedIndex=state.prompts.length-1}syncPromptOrder();if(editorMode!=='preset')switchEditorMode('preset');else renderEditor();updatePreview();toast('✅ 已添加提示词')}
function deletePrompt(){if(selectedIndex<0)return;state.prompts.splice(selectedIndex,1);syncPromptOrder();selectedIndex=Math.min(selectedIndex,state.prompts.length-1);renderEditor();updatePreview();toast('🗑 已删除')}

/* ═══════════════════════════════════════════
   World Book Editor
═══════════════════════════════════════════ */
function renderWorldBookEditor(){
  if(editorMode!=='worldbook')return;
  const pane=document.getElementById('paneWorldBook');
  const entries=state.worldbook_entries;
  if(!entries.length&&selectedWBIndex<0){pane.innerHTML=`<div class="empty-state"><span class="icon">📚</span><span>暂无世界书条目</span><div style="display:flex;gap:6px;margin-top:6px"><button class="btn btn-primary btn-sm" onclick="addWBEntry()">+ 添加</button><button class="btn btn-secondary btn-sm" onclick="importWorldBook()">📂 导入</button></div></div>`;return}
  let h=`<div class="editor-split"><div class="editor-list-panel"><div class="editor-list-header"><span>📚 条目 (${entries.length})</span><div style="display:flex;gap:2px"><button class="btn btn-primary btn-xs" onclick="addWBEntry()">+</button><button class="btn btn-secondary btn-xs" onclick="importWorldBook()">📂</button><button class="btn btn-secondary btn-xs" onclick="exportWorldBook()">💾</button></div></div><div class="editor-list-body" id="wbListBody">`;
  entries.forEach((e,i)=>{const kp=e.keys||'(无触发词)',cp=(e.content||'').replace(/<[^>]+>/g,'').substring(0,25);
    h+=`<div class="entry-item${i===selectedWBIndex?' active':''}" onclick="selectWBEntry(${i})" draggable="true" data-wbidx="${i}" id="wbitem_${i}"><span class="drag-handle" title="拖拽排序" onclick="event.stopPropagation()">⠿</span><span class="toggle-enabled ${e.enabled?'on':'off'}" style="width:9px;height:9px" onclick="event.stopPropagation();state.worldbook_entries[${i}].enabled=!state.worldbook_entries[${i}].enabled;renderWorldBookEditor();updatePreview()" title="启用/禁用"></span><span class="entry-keys">${escHtml(kp.substring(0,32))}</span>${cp?`<span class="entry-preview">${escHtml(cp)}…</span>`:''}</div>`;
  });
  h+=`</div></div><div class="editor-detail-panel" id="wbDetail">`;
  if(selectedWBIndex>=0&&selectedWBIndex<entries.length)h+=renderWBDetail(entries[selectedWBIndex],selectedWBIndex);
  else h+=`<div class="empty-state"><span class="icon">👆</span><span>从左侧选择一条条目</span></div>`;
  h+=`</div></div>`;
  const oldWbScroll=document.getElementById('wbListBody')?.scrollTop||0;
  pane.innerHTML=h;
  const newWbList=document.getElementById('wbListBody');
  if(newWbList&&oldWbScroll>0)newWbList.scrollTop=oldWbScroll;
  setTimeout(()=>bindDrag('#wbListBody','wbidx',(src,dst)=>{const m=state.worldbook_entries.splice(src,1)[0];state.worldbook_entries.splice(dst,0,m);selectedWBIndex=dst;renderWorldBookEditor();updatePreview()}),50);
  initScrollWatcher();
}
function renderWBDetail(e,idx){const pos=[{v:0,l:'0 · before_char'},{v:1,l:'1 · after_char'},{v:2,l:'2 · before_author'},{v:3,l:'3 · after_author'},{v:4,l:'4 · at_depth'}];return`
  <div class="field-group"><label>触发词 (keys)</label><input type="text" value="${escHtml(e.keys)}" placeholder="多个触发词用英文逗号分隔" oninput="updateWBField('keys',this.value,${idx})"/><div class="param-hint">AI 消息中包含这些词时将触发此条目</div></div>
  <div class="field-group"><label>内容 (content)</label><textarea rows="6" placeholder="条目正文…" oninput="updateWBField('content',this.value,${idx})">${escHtml(e.content)}</textarea></div>
  <div class="field-group"><label>注释 (comment)</label><input type="text" value="${escHtml(e.comment)}" placeholder="备忘注释" oninput="updateWBField('comment',this.value,${idx})"/></div>

function buildCharCardOutput(c,includeBindings){
  const data={
    name:c.name,
    description:c.description,
    personality:c.personality,
    scenario:c.scenario,
    first_mes:c.first_mes,
    mes_example:c.mes_example,
    system_prompt:c.system_prompt,
    post_history_instructions:c.post_history_instructions,
    creator_notes:c.creator_notes,
    creator:c.creator,
    character_version:c.character_version,
    tags:c.tags?c.tags.split(',').map(t=>t.trim()).filter(Boolean):[],
    alternate_greetings:c.alternate_greetings||[]
  };
  if(includeBindings){
    // 嵌入世界书
    if(c.bindWorldBooks.length>0){
      const boundEntries={};
      c.bindWorldBooks.forEach(uid=>{
        const e=state.worldbook_entries.find(wb=>wb.uid===uid);
        if(e){boundEntries[uid]={keys:e.keys?e.keys.split(',').map(k=>k.trim()).filter(Boolean):[],content:e.content,comment:e.comment,selective:e.selective,constant:e.constant,position:e.position,depth:e.depth,order:e.order,probability:e.probability,use_regex:e.use_regex,exclude_recursion:e.exclude_recursion,enabled:e.enabled}}
      });
      if(Object.keys(boundEntries).length>0)data.character_book={entries:boundEntries};
    }
    // 嵌入正则
    if(c.bindRegex.length>0){
      const boundRegex=[];
      c.bindRegex.forEach(uid=>{
        const e=state.regex_entries.find(re=>re.uid===uid);
        if(e){boundRegex.push({id:e.id||e.uid,scriptName:e.scriptName,findRegex:e.findRegex,replaceString:e.replaceString,trimStrings:e.trimStrings||[],placement:e.placement,disabled:e.disabled,markdownOnly:e.markdownOnly,promptOnly:e.promptOnly,runOnEdit:e.runOnEdit,substituteRegex:e.substituteRegex??0,minDepth:e.minDepth,maxDepth:e.maxDepth})}
      });
      if(boundRegex.length>0){if(!data.extensions)data.extensions={};data.extensions.regex_scripts=boundRegex}
    }
  }
  if(c.image)data.image=c.image;
  return {spec:'chara_card_v2',spec_version:'2.0',data};
}

function bindDrag(selector,dataAttr,callback){
  document.querySelectorAll(selector+' .entry-item').forEach(el=>{
    el.addEventListener('dragstart',e=>{dragSrcIndex=parseInt(el.dataset[dataAttr]);e.dataTransfer.effectAllowed='move'});
    el.addEventListener('dragover',e=>{e.preventDefault();el.classList.add('drag-over')});
    el.addEventListener('dragleave',e=>{el.classList.remove('drag-over')});
    el.addEventListener('drop',e=>{e.preventDefault();el.classList.remove('drag-over');const src=dragSrcIndex,dst=parseInt(el.dataset[dataAttr]);if(src!==dst&&src>=0&&dst>=0)callback(src,dst)});
    el.addEventListener('dragend',()=>{document.querySelectorAll(selector+' .entry-item').forEach(e=>e.classList.remove('drag-over'))});
  });
}

/* ── 拉取模型列表 ── */
async function fetchModels(){
  const baseUrl=document.getElementById('apiBaseUrl').value.trim()||'https://api.openai.com/v1';
  const apiKey=document.getElementById('apiApiKey').value.trim();
  if(!apiKey){toast('⚠️ 请先输入 API Key');return}
  const status=document.getElementById('apiModelStatus');
  const btn=document.getElementById('btnFetchModels');
  status.textContent='⏳ 正在拉取模型列表…';status.style.color='var(--text-muted)';
  btn.disabled=true;btn.textContent='⏳ …';
  try{
    const resp=await fetch(`${baseUrl}/models`,{headers:{'Authorization':`Bearer ${apiKey}`}});
    if(!resp.ok){const e=await resp.text();throw new Error(`HTTP ${resp.status}: ${e}`)}
    const data=await resp.json();
    const models=(data.data||data.models||data||[]).map(m=>m.id||m.model||m.name||(typeof m==='string'?m:'')).filter(Boolean).sort();
    const sel=document.getElementById('apiModel');sel.innerHTML='';
    if(!models.length){sel.innerHTML='<option value="">未找到模型</option>';status.textContent='⚠️ 未找到可用模型';status.style.color='var(--danger)';return}
    models.forEach(m=>{const o=document.createElement('option');o.value=m;o.textContent=m;sel.appendChild(o)});
    // 恢复之前保存的模型
    if(aiConfig.model&&models.includes(aiConfig.model))sel.value=aiConfig.model;
    status.textContent=`✅ 找到 ${models.length} 个模型`;status.style.color='var(--success)';
  }catch(e){status.textContent=`❌ 拉取失败：${e.message}`;status.style.color='var(--danger)'}
  finally{btn.disabled=false;btn.textContent='📡 拉取模型'}
}

/* ── 测试 API 连接 ── */
async function testAPIConnection(){
  const baseUrl=document.getElementById('apiBaseUrl').value.trim()||'https://api.openai.com/v1';
  const apiKey=document.getElementById('apiApiKey').value.trim();
  const model=document.getElementById('apiModel').value;
  if(!apiKey){toast('⚠️ 请先输入 API Key');return}
  if(!model){toast('⚠️ 请先拉取并选择模型');return}
  const stat=document.getElementById('apiTestStatus');
  const btn=document.getElementById('btnTestConn');
  stat.textContent='⏳ 正在测试连接…';stat.style.color='var(--text-muted)';
  btn.disabled=true;
  try{
    const resp=await fetch(`${baseUrl}/chat/completions`,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${apiKey}`},
      body:JSON.stringify({model:model,messages:[{role:'user',content:'Hi'}],max_tokens:5})
    });
    if(!resp.ok){const e=await resp.text();throw new Error(`HTTP ${resp.status}: ${e}`)}
    const data=await resp.json();
    const reply=data.choices?.[0]?.message?.content||'';
    stat.textContent=`✅ 连接成功！模型回复：「${reply.trim()}」`;stat.style.color='var(--success)';
    toast('✅ API 连接测试通过')
  }catch(e){stat.textContent=`❌ 连接失败：${e.message}`;stat.style.color='var(--danger)'}
  finally{btn.disabled=false}
}

  else if(editorMode==='global'){ctx=`【全局参数】\n预设名称：${state.preset_name}\nTemperature:${state.temperature}\nTop P:${state.top_p}\nTop K:${state.top_k}\nMax Context:${state.openai_max_context}\nMax Tokens:${state.openai_max_tokens}`}
  else if(editorMode==='charcard'&&selectedCharCardIndex>=0){const c=state.charcards[selectedCharCardIndex];ctx=`【角色卡】\n名称：${c.name}\n描述：${c.description}\n性格：${c.personality}\n场景：${c.scenario}\n开场白：${c.first_mes}\n对话示例：${c.mes_example}\n系统提示：${c.system_prompt}\n绑定世界书：${c.bindWorldBooks.length}条\n绑定正则：${c.bindRegex.length}条`}
  else{ctx='当前未选中任何编辑内容。'}
  return ctx;
}

function injectContext(){
  const ctx=getCurrentContext();
  const chatArea=document.getElementById('aiChatArea');
  const msgDiv=document.createElement('div');msgDiv.className='ai-msg system';msgDiv.textContent=`📥 已注入当前编辑上下文：\n${ctx}`;
  chatArea.appendChild(msgDiv);chatArea.scrollTop=chatArea.scrollHeight;
  aiMessages.push({role:'system',content:`以下为当前编辑内容参考：\n${ctx}`});
  toast('📥 上下文已注入')
}

async function sendAIMessage(){
  if(aiLoading)return;
  const input=document.getElementById('aiInput');
  const text=input.value.trim();
  if(!text)return;
  if(!aiConfig.apiKey){toast('⚠️ 请先点击「🔌 API设置」配置 API Key');return}

  const chatArea=document.getElementById('aiChatArea');
  const userDiv=document.createElement('div');userDiv.className='ai-msg user';userDiv.textContent=text;
  chatArea.appendChild(userDiv);
  aiMessages.push({role:'user',content:text});
  input.value='';
  chatArea.scrollTop=chatArea.scrollHeight;

  const loadDiv=document.createElement('div');loadDiv.className='ai-loading';loadDiv.innerHTML='<div class="spinner"></div><span>AI 思考中…</span>';
  chatArea.appendChild(loadDiv);chatArea.scrollTop=chatArea.scrollHeight;
  aiLoading=true;

  try{
    const persona=AI_PERSONAS[aiCurrentPersona]||AI_PERSONAS.caelum;
    const messages=[{role:'system',content:persona.prompt}];
    const lastSys=aiMessages.filter(m=>m.role==='system').slice(-2);
    const lastUser=aiMessages.filter(m=>m.role==='user').slice(-6);
    messages.push(...lastSys,...lastUser);

    const resp=await fetch(`${aiConfig.baseUrl}/chat/completions`,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${aiConfig.apiKey}`},
      body:JSON.stringify({
        model:aiConfig.model,
        messages:messages,
        max_tokens:aiConfig.maxTokens||2000,
        temperature:aiConfig.temperature??0.7,
        top_p:aiConfig.topP??0.9
      })
    });
    if(!resp.ok){const err=await resp.text();throw new Error(`HTTP ${resp.status}: ${err}`)}
    const data=await resp.json();
    const reply=data.choices?.[0]?.message?.content||'(空回复)';
    loadDiv.remove();
    const botDiv=document.createElement('div');botDiv.className='ai-msg assistant';botDiv.textContent=reply;
    chatArea.appendChild(botDiv);aiMessages.push({role:'assistant',content:reply});
    chatArea.scrollTop=chatArea.scrollHeight;
  }catch(e){
    loadDiv.remove();
    const errDiv=document.createElement('div');errDiv.className='ai-msg system';errDiv.textContent=`❌ 请求失败：${e.message}`;
    chatArea.appendChild(errDiv);
    chatArea.scrollTop=chatArea.scrollHeight;
  }
  aiLoading=false;
}

// Auto-load AI config on startup
loadAIConfig();
updatePersonaLabel();

/* ═══════════════════════════════════════════
   Init
═══════════════════════════════════════════ */
renderEditor();
updatePreview();
initScrollWatcher();
</script>
