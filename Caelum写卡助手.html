function handleEditDeskImport(data){
  const sf={id:'sf_'+Date.now(),name:'',type:editDesk.mode,entries:[],expanded:true};
  if(editDesk.mode==='preset'){
    if(Array.isArray(data.prompts)){sf.entries=data.prompts;sf.name='预设_'+Date.now()+'.json'}
    else if(data.preset_name){sf.entries=Array.isArray(data.prompts)?data.prompts:[];sf.name=data.preset_name+'.json'}
    else{sf.entries=[];sf.name='未知预设.json'}
  }else if(editDesk.mode==='worldbook'){
    if(data.entries&&typeof data.entries==='object'&&!Array.isArray(data.entries)){
      sf.entries=[];Object.entries(data.entries).forEach(([k,en])=>{sf.entries.push(stToWB(en,k))});
      sf.name='世界书_'+Date.now()+'.json';
    }else{sf.entries=[];sf.name='未知世界书.json'}
  }else if(editDesk.mode==='regex'){
    if(Array.isArray(data)&&data.length>0&&(data[0].findRegex||data[0].find_regex)){
      sf.entries=data.map((en,i)=>({uid:en.id||'regex_'+Date.now()+'_'+i,id:en.id||'',scriptName:en.scriptName||en.script_name||'',findRegex:en.findRegex||en.find_regex||'',replaceString:en.replaceString||en.replace_string||'',trimStrings:en.trimStrings||en.trim_strings||[],placement:en.placement||[2],disabled:en.disabled!==undefined?en.disabled:false,markdownOnly:en.markdownOnly||en.markdown_only||false,promptOnly:en.promptOnly||en.prompt_only||false,runOnEdit:en.runOnEdit!==undefined?en.runOnEdit:true,substituteRegex:en.substituteRegex??en.sub_regex??0,minDepth:en.minDepth??en.min_depth??null,maxDepth:en.maxDepth??en.max_depth??null}));
      sf.name='正则_'+Date.now()+'.json';
    }else{sf.entries=[];sf.name='未知正则.json'}
  }else if(editDesk.mode==='charcard'){
    if(data.spec==='chara_card_v2'||data.data?.name){
      const cd=data.data||data;sf.entries=[cd];sf.name=(cd.name||'角色')+'.json';
    }else{sf.entries=[];sf.name='未知角色卡.json'}
  }
  if(sf.entries.length>0){
    editDesk.sourceFiles.push(sf);
    editDesk.selectedSourceFileId=sf.id;
    editDesk.selectedSourceEntryIndex=-1;
    renderEditDesk();
    toast('📂 已加载：'+sf.name+' ('+sf.entries.length+'条)');
  }else{
    toast('⚠️ 未能识别该文件格式，请确认模式匹配');
  }
}

/* 编辑台模板导入：将文件条目追加到工作区 */
function handleEditDeskTemplateImport(data){
  var entries=[];
  if(editDesk.mode==='worldbook'){
    if(data.entries&&typeof data.entries==='object'&&!Array.isArray(data.entries)){
      Object.entries(data.entries).forEach(function(_a){var k=_a[0],en=_a[1];entries.push(stToWB(en,k))});
    }
  }else if(editDesk.mode==='preset'){
    if(Array.isArray(data.prompts))entries=data.prompts;
    else if(data.worldbook_entries&&Array.isArray(data.worldbook_entries))entries=data.worldbook_entries;
  }else if(editDesk.mode==='regex'){
    if(Array.isArray(data))entries=data.map(function(en,i){return{uid:en.id||'regex_'+Date.now()+'_'+i,id:en.id||'',scriptName:en.scriptName||en.script_name||'',findRegex:en.findRegex||en.find_regex||'',replaceString:en.replaceString||en.replace_string||'',trimStrings:en.trimStrings||en.trim_strings||[],placement:en.placement||[2],disabled:en.disabled!==undefined?en.disabled:false,markdownOnly:en.markdownOnly||en.markdown_only||false,promptOnly:en.promptOnly||en.prompt_only||false,runOnEdit:en.runOnEdit!==undefined?en.runOnEdit:true,substituteRegex:en.substituteRegex??en.sub_regex??0,minDepth:en.minDepth??en.min_depth??null,maxDepth:en.maxDepth??en.max_depth??null}});
  }else if(editDesk.mode==='charcard'){
    var cd=data.data||data;
    if(cd&&cd.name)entries=[cd];
  }
  if(entries.length>0){
    var before=editDesk.workingEntries.length;
    editDesk.workingEntries=editDesk.workingEntries.concat(entries);
    editDesk.selectedWorkingIndex=editDesk.workingEntries.length-1;
    renderEditDesk();updatePreview();
    toast('📂 已导入 '+entries.length+' 条到工作区（共 '+(before+entries.length)+' 条）');
  }else{toast('⚠️ 未能识别文件格式，请确认当前编辑台模式匹配')}
}

function updateWorkingField(key,value,idx){
  if(idx<0||idx>=editDesk.workingEntries.length)return;
  editDesk.workingEntries[idx][key]=value;
  updatePreview();
}
function updateWItemName(idx,val){var items=document.querySelectorAll('#edWorkingList .ed-working-item');if(items[idx]){var ns=items[idx].querySelector('.ed-wname');if(ns)ns.textContent=String(val||'').substring(0,28)}}
function toggleWorkingTriggerMode(idx,mode){if(idx<0||idx>=editDesk.workingEntries.length)return;if(mode==='constant'){editDesk.workingEntries[idx].constant=true;editDesk.workingEntries[idx].keys=''}else{editDesk.workingEntries[idx].constant=false}renderEditDesk();updatePreview()}


function insertWorkingMacro(m,idx){
  const pane=document.getElementById('edWorkingEditor');
  if(!pane)return;
  const ta=pane.querySelector('textarea');
  if(!ta)return;
  const s=ta.selectionStart,e=ta.selectionEnd,v=ta.value;
  ta.value=v.substring(0,s)+m+v.substring(e);
  ta.selectionStart=ta.selectionEnd=s+m.length;
  updateWorkingField('content',ta.value,idx);
  ta.focus();
}

function addWorkingEntry(){
  const e=makeEditDeskEntry();
  if(editDesk.selectedWorkingIndex>=0&&editDesk.selectedWorkingIndex<editDesk.workingEntries.length){
    editDesk.workingEntries.splice(editDesk.selectedWorkingIndex+1,0,e);
    editDesk.selectedWorkingIndex++;
  }else{
    editDesk.workingEntries.push(e);
    editDesk.selectedWorkingIndex=editDesk.workingEntries.length-1;
  }
  renderEditDesk();updatePreview();toast('✅ 已新建条目');
}

/* 编辑台：新建空源文件 */
function newSourceFile(){
  var sf={id:'sf_'+Date.now(),name:'源文件_'+new Date().toLocaleTimeString(),type:editDesk.mode,entries:[],expanded:true};
  editDesk.sourceFiles.push(sf);
  editDesk.selectedSourceFileId=sf.id;
  editDesk.selectedSourceEntryIndex=-1;
  renderEditDesk();toast('✨ 已新建空源文件');
}

function deleteWorkingEntry(idx){
  if(idx<0||idx>=editDesk.workingEntries.length)return;
  editDesk.workingEntries.splice(idx,1);
  editDesk.selectedWorkingIndex=Math.min(editDesk.selectedWorkingIndex,editDesk.workingEntries.length-1);
  if(!editDesk.workingEntries.length)editDesk.selectedWorkingIndex=-1;
  renderEditDesk();updatePreview();toast('🗑 已删除');
}

function moveWorkingEntry(idx,dir){
  if(idx<0||idx>=editDesk.workingEntries.length)return;
  const newIdx=idx+dir;
  if(newIdx<0||newIdx>=editDesk.workingEntries.length)return;
  const tmp=editDesk.workingEntries[idx];
  editDesk.workingEntries[idx]=editDesk.workingEntries[newIdx];
  editDesk.workingEntries[newIdx]=tmp;
  editDesk.selectedWorkingIndex=newIdx;
  renderEditDesk();updatePreview();
}

function copyFromSourceToWorking(){
  const sf=editDesk.sourceFiles.find(f=>f.id===editDesk.selectedSourceFileId);
  if(!sf)return;
  const e=sf.entries[editDesk.selectedSourceEntryIndex];
  if(!e)return;
  const clone=deepCloneEntry(e);
  editDesk.workingEntries.push(clone);
  editDesk.selectedWorkingIndex=editDesk.workingEntries.length-1;
  renderEditDesk();updatePreview();
  toast('📥 已复制条目到工作区');
}

function copyWorkingToClipboard(){
  if(editDesk.selectedWorkingIndex<0||editDesk.selectedWorkingIndex>=editDesk.workingEntries.length)return;
  editDesk.clipboard=deepCloneEntry(editDesk.workingEntries[editDesk.selectedWorkingIndex]);
  renderEditDesk();
  toast('📋 已复制到剪贴板');
}

function pasteClipboardToWorking(){
  if(!editDesk.clipboard)return;
  const clone=deepCloneEntry(editDesk.clipboard);
  const insIdx=editDesk.selectedWorkingIndex>=0?editDesk.selectedWorkingIndex+1:editDesk.workingEntries.length;
  editDesk.workingEntries.splice(insIdx,0,clone);
  editDesk.selectedWorkingIndex=insIdx;
  renderEditDesk();updatePreview();
  toast('📄 已粘贴');
}

function sourceBatchSelectAll(){
  const sf=editDesk.sourceFiles.find(f=>f.id===editDesk.selectedSourceFileId);
  if(!sf) return;
  for(let i=0;i<sf.entries.length;i++) editDesk.sourceBatchSet.add(i);
  renderEditDesk();
}

function sourceBatchClearAll(){
  editDesk.sourceBatchSet=new Set();
  renderEditDesk();
}

function sourceBatchCopyToWorking(){
  const indices=Array.from(editDesk.sourceBatchSet).sort((a,b)=>a-b);
  if(!indices.length) return;
  const sf=editDesk.sourceFiles.find(f=>f.id===editDesk.selectedSourceFileId);
  if(!sf) return;
  indices.forEach(idx=>{
    const clone=deepCloneEntry(sf.entries[idx]);
    editDesk.workingEntries.push(clone);
  });
  editDesk.selectedWorkingIndex=editDesk.workingEntries.length-1;
  editDesk.sourceBatchSet=new Set();
  renderEditDesk();updatePreview();
  toast('📥 已批量复制 '+indices.length+' 个条目到工作区');
}

function sourceBatchDelete(){
  const indices=Array.from(editDesk.sourceBatchSet).sort((a,b)=>b-a);
  if(!indices.length) return;
  if(!confirm(`确定要从源文件中删除选中的 ${indices.length} 个条目吗？`)) return;
  const sf=editDesk.sourceFiles.find(f=>f.id===editDesk.selectedSourceFileId);
  if(!sf) return;
  indices.forEach(idx=>sf.entries.splice(idx,1));
  editDesk.sourceBatchSet=new Set();
  editDesk.selectedSourceEntryIndex=Math.min(editDesk.selectedSourceEntryIndex,sf.entries.length-1);
  if(!sf.entries.length) editDesk.selectedSourceEntryIndex=-1;
  renderEditDesk();updatePreview();
  toast('🗑 已从源文件删除 '+indices.length+' 个条目');
}

function toggleEdBatchMode(){
  editDesk.batchMode=!editDesk.batchMode;
  if(!editDesk.batchMode) editDesk.batchSet=new Set();
  renderEditDesk();
}

function toggleEdWorkingCheck(idx){
  if(editDesk.batchSet.has(idx)) editDesk.batchSet.delete(idx);
  else editDesk.batchSet.add(idx);
  renderEditDesk();
}

function batchSelectAll(){
  for(let i=0;i<editDesk.workingEntries.length;i++) editDesk.batchSet.add(i);
  renderEditDesk();
}

function batchClearAll(){
  editDesk.batchSet=new Set();
  renderEditDesk();
}

function batchDeleteWorking(){
  const indices=Array.from(editDesk.batchSet).sort((a,b)=>b-a);
  if(!indices.length) return;
  if(!confirm(`确定要批量删除选中的 ${indices.length} 个条目吗？`)) return;
  indices.forEach(idx=>editDesk.workingEntries.splice(idx,1));
  editDesk.batchSet=new Set();
  editDesk.selectedWorkingIndex=Math.min(editDesk.selectedWorkingIndex,editDesk.workingEntries.length-1);
  if(!editDesk.workingEntries.length) editDesk.selectedWorkingIndex=-1;
  renderEditDesk();updatePreview();
  toast('🗑 已批量删除 '+indices.length+' 个条目');
}

function batchMoveWorking(dir){
  const indices=Array.from(editDesk.batchSet).sort((a,b)=>dir>0?b-a:a-b);
  if(!indices.length) return;
  let moved=false;
  if(dir<0){ // move up
    indices.forEach(idx=>{
      if(idx>0 && !editDesk.batchSet.has(idx-1)){
        const tmp=editDesk.workingEntries[idx];
        editDesk.workingEntries[idx]=editDesk.workingEntries[idx-1];
        editDesk.workingEntries[idx-1]=tmp;
        editDesk.batchSet.delete(idx);
        editDesk.batchSet.add(idx-1);
        moved=true;
      }
    });
  }else{ // move down
    const rev=indices.slice().reverse();
    rev.forEach(idx=>{
      if(idx<editDesk.workingEntries.length-1 && !editDesk.batchSet.has(idx+1)){
        const tmp=editDesk.workingEntries[idx];
        editDesk.workingEntries[idx]=editDesk.workingEntries[idx+1];
        editDesk.workingEntries[idx+1]=tmp;
        editDesk.batchSet.delete(idx);
        editDesk.batchSet.add(idx+1);
        moved=true;
      }
    });
  }
  if(moved){renderEditDesk();updatePreview();}
  else toast('⚠️ 所选条目已到达边缘');
}

function batchCopyWorking(){
  const indices=Array.from(editDesk.batchSet).sort((a,b)=>a-b);
  if(!indices.length) return;
  const clones=indices.map(idx=>deepCloneEntry(editDesk.workingEntries[idx]));
  editDesk.clipboardBatch=clones;
  toast('📋 已批量复制 '+clones.length+' 个条目到批量剪贴板');
}

// Horizontal: edit desk upper/lower split
function startDividerDrag(e){
  e.preventDefault();
  const divider=document.getElementById('edDivider');
  const upper=document.getElementById('edUpper');
  const body=document.querySelector('.editdesk-body');
  if(!divider||!upper||!body)return;
  divider.classList.add('dragging');
  const bodyRect=body.getBoundingClientRect();
  const bodyHeight=bodyRect.height;
  const startY=e.clientY;
  const startPct=editDesk.splitPercent;
  function onMove(ev){
    const dy=ev.clientY-startY;
    const dpct=(dy/bodyHeight)*100;
    let npct=startPct+dpct;
    npct=Math.max(20,Math.min(80,npct));
    editDesk.splitPercent=npct;
    upper.style.flex='0 0 '+npct+'%';
  }
  function onUp(){divider.classList.remove('dragging');document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp)}
  document.addEventListener('mousemove',onMove);
  document.addEventListener('mouseup',onUp);
}

// Vertical: edit desk source panel / preview split (upper) or working list / editor split (lower)
function startEDVDividerDrag(e,which){
  e.preventDefault();
  const panelId=which==='upper'?'edSourcePanel':'edWorkingListPanel';
  const dividerId=which==='upper'?'edUpperVDivider':'edLowerVDivider';
  const parentId=which==='upper'?'edUpper':'edLower';
  const stateKey=which==='upper'?'upperVSplit':'lowerVSplit';
  const panel=document.getElementById(panelId);
  const divider=document.getElementById(dividerId);
  const parent=document.getElementById(parentId);
  if(!panel||!divider||!parent)return;
  divider.classList.add('dragging');
  const parentRect=parent.getBoundingClientRect();
  const parentWidth=parentRect.width;
  const startX=e.clientX;
  const startPct=editDesk[stateKey]??(which==='upper'?38:40);
  function onMove(ev){
    const dx=ev.clientX-startX;
    const dpct=(dx/parentWidth)*100;
    let npct=startPct+dpct;
    npct=Math.max(15,Math.min(70,npct));
    editDesk[stateKey]=npct;
    panel.style.flex='0 0 '+npct+'%';
  }
  function onUp(){divider.classList.remove('dragging');document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp)}
  document.addEventListener('mousemove',onMove);
  document.addEventListener('mouseup',onUp);
}

// Vertical: workspace editor/right-panel split
function startWSVDividerDrag(e){
  e.preventDefault();
  const right=document.getElementById('rightPanel');
  const editor=document.getElementById('editorPanel');
  const divider=document.getElementById('wsVdivider');
  const ws=document.querySelector('.workspace');
  if(!right||!editor||!divider||!ws)return;
  divider.classList.add('dragging');
  const wsRect=ws.getBoundingClientRect();
  const wsWidth=wsRect.width;
  const startX=e.clientX;
  const startW=wsRightWidth;
  function onMove(ev){
    const dx=startX-ev.clientX;
    let nw=startW+dx;
    nw=Math.max(180,Math.min(wsWidth*0.7,nw));
    wsRightWidth=nw;
    right.style.width=nw+'px';
  }
  function onUp(){divider.classList.remove('dragging');document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp);saveWSWidth()}
  document.addEventListener('mousemove',onMove);
  document.addEventListener('mouseup',onUp);
}

function restoreDraft(i){

  else if(d.type==='charcard'&&d.data){state.charcards.push(d.data);selectedCharCardIndex=state.charcards.length-1;if(editorMode!=='charcard')switchEditorMode('charcard');else renderCharCardEditor();}

function renderPersonaCards(filterTag,searchText){
  var cp=window._customAI||[];
  if(!filterTag)filterTag="all";if(!searchText)searchText="";
  var allTags=[],seen={};
  cp.forEach(function(p){(p.tags||"通用").split(/[,，]/).forEach(function(t){t=t.trim();if(t&&!seen[t]){seen[t]=1;allTags.push(t)}})});
  var tb=document.getElementById("cpTagBar");
  if(tb){
    var th=[];
    function tbtn(tag,label){
      var isActive=filterTag===tag;
      return "<button class='btn btn-xs draft-tag'"+(isActive?" style='background:var(--accent);color:#fff'":"")+" onclick=\"renderPersonaCards('"+tag+"',document.getElementById('cpSearch')?document.getElementById('cpSearch').value:'')\">"+label+"</button>";
    }
    th.push(tbtn("all","全部"));
    allTags.forEach(function(t){th.push(tbtn(t,t))});
    tb.innerHTML=th.join("");
  }
  var list=document.getElementById("cpCardList");if(!list)return;
  var filtered=cp.filter(function(p){
    var mt=filterTag==="all"||(p.tags||"通用").split(/[,，]/).map(function(x){return x.trim()}).indexOf(filterTag)>=0;
    var ms=!searchText||(p.name+p.prompt+p.tags).indexOf(searchText)>=0;
    return mt&&ms;
  });
  if(!filtered.length){list.innerHTML="<p style='color:var(--text-muted);font-size:.74rem;padding:20px;text-align:center'>未找到</p>";return}
  var cards=[];
  filtered.forEach(function(p){var i=cp.indexOf(p);
    cards.push("<div class='draft-card' onclick='editCustomPersona("+i+")'>");
    cards.push("<div class='draft-card-header'><span style='background:color-mix(in srgb,var(--accent) 15%,transparent);color:var(--accent)'>AI</span><span style='font-size:.6rem;color:var(--text-muted)'>"+(p.tags||"通用")+"</span></div>");
    cards.push("<div class='draft-card-title'>"+p.name+"</div>");
    cards.push("<div class='draft-card-preview'>"+p.prompt.substring(0,50)+"…</div>");
    cards.push("<button class='btn btn-danger btn-xs' style='margin-top:4px' onclick='event.stopPropagation();deleteCustomPersona("+i+")'>🗑</button>");
    cards.push("</div>");
  });
  list.innerHTML="<div class='draft-cards'>"+cards.join("")+"</div>";
}

  if(cur)sel.value=cur;
}

/* ══════════════ 世界书/预设绑定正则 ══════════════ */
var bindRegexWB=[],bindRegexPreset=[];
function toggleWBBind(uid){var i=bindRegexWB.indexOf(uid);if(i>=0)bindRegexWB.splice(i,1);else bindRegexWB.push(uid)}
function togglePresetBind(uid){var i=bindRegexPreset.indexOf(uid);if(i>=0)bindRegexPreset.splice(i,1);else bindRegexPreset.push(uid)}

// Monkey-patch export
var _origEWB=exportWorldBook;
exportWorldBook=function(){
  var includeRegex=false;
  if(bindRegexWB.length>0){
    includeRegex=confirm('当前已绑定'+bindRegexWB.length+'条正则。\n\n点「确定」：导出世界书+正则\n点「取消」：仅导出世界书');
  }
  var out={entries:{}};
  state.worldbook_entries.forEach(function(e,i){out.entries[String(i)]=wbToST(e,i)});
  if(includeRegex&&bindRegexWB.length>0){var b=[];bindRegexWB.forEach(function(uid){var re=state.regex_entries.find(function(r){return r.uid===uid});if(re)b.push({id:re.id||re.uid,scriptName:re.scriptName,findRegex:re.findRegex,replaceString:re.replaceString,trimStrings:re.trimStrings||[],placement:re.placement,disabled:re.disabled,markdownOnly:re.markdownOnly,promptOnly:re.promptOnly,runOnEdit:re.runOnEdit,substituteRegex:re.substituteRegex||0,minDepth:re.minDepth,maxDepth:re.maxDepth})});if(b.length>0){if(!out.extensions)out.extensions={};out.extensions.regex_scripts=b}}
  downloadJSON(out,'worldbook.json');toast('💾 世界书已导出'+(includeRegex?'（含'+bindRegexWB.length+'条正则）':''))
};
var _origBO=buildOutput;
var _presetIncludeRegex=false;
buildOutput=function(){
  var o=_origBO();
  if(_presetIncludeRegex&&bindRegexPreset.length>0){var b=[];bindRegexPreset.forEach(function(uid){var re=state.regex_entries.find(function(r){return r.uid===uid});if(re)b.push({id:re.id||re.uid,scriptName:re.scriptName,findRegex:re.findRegex,replaceString:re.replaceString,trimStrings:re.trimStrings||[],placement:re.placement,disabled:re.disabled,markdownOnly:re.markdownOnly,promptOnly:re.promptOnly,runOnEdit:re.runOnEdit,substituteRegex:re.substituteRegex||0,minDepth:re.minDepth,maxDepth:re.maxDepth})});if(b.length>0){if(!o.extensions)o.extensions={};o.extensions.regex_scripts=b}}
  return o;
};
var _origEP=exportPreset;
exportPreset=function(){
  if(editorMode==='global'||editorMode==='preset'){
    if(bindRegexPreset.length>0)_presetIncludeRegex=confirm('当前已绑定'+bindRegexPreset.length+'条正则。\n\n点「确定」：导出预设+正则\n点「取消」：仅导出预设');
    else _presetIncludeRegex=false;
  }
  _origEP();
};


/* ════════ 绑定正则面板 ════════ */
var _bindPanelType=null;
function toggleBindPanel(type){
  if(_bindPanelType===type){closeBindPanel();return}
  _bindPanelType=type;
  var panel=document.getElementById('bindPanel');
  if(!panel){
    panel=document.createElement('div');panel.id='bindPanel';
    panel.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:9998;background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:0 8px 40px var(--shadow);width:500px;max-width:92vw;max-height:70vh;overflow-y:auto;padding:16px;display:none';
    document.body.appendChild(panel);
    document.addEventListener('click',function(e){if(_bindPanelType&&!panel.contains(e.target)&&!e.target.closest('[onclick*="toggleBindPanel"]'))closeBindPanel()});
  }
  panel.style.display='block';
  var items=[];
  state.regex_entries.forEach(function(r){items.push({uid:r.uid,name:r.scriptName||'未命名',src:'当前正则',find:r.findRegex?r.findRegex.substring(0,30):''})});
  try{var drafts=JSON.parse(localStorage.getItem('st_drafts')||'[]');drafts.forEach(function(d){if(d.type==='regex'&&d.data&&Array.isArray(d.data)){d.data.forEach(function(r){items.push({uid:r.uid||r.id||'',name:r.scriptName||'草稿正则',src:'存储·'+d.time})})}})}catch(e){}
  var seen={},uniq=[];items.forEach(function(it){if(it.uid&&!seen[it.uid]){seen[it.uid]=1;uniq.push(it)}});
  var bindList=type==='worldbook'?bindRegexWB:bindRegexPreset;
  var title=type==='worldbook'?'世界书':'预设';
  var lines=[];
  lines.push('<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">');
  lines.push('<h3 style="margin:0;font-size:.85rem">🔗 绑定正则到'+title+'</h3>');
  lines.push('<button class="btn btn-secondary btn-xs" onclick="closeBindPanel()">✕</button></div>');
  lines.push('<p style="font-size:.7rem;color:var(--text-muted);margin-bottom:8px">勾选后，导出时将弹窗确认是否一并包含所选正则</p>');
  if(!uniq.length){
    lines.push('<p style="color:var(--text-muted);font-size:.74rem;text-align:center;padding:20px">暂无正则条目，请先在「正则」模块创建</p>');
  }else{
    lines.push('<div style="display:flex;gap:6px;margin-bottom:8px">');
    lines.push('<button class="btn btn-xs" style="background:var(--accent);color:#fff" data-type="'+type+'" data-on="1" onclick="selectAllBind(this.dataset.type,true)">全选</button>');
    lines.push('<button class="btn btn-secondary btn-xs" data-type="'+type+'" data-on="0" onclick="selectAllBind(this.dataset.type,false)">取消全选</button></div>');
    uniq.forEach(function(it){
      var on=bindList.includes(it.uid);
      lines.push('<label style="display:flex;align-items:center;gap:8px;padding:6px 10px;margin:2px 0;border-radius:6px;cursor:pointer;background:'+(on?'color-mix(in srgb,var(--accent2) 8%,var(--surface2))':'var(--surface2)')+';font-size:.74rem">');
      lines.push('<input type="checkbox" '+(on?'checked':'')+' data-type="'+type+'" data-uid="'+it.uid+'" onchange="toggleRegexBind(this.dataset.type,this.dataset.uid)">');
      lines.push(it.name+' <span style="font-size:.64rem;color:var(--text-muted)">'+it.src+'</span></label>');
    });
  }
  panel.innerHTML=lines.join('');
}
function closeBindPanel(){var p=document.getElementById('bindPanel');if(p)p.style.display='none';_bindPanelType=null}
function toggleRegexBind(type,uid){var list=type==='worldbook'?bindRegexWB:bindRegexPreset;var i=list.indexOf(uid);if(i>=0)list.splice(i,1);else list.push(uid);toggleBindPanel(type)}
function selectAllBind(type,on){var list=type==='worldbook'?bindRegexWB:bindRegexPreset;list.length=0;if(on){state.regex_entries.forEach(function(r){list.push(r.uid)})}toggleBindPanel(type)}

loadWSWidth();

switchEditorMode(editorMode);




window.__siTutorial={"蕼的写卡教程":{"disclaimerHtml":"<p>本教程综合整理自多篇实战教程，适合初次写卡及有一定经验但想系统提升的创作者。所有内容均以 SillyTavern（ST/酒馆）为目标平台。</p>","sections":[{"title":"一、基础概念","content":"","subsections":[{"title":"什么是”卡”","content":"<p>在 SillyTavern 中，“卡”（Card）是角色扮演的基本单位，由以下几个部分组成：</p><ul><li><b>人设（Persona）</b>：定义角色的性格、背景、说话方式</li><li><b>世界书（World Book）</b>：描述世界观规则、背景设定</li><li><b>剧情/情节设定</b>：内置的故事线索、触发条件</li><li><b>输出设定</b>：规范 AI 回复格式的规则句</li><li><b>状态栏</b>：动态展示角色状态、记忆的附加模块</li></ul>","subsections":[],"level":2},{"title":"卡的基本分类","content":"<table><thead><tr><th>类型</th><th>说明</th></tr></thead><tbody><tr><td><b>单人卡</b></td><td>以单个 char 为核心，常以好感度或时间为轴</td></tr><tr><td><b>多人卡</b></td><td>多个 char 同时存在，群像互动</td></tr><tr><td><b>剧情卡</b></td><td>内置了特定故事线索或事件触发机制</td></tr><tr><td><b>模拟器</b></td><td>高自由度，世界由 AI 动态生成，user 自由探索</td></tr></tbody></table>","subsections":[],"level":2},{"title":"SillyTavern 特有概念","content":"<ul><li><b><code>{{char}}</code></b>：当前角色的占位符，会被角色名替换</li><li><b><code>{{user}}</code></b>：玩家的占位符，会被用户名替换</li><li><b>世界书（World Book）</b>：通过关键词触发，将设定注入上下文</li><li><b><code>$+指令</code></b>：强制触发某个行为或状态的特殊指令前缀</li><li><b>注入深度（Injection Depth）</b>：控制世界书条目插入对话历史的位置</li></ul><hr>","subsections":[],"level":2}],"level":1},{"title":"二、书写格式详解","content":"<p>写卡时可以选择多种格式，每种格式有不同的优劣和适用场景。</p>","subsections":[{"title":"格式对比总览","content":"<table><thead><tr><th>格式</th><th>推荐程度</th><th>优点</th><th>缺点</th><th>适用场景</th></tr></thead><tbody><tr><td><b>Markdown</b></td><td>★★★★☆</td><td>手搓容易，阅读自然，AI 活人感强</td><td>多一步符号解析，AI 偶尔误读</td><td>新手入门，人设描写</td></tr><tr><td><b>YAML</b></td><td>★★★★★</td><td>键值对清晰，AI 直接抓取关键词，触发准确</td><td>缩进严格，需要 AI 辅助格式化</td><td>人设表单，好感度分级，官方推荐</td></tr><tr><td><b>XML</b></td><td>★★★☆☆</td><td>分块清晰，防止内容串线</td><td>需闭合标签，手搓较麻烦</td><td>规则书包裹，多段内容隔离</td></tr><tr><td><b>JSON</b></td><td>★★☆☆☆</td><td>AI 理解准确</td><td>手搓难，MF 平台兼容性差</td><td>ST/酒馆平台，配合触发机制</td></tr><tr><td><b>Python/伪代码</b></td><td>★★★☆☆</td><td>数值逻辑严密，条件判定清晰</td><td>书写较难，修改门槛高</td><td>RPG 模拟器，数值判定卡</td></tr><tr><td><b>混合格式</b></td><td>★★★★★</td><td>集大成，灵活强大</td><td>需要一定基础，出错难排查</td><td>有经验的创作者</td></tr></tbody></table>","subsections":[],"level":2},{"title":"Markdown 格式示例","content":"<pre class=\"code-block\"><code># 基础信息\n- 姓名：林玦\n- 年龄：27\n- 职业：刑警\n\n# 性格\n**表面**：沉默寡言，态度冷淡，不苟言笑\n**内里**：责任感极强，偶尔会因细节露出温柔\n\n# 说话风格\n- 惯用短句，很少解释\n- 不喜欢被追问，但被追问时不会回避\n- 偶尔用反问替代拒绝：「你觉得呢？」</code></pre>","subsections":[],"level":2},{"title":"YAML 格式示例","content":"<pre class=\"code-block\"><code>character:\n  name: \"林玦\"\n  age: 27\n  occupation: \"刑警\"\n  \n  personality:\n    surface: \"沉默寡言，冷淡克制\"\n    core: \"责任感强，内里温柔\"\n    \n  speech_style:\n    pattern: \"短句为主，不做多余解释\"\n    habit: \"用反问代替拒绝\"\n    \n  roleplay_guide:\n    key_principle: \"信任是漫长积累的结果，不会因为单次善意立刻改变态度\"</code></pre>","subsections":[],"level":2},{"title":"XML 包裹格式示例（推荐用于规则书）","content":"<pre class=\"code-block\"><code>&lt;林玦人设规则书&gt;\n# 核心设定\n...具体内容...\n\n# 行为规范\n...具体内容...\n&lt;/林玦人设规则书&gt;</code></pre><blockquote><p><b>小技巧</b>：XML 格式适合将人设、世界观、文风分块包裹，防止内容在 AI 上下文中相互干扰。</p></blockquote><hr>","subsections":[],"level":2}],"level":1},{"title":"三、人物设定（人设）","content":"","subsections":[{"title":"人设的核心要素","content":"<p>一份好的人设不是简单的属性表，而是要帮助 AI 理解「这个人在任何情境下会如何反应」。</p>","subsections":[{"title":"1. 基础信息层","content":"<pre class=\"code-block\"><code>name: \"角色名\"\nage: 年龄\ngender: \"性别\"\nappearance: \"外貌描述（抓核心特征，不要流水账）\"\noccupation: \"职业/身份\"</code></pre>","level":3},{"title":"2. 性格成因链（最重要）","content":"<p>不要只写「性格：冷漠」，要写出<b>为什么</b>和<b>如何表现</b>：</p><pre class=\"code-block\"><code>## 性格与成因\n- **表层行为**：对陌生人保持距离，不主动开口\n- **深层原因**：幼年时期的经历让他习惯用沉默保护自己\n- **触发点**：被人无端指责时会短暂失控，事后会沉默很长时间\n- **反面**：对真正信任的人偶尔会有意外温柔的举动</code></pre>","level":3},{"title":"3. 行为惯性与语言指纹","content":"<pre class=\"code-block\"><code>## 语言习惯\n- 习惯用「嗯」「知道了」结束对话\n- 被追问时不正面回答，改为反问\n- 生气时反而比平时更安静\n- 禁止说「没事」——他从不假装没事</code></pre>","level":3},{"title":"4. 关系坐标","content":"<pre class=\"code-block\"><code>## 对 {{user}} 的初始态度\n- 初始好感度：中性，不排斥也不亲近\n- 态度变化触发点：发现 {{user}} 的某个意外特质\n- 破防场景：{{user}} 在他面前哭的时候</code></pre>","level":3},{"title":"5. 演绎提示（给 AI 的核心指令）","content":"<pre class=\"code-block\"><code>## 演绎原则\n- 任何情况下，{{char}} 不会主动说「我喜欢你」，但可以用行动表达\n- 好感度提升是缓慢的过程，禁止跳跃式升温\n- 签名场景：在众人争论时，他悄悄递了一杯水过来，没有说话</code></pre>","level":3}],"level":2},{"title":"完整人设模板（Markdown 版）","content":"<pre class=\"code-block\"><code>&lt;{{char}}人设&gt;\n\n# 基础信息\n- 姓名：[姓名]\n- 年龄：[年龄]\n- 性别：[性别]\n- 职业/身份：[职业]\n- 外貌：[1-3个最具辨识度的特征]\n\n# 性格\n**外在表现**：[他人眼中的样子]\n**内在本质**：[真实的内核]\n**成因**：[是什么造就了这个性格]\n\n# 行为习惯\n- [习惯1]\n- [习惯2]\n- 禁止：[绝对不会做的事]\n\n# 语言风格\n- [说话方式]\n- [口头禅/习惯用语]\n- [在不同情绪下的语言变化]\n\n# 与 {{user}} 的互动规则\n- 初始态度：[初始关系定位]\n- 好感度变化逻辑：[什么会提升/降低好感]\n- 破防场景：[什么情况会让他表现出不同的一面]\n\n# 演绎核心原则\n[给 AI 最关键的一句话提示]\n\n&lt;/{{char}}人设&gt;</code></pre><hr>","subsections":[],"level":2}],"level":1},{"title":"四、世界观规则书","content":"","subsections":[{"title":"世界观的作用","content":"<p>世界观规则书告诉 AI 这个世界「如何运转」，防止出现时代错乱、规则矛盾等问题。</p>","subsections":[],"level":2},{"title":"世界观的基本要素","content":"<ol><li><b>时代与背景</b>：时间节点、社会发展水平</li><li><b>社会结构</b>：政治体制、阶级关系、重要机构</li><li><b>地理版图</b>：主要地点、地点特色</li><li><b>特殊规则</b>：魔法体系、科技水平、超自然法则</li><li><b>文化习俗</b>：用语习惯、礼仪禁忌、社会氛围</li></ol>","subsections":[],"level":2},{"title":"构建世界观的流程","content":"<pre class=\"code-block\"><code>确定题材类型\n    ↓\n输入参考背景（让 AI 生成初稿）\n    ↓\n精简提炼（删掉无关内容，压缩语言）\n    ↓\n分层放置（核心内容放人设，细节放世界书/资料库）</code></pre>","subsections":[],"level":2},{"title":"现代都市世界观提示词示例","content":"<pre class=\"code-block\"><code>我现在要创作一张背景是现代大世界的卡。\n城市运行体系、人文水文、社会文化、行政体系参考上海。\n市区划分明确，命名偏向古风。\n请生成 markdown 格式的世界书，语言精简客观。</code></pre>","subsections":[],"level":2},{"title":"同人/已有 IP 世界观处理","content":"<p>已有 IP 的世界观通常比较完整，但 token 有限，需要做拆分：</p><table><thead><tr><th>放置位置</th><th>内容</th></tr></thead><tbody><tr><td><b>人设部分</b></td><td>作品时代背景（一句话）、主要机构简介、地图分布</td></tr><tr><td><b>世界书/资料库</b></td><td>社会文化细节、各机构详细职能、具体地点特色、可能触发的事件</td></tr></tbody></table>","subsections":[],"level":2},{"title":"世界观规则书模板","content":"<pre class=\"code-block\"><code>&lt;世界规则书·[世界名]&gt;\n\n# 时代背景\n[时间节点] + [社会发展水平] + [整体氛围]\n\n# 社会结构\n## 权力体系\n[政治/权力结构简述]\n\n## 重要机构\n- [机构A]：[职能简述]\n- [机构B]：[职能简述]\n\n# 地理版图\n- [地点A]：[特点]\n- [地点B]：[特点]\n\n# 世界运行规则\n[如有魔法/科技/特殊体系，在此说明其核心逻辑]\n\n# 禁区协议\n- 禁止出现：[与世界观矛盾的事物]\n- 时代限制：[该时代不存在的事物]\n\n&lt;/世界规则书·[世界名]&gt;</code></pre><hr>","subsections":[],"level":2}],"level":1},{"title":"五、文风参考书","content":"","subsections":[{"title":"为什么需要文风参考书","content":"<p>文风参考书通过给 AI 提供具体的「风格锚点」，让它在写作时有明确的参照，避免输出通用网文腔。</p>","subsections":[],"level":2},{"title":"文风参考书的生成方法","content":"<p><b>方法一：给文本让 AI 总结（推荐）</b></p><pre class=\"code-block\"><code>总结以下内容的文风，忽略其中的名字等信息，\n只参考叙事节奏、描写角度等内容，\n生成相同风格的文风参考书，\n用于描写 [具体描写目标，如：人物内心感受/日常场景]：\n\n[在此粘贴参考文本]</code></pre><blockquote><p><b>注意</b>：请使用自己创作的文本或经典作品的公开片段，尊重他人创作。</p></blockquote><p><b>方法二：直接描述风格方向</b></p><pre class=\"code-block\"><code>生成一份文风参考书，风格要求如下：\n- 叙事节奏：[慢/快/张弛有度]\n- 语言调性：[克制/热烈/散文化]\n- 描写重心：[环境/心理/动作]\n- 规避：[华丽辞藻/过度煽情/网络用语]</code></pre>","subsections":[],"level":2},{"title":"文风参考书的标准结构","content":"<pre class=\"code-block\"><code>&lt;[风格名]文风参考书&gt;\n\n# 核心美学\n- **[风格关键词1]**：[具体说明]\n- **[风格关键词2]**：[具体说明]\n\n# 叙事策略\n- **节奏模式**：[描述叙事节奏]\n- **视角选择**：[说明视角类型及规则]\n- **留白原则**：[何时停止，不说尽]\n\n# 语言规范\n- **句式偏好**：[长句/短句/混合]\n- **词汇选择**：[偏向什么类型的词]\n- **禁止**：[明确禁止的语言习惯]\n\n# 情感表达\n- **表达方式**：[直接/借物/动作]\n- **情绪处理**：[如何处理强烈情绪]\n\n# 描写规范\n## 环境描写\n[环境描写的具体规则]\n\n## 人物描写\n[人物描写的具体规则]\n\n## 心理描写\n[心理描写的具体规则]\n\n&lt;/[风格名]文风参考书&gt;\n\n$请使用&lt;[风格名]文风参考书&gt;，以 {{char}} 的视角/情境为切入点进行描写。</code></pre>","subsections":[],"level":2},{"title":"文风参考书放置位置","content":"<table><thead><tr><th>位置</th><th>适合放置的内容</th></tr></thead><tbody><tr><td><b>剧情设定</b></td><td>叙事文风，控制故事整体基调</td></tr><tr><td><b>输出设定</b></td><td>互动文风，控制角色扮演时的写作风格</td></tr><tr><td><b>世界书</b></td><td>特定场景触发的专属文风（如战斗场景、温馨场景）</td></tr></tbody></table>","subsections":[],"level":2},{"title":"万能文风模板","content":"<p>以下模板可直接交给 AI，结合世界观和人设填充：</p><pre class=\"code-block\"><code>&lt;[题材类型]文风参考书&gt;\n\n# 核心文风定位与底层逻辑\n\n## 核心定位\n本风格属于「[视角类型]叙事文风」，以[核心锚点]为核心，\n用[时间线结构]串联[主要场景类型]，\n以[核心表达手法]、[对话风格]、[心理描写风格]为核心表达，\n摒弃[需规避的风格]，极致还原[目标质感]。\n\n## 底层逻辑\n1. **[第一优先级]优先于[第一劣后项]**：[具体说明]\n2. **[第二优先级]优先于[第二劣后项]**：[具体说明]\n3. **[第三优先级]优先于[第三劣后项]**：[具体说明]\n\n# 叙事节奏与视角控制\n[具体规则]\n\n# 描写规范\n[具体规则]\n\n# 语言风格\n[具体规则]\n\n# 禁区协议\n- ❌ [禁止行为1]：[执行标准]\n- ❌ [禁止行为2]：[执行标准]\n\n&lt;/[题材类型]文风参考书&gt;</code></pre><hr>","subsections":[],"level":2}],"level":1},{"title":"六、状态栏与记忆栏","content":"","subsections":[{"title":"状态栏的作用","content":"<p>状态栏是必需品，作用包括：</p><ul><li>补充说明当前角色状态</li><li>为 user 提供剧情锚点</li><li>引导发现角色的隐藏设定，增强可玩性</li></ul>","subsections":[],"level":2},{"title":"常见状态栏分类","content":"<p><b>角色侧（char）</b></p><ul><li><code>{{char}}</code> 基础状态栏（外貌、穿着、生理状态、心理）</li><li><code>{{char}}</code> 通讯终端（手机、消息记录）</li><li>记忆栏（短期记忆 + 长期记忆归档）</li></ul><p><b>玩家侧（user）</b></p><ul><li><code>{{user}}</code> 状态栏</li><li><code>{{user}}</code> 通讯终端</li></ul><blockquote><p>user 可以通过 <code>$+指令</code> 的方式在游玩中添加自己需要的模块，建议放在面具中持续提醒。</p></blockquote>","subsections":[],"level":2},{"title":"状态栏写法：填充 + 说明双保险","content":"<p>单纯的 <code>[AI填充：xxx]</code> 有时候 AI 不能正确理解，建议「状态栏本体」+「说明书」同时使用。</p><p><b>简单填充写法</b>：</p><pre class=\"code-block\"><code>## {{char}} 状态\n\n**姓名**：[AI填充：{{char}}的姓名]\n**当前状态**：[AI填充：外貌、穿着、生理状态]\n**心理**：[AI填充：当前心理状态，用一句话描述]\n**与 {{user}} 的关系**：[AI填充：当前关系定位]</code></pre><p><b>带说明的进阶写法</b>：</p><pre class=\"code-block\"><code>## 生理指征\n\n- **体力/精力**\n  - 描述：量化角色当前行动力\n  - 动态逻辑：运动/受伤消耗，休息/进食恢复\n  - 阈值：低于 20% 时必须在正文中体现疲惫感\n\n- **健康/外伤**\n  - 无伤显示「健康」\n  - 受伤需具体描述（如：左肩贯穿伤·出血中）</code></pre>","subsections":[],"level":2},{"title":"记忆栏设计","content":"<p>记忆栏是状态栏中最关键的部分，用于解决 AI「失忆」问题。</p>","subsections":[{"title":"核心架构：短期记忆（STM）+ 长期记忆（LTM）","content":"<pre class=\"code-block\"><code>&lt;沉浸式记忆管理&gt;\n\n## 📝 短期记忆流（STM）\n&gt; 每轮实时更新，记录当下的因果逻辑\n\n**Round [当前轮次]**\n- **起**：[本轮事件触发点 / user 的核心行为]\n- **承**：[角色的应对 / 互动发展过程]\n- **转**：[意料之外的变数 / 情感态度转折]\n- **合**：[本轮交互最终结果 / 气氛定调]\n\n---\n\n## 🗂️ 长期记忆库（LTM）\n&gt; 每 10 轮自动归档，提炼关键剧情节点\n\n**[关键事件名 · Round X-Y]**\n[该事件对人物关系或主线剧情产生的深远影响]\n\n---\n\n## 🔗 角色羁绊谱\n- **显性关系**：[当前社会定义的表面身份]\n- **隐性张力**：[台词之下的真实情感流动]\n- **当前状态**：[信任度/好感度，或关键词描述]\n\n&lt;/沉浸式记忆管理&gt;</code></pre>","level":3}],"level":2}],"level":1},{"title":"七、剧情卡","content":"","subsections":[{"title":"剧情触发类型","content":"","subsections":[{"title":"1. 数值触发型","content":"<p>以好感度、等级等数值为触发点，分级展开人物行为和剧情。</p><pre class=\"code-block\"><code>affection_system:\n  level_1:       # 好感 0-20\n    char_behavior: \"保持距离，态度礼貌但冷淡\"\n    unlock_event: null\n    \n  level_2:       # 好感 20-50\n    char_behavior: \"开始主动找话题，偶尔有小动作\"\n    unlock_event: \"雨天送伞事件\"\n    \n  level_3:       # 好感 50-80\n    char_behavior: \"会在 {{user}} 遇到困难时主动出现\"\n    unlock_event: \"告白前夜·独白事件\"\n    \n  level_4:       # 好感 80+\n    char_behavior: \"偶尔会说漏嘴，暴露真实感情\"\n    unlock_event: \"告白事件\"</code></pre>","level":3},{"title":"2. 道具触发型","content":"<p>使用物品栏触发特定剧情分支。</p><p>设置方法：</p><ol><li>在物品栏设置道具</li><li>开启「达到条件后解锁」并填写解锁条件</li><li>在交互编辑的提示词中填写 <code>$+剧情走向引导</code></li><li>可以在「使用后操作」中设置连锁物品添加/删除</li></ol>","level":3},{"title":"3. 节点分线触发型","content":"<p>适合多线剧情，以 <code>【xx线】</code> 区分不同剧情分支。</p><pre class=\"code-block\"><code># 【命运线】\n\n## 触发条件\n当 {{user}} 获得「古老钥匙」道具时解锁\n\n## 剧情内容\n...\n\n---\n\n# 【平凡线】\n\n## 触发条件\n好感度达到 60 且未触发命运线时自动进入\n\n## 剧情内容\n...</code></pre>","level":3}],"level":2},{"title":"剧情的情感发展逻辑（重要）","content":"<p>感情发展有不可跳跃的五个阶段，AI 必须遵守：</p><table><thead><tr><th>阶段</th><th>名称</th><th>特征</th></tr></thead><tbody><tr><td>1</td><td>各自的世界</td><td>陌生人，没有特殊关注</td></tr><tr><td>2</td><td>裂缝</td><td>某个具体事件产生了超出预期的注意</td></tr><tr><td>3</td><td>积累</td><td>多次有实质内容的互动，信任建立</td></tr><tr><td>4</td><td>失衡</td><td>意识到在意程度超出合理范围，第一反应是不安</td></tr><tr><td>5</td><td>确认</td><td>经历挣扎和考验后，才真正承认感情</td></tr></tbody></table><blockquote><p><b>关键原则</b>：真正动人的是那些「没说出口的」、「做了一半收回来的」细节。</p></blockquote>","subsections":[],"level":2},{"title":"剧情卡格式推荐","content":"<table><thead><tr><th>类型</th><th>推荐格式</th></tr></thead><tbody><tr><td>单人单线</td><td>Markdown / YAML</td></tr><tr><td>单人多线</td><td>YAML + Ruby（好感度分级）</td></tr><tr><td>多人单线</td><td>XML（分块隔离各角色线）</td></tr><tr><td>多人多线</td><td>混合格式</td></tr></tbody></table><hr>","subsections":[],"level":2}],"level":1},{"title":"八、模拟器与多人卡","content":"","subsections":[{"title":"模拟器分类","content":"<p><b>1. 有特定世界观的模拟器</b>（现代都市、西方玄幻等）</p><p>构建流程：</p><pre class=\"code-block\"><code>输入题材 → AI 生成世界观初稿 → 精简提炼 → 分层放置</code></pre><p><b>2. 同人 IP 模拟器</b></p><p>由于 token 有限，需要拆分：</p><ul><li><b>人设部分</b>：时代背景（一句话）、机构简介、地图分布</li><li><b>资料库</b>：社会文化细节、机构详细职能、具体地点特色</li></ul><p><b>3. 高自由度随机模拟器</b>（快穿、RPG 等）</p><p>必须明确的要素：</p><ul><li>是否有固定主线</li><li>相关数值体系</li><li>是否需要内置 NPC</li><li>数值动态变化规则</li></ul>","subsections":[],"level":2},{"title":"RPG 模拟器必含要素","content":"<pre class=\"code-block\"><code>力量体系 + 世界规则 + 基础世界书 + 逻辑规则</code></pre><p><b>力量体系示例（元物理常数层）</b>：</p><pre class=\"code-block\"><code>World_Constants:\n  Magic_Density:\n    Range: [0.0, 10.0]\n    Description: \"魔力浓度。0为纯物理世界，10为概念神域\"\n  Tech_Level:\n    Range: [0.0, 10.0]\n    Description: \"科技水平。0为石器时代，10为戴森球\"\n  Entropy_Rate:\n    Range: [0.0, 1.0]\n    Description: \"混乱度。0为乌托邦，1为末日克苏鲁\"</code></pre>","subsections":[],"level":2},{"title":"多人卡的特殊处理","content":"<p>多人卡的核心难点在于<b>角色不串戏</b>和<b>关系网络清晰</b>。</p><pre class=\"code-block\"><code>&lt;角色A·人设&gt;\n...\n$在 [触发条件] 时，由角色A响应，其他角色保持旁观或按自身性格反应\n&lt;/角色A·人设&gt;\n\n&lt;角色B·人设&gt;\n...\n&lt;/角色B·人设&gt;\n\n&lt;群体互动规则&gt;\n- 角色A和角色B的关系：[关系描述]\n- 当 {{user}} 同时与两者互动时：[处理规则]\n- 角色间对话规范：[说明发言顺序或规则]\n&lt;/群体互动规则&gt;</code></pre><hr>","subsections":[],"level":2}],"level":1},{"title":"九、世界书（World Book）与触发机制","content":"","subsections":[{"title":"ST 世界书基础","content":"<p>世界书是 SillyTavern 中最强大的工具之一，通过<b>关键词匹配</b>将设定动态注入上下文，而不是一直占用 token。</p>","subsections":[],"level":2},{"title":"触发类型","content":"<table><thead><tr><th>类型</th><th>说明</th><th>使用场景</th></tr></thead><tbody><tr><td><b>Always On（常驻）</b></td><td>无论何时都在上下文中</td><td>核心世界规则、角色底层设定</td></tr><tr><td><b>单关键词触发</b></td><td>对话中出现指定词才注入</td><td>特定事件、地点、人物的设定</td></tr><tr><td><b>双关键词触发（Secondary Key）</b></td><td>需要两个关键词同时出现</td><td>深层记忆、特殊剧情分支</td></tr><tr><td><b>递归扫描</b></td><td>条目内容本身也被扫描</td><td>构建联想链</td></tr></tbody></table>","subsections":[],"level":2},{"title":"世界书分层设计（推荐）","content":"<pre class=\"code-block\"><code>Layer 1：Always On\n└── 角色核心性格底色\n└── 世界基本运行规则\n\nLayer 2：单关键词触发\n└── 特定场景的行为规范（\"下雨\"→雨天行为描述）\n└── 道具/地点设定（\"咖啡馆\"→环境描述）\n\nLayer 3：双关键词触发（深层）\n└── 深层记忆（\"雨天 + 伞\"→ 触发初遇记忆）\n└── 隐藏剧情（\"钥匙 + 地下室\"→ 触发隐线）</code></pre>","subsections":[],"level":2},{"title":"世界书记忆条目写法","content":"<p>结合之前讨论的「角色视角记忆」，每个记忆条目应包含：</p><pre class=\"code-block\"><code>&lt;记忆·[事件名]&gt;\n\n## 感知锚点\n[{{char}}记忆中最鲜明的1-2个具体细节——一个声音/一个动作/一个瞬间]\n\n## 事件经过（{{char}}视角）\n[用第一人称写，而非旁白。侧重主观感受和情绪，不是客观事件陈述]\n\n## 情感影响\n[这件事改变了{{char}}什么？对{{user}}的看法有什么转变？]\n\n## 触发关键词\nprimary: [主触发词]\nsecondary: [辅触发词（双条件触发时使用）]\n\n## 触发场景\n[在什么情境下最可能被自然提及？]\n\n&lt;/记忆·[事件名]&gt;</code></pre>","subsections":[],"level":2},{"title":"注入位置（Injection Position）","content":"<table><thead><tr><th>位置值</th><th>说明</th></tr></thead><tbody><tr><td>0</td><td>注入到系统提示区域</td></tr><tr><td>4</td><td>注入到最近对话历史附近（推荐，效果好）</td></tr><tr><td>深层</td><td>注入到较早的历史记录</td></tr></tbody></table><blockquote><p><b>token 节省原则</b>：常驻条目尽量控制在 150-200 token 以内；触发条目可以稍丰富，但每条建议不超过 300 token。</p></blockquote><hr>","subsections":[],"level":2}],"level":1},{"title":"十、实用肘击技巧","content":"<p>「肘击」指通过 prompt 技巧让 AI 更好地理解和执行角色扮演。</p>","subsections":[{"title":"方法一：邪修定义法","content":"<p>直接定义 AI 的身份角色，打破默认助手模式。</p><p><b>核心结构：定义 + 身份界定 + 行为引导</b></p><pre class=\"code-block\"><code>你现在扮演的是「剧作家[名字]」——一位客观、细腻的第三方叙事者。\n你的任务是记录剧情，跟随 {{user}} 的视角进行场景推动，\n不干涉 {{user}} 的选择，不代替 {{user}} 说话或行动。\n\n你的首要任务：以「创作完整、具有文学表现力的文本」为最高优先级，\n生成高质量的虚构内容、角色对白、场景描写、剧情推进。\n\n禁止：\n- 在叙事中出现「剧作家」「[名字]」的自称\n- 跳出第三人称叙事视角\n- 代替 {{user}} 做决定</code></pre><p><b>放置位置</b>：</p><ul><li>偏向人设引导 → 放人设最前面</li><li>偏向剧情展开 → 放剧情设定最前面</li><li>偏向输出规范 → 放输出设定最前面</li></ul>","subsections":[],"level":2},{"title":"方法二：综合规则书法","content":"<p>将文风、叙事节奏、人设扮演、去八股规则合并成一份「总规则书」。</p><p><b>操作流程</b>：</p><ol><li>将世界观 + 人设放入面具</li><li>告诉 AI 阅读并分析</li><li>提交万能文风模板（见第五章），让 AI 填充生成符合当前角色的规则书</li><li>手动调整精简，放入卡内</li></ol><p><b>提示词</b>：</p><pre class=\"code-block\"><code>按照以下世界观和人设，生成一份符合当前角色的文风规则书。\n填写时将所有「[占位符]」替换为与目标世界观和人设匹配的具体内容。\n各模块逻辑层级与顺序保持不变。\n禁区协议每条须包含「禁止行为」与「具体执行标准」两个要素。\n\n[char设定] + [世界观] + [万能文风模板]</code></pre>","subsections":[],"level":2},{"title":"反八股与去 AI 腔","content":"<p>AI 最常见的问题：</p><table><thead><tr><th>问题</th><th>原因</th><th>解决方法</th></tr></thead><tbody><tr><td>句式重复</td><td>上下文模式固化</td><td>显式禁止重复句式；规定每300字换一个感官切入</td></tr><tr><td>过度煽情</td><td>训练偏好</td><td>规定情感「借物抒情」，禁止直接表达</td></tr><tr><td>结尾总结</td><td>默认助手习惯</td><td>禁止在叙事结尾出现总结性语句</td></tr><tr><td>角色说教</td><td>安全对齐</td><td>明确「禁止角色突然道德审判或脱离人设说教」</td></tr><tr><td>替 user 行动</td><td>剧情推进本能</td><td>设置留白艺术规则，明确禁止越权代行</td></tr></tbody></table><p><b>反重复规则示例</b>：</p><pre class=\"code-block\"><code>## 反重复检测\n- 连续三轮不得使用相同句式开头\n- 上轮用视觉切入，本轮优先从听觉/触觉切入\n- 禁用高频词：微微、轻轻、淡淡、默默（每万字不超过5次）\n- 变体也算重复：「微微」和「略微」视为同一词</code></pre>","subsections":[],"level":2},{"title":"<code>$</code> 指令系统","content":"<p><code>$</code> 是 ST 中的强制触发前缀，可用于：</p><table><thead><tr><th>用途</th><th>示例</th></tr></thead><tbody><tr><td>触发特定状态</td><td><code>$总结记忆</code></td></tr><tr><td>切换场景</td><td><code>$快进到三天后</code></td></tr><tr><td>强制角色行为</td><td><code>$角色A主动开口</code></td></tr><tr><td>调整输出格式</td><td><code>$在末尾附加状态栏</code></td></tr></tbody></table><hr>","subsections":[],"level":2}],"level":1},{"title":"十一、常见问题与注意事项","content":"","subsections":[{"title":"Q：AI 一直忘记之前的剧情怎么办？","content":"<ul><li>启用状态栏的 STM + LTM 记忆架构</li><li>配合世界书的关键词触发记忆条目</li><li>每隔 10 轮用 <code>$总结记忆</code> 手动触发归档</li><li>记忆条目写「char视角」而不是「事件陈述」</li></ul>","subsections":[],"level":2},{"title":"Q：角色扮演太出戏/AI腔太重怎么办？","content":"<ul><li>检查人设中是否有具体的「语言指纹」设定</li><li>加入「禁止出现 XX 词语」的负面约束</li><li>添加文风参考书，给 AI 明确的写作锚点</li></ul>","subsections":[],"level":2},{"title":"Q：多人卡角色总是串戏怎么办？","content":"<ul><li>每个角色用独立 XML 标签包裹</li><li>在触发词中加入角色名前缀做区分</li><li>添加「角色互动规则」明确发言顺序</li><li>避免多个角色共用同一套描写词汇</li></ul>","subsections":[],"level":2},{"title":"Q：token 不够用怎么办？","content":"<ul><li>核心设定放人设，细节放世界书（按需注入）</li><li>常驻世界书条目控制在 200 token 以内</li><li>使用 Always On 的内容务必做精简</li><li>资料库用于放置「背景参考」类内容</li></ul>","subsections":[],"level":2},{"title":"Q：好感度/数值总是不按规则变化怎么办？","content":"<ul><li>在人设中明确写出数值变化的<b>具体触发条件</b>，而非模糊描述</li><li>在状态栏说明书中加入「数值变化规则」</li><li>每次关键事件发生后用 <code>$计算好感度变化</code> 强制触发</li></ul>","subsections":[],"level":2},{"title":"写卡前的检查清单","content":"<p>在完成卡的编写后，对照以下清单：</p><ul><li>[ ] 人设是否包含「性格成因」，而不只是性格标签</li><li>[ ] 是否有明确的「语言指纹」（说话方式）</li><li>[ ] 世界观是否涵盖时代背景和核心规则</li><li>[ ] 文风参考书是否有「禁区协议」</li><li>[ ] 状态栏是否有说明书，而不只是空白标签</li><li>[ ] 记忆栏是否配置了 STM + LTM 的执行逻辑</li><li>[ ] 剧情触发条件是否明确，不会产生歧义</li><li>[ ] 是否有留白艺术规则，防止 AI 替 user 行动</li><li>[ ] 是否有反重复规则，防止 AI 腔固化</li></ul><hr><p><i>教程持续更新中。如有问题欢迎交流，禁止拉踩。</i></p>","subsections":[],"level":2}],"level":1}]}};
