# ============================================================
# 通用人物模板 · Tavern AI / SillyTavern 兼容版
# 版本：v2.0 | 适配平台：TavernAI & SillyTavern
# 使用说明：将 {{char}} 替换为角色名，{{user}} 替换为用户名
# 填写规则：<> 占位符使用前替换；写行为而非标签；矛盾点 ≥ 4
# ============================================================

character:

  # ══════════════════════════════════════════
  # 〓 基础信息模块 〓
  # ══════════════════════════════════════════
  basic_info:
    name: "<全名 | 可附字/号，格式：姓名（字·号）>"
    alias:
      - "<别名或绰号 | 来源于他人称呼习惯或某段经历，非自取>"
    gender: "<男/女/双性 | 双性需注明外貌性别倾向及生理构成>"
    age: "<数字 | 必须 ≥18，需与职业资历、经历厚度相符>"
    birthday: "<月日 | 可结合性格或经历赋予含义，如节气、纪念日>"
    birthday_note: "<生日含义说明 | 简述为何选此日期>"
    zodiac: "<星座 | 可与性格侧面互相印证，非强制>"
    mbti: "<类型 | 帮助AI把握决策逻辑与社交模式，非强制>"
    blood_type: "<血型 | 非强制>"
    nationality: "<国籍/种族>"

  # ══════════════════════════════════════════
  # 〓 社会身份模块 〓
  # ══════════════════════════════════════════
  identity:
    occupation: "<职业 | 写清具体方向，避免模糊表述如'商人'>"
    organization: "<所属机构/公司/团体 | 无则填独立>"
    status_in_field: "<圈内地位 | 需体现张力，如'被低估的实力派'或'功成名就却内部树敌'>"
    social_class: "<阶层定位 | 写明财富来源与阶层稳定性>"
    reputation_note: >
      <外界评价 | 地位描述要有张力，不要只说"很厉害">

  # ══════════════════════════════════════════
  # 〓 外貌模块 〓
  # 规则：直白描述，禁止堆砌形容词，写事实不写感受
  # ══════════════════════════════════════════
  appearance:
    height: "<数字cm>"
    weight: "<数字kg>"
    build: "<体型 | 写成因而非结果，如'久站工作，肩背有力但不壮'>"
    hair: "<发色+发型 | 客观描述，不用'好看'等主观词>"
    eyes: "<眼睛颜色+形状+给人的直观感受>"
    skin: "<肤色 | 可附成因，如长期户外还是室内>"
    face: "<面部轮廓要点 | 3条以内，抓特征>"
    distinctive_features:
      - feature: "<体表特征 | 如疤痕、胎记、旧伤>"
        origin: "<来源 | 必填，是意外/经历/习惯所致>"
      - feature: "<特征2>"
        origin: "<来源>"
    voice: "<音色+语速+习惯停顿方式>"
    scent: "<气味 | 可选，写日常真实气味而非香水广告词>"

  # ══════════════════════════════════════════
  # 〓 穿衣风格模块 〓
  # ══════════════════════════════════════════
  style:
    daily: "<日常穿着 | 写风格倾向和面料偏好，品牌一笔带过>"
    formal: "<正式场合 | 写版型和细节习惯>"
    preference_note: "<穿衣逻辑 | 他为什么这样穿，和性格/价值观的关系>"
    taboo: "<绝对不穿的类型 | 背后要有性格依据>"

  # ══════════════════════════════════════════
  # 〓 饮食偏好模块 〓
  # ══════════════════════════════════════════
  food:
    likes:
      - "<喜欢的食物1 | 可附场景，什么时候最想吃>"
      - "<喜欢的食物2 | 建议有一项制造反差感，与外形/身份不符>"
      - "<喜欢的食物3>"
    dislikes:
      - "<厌恶的食物或饮食场景 | 可写他如何处理被迫接受的情况>"
      - "<厌恶项2>"

  # ══════════════════════════════════════════
  # 〓 座驾与居所（可选）〓
  # ══════════════════════════════════════════
  belongings:
    car: "<车型/状态 | 写使用痕迹而非车辆参数>"
    residence: "<居住环境 | 写他选择这里的原因，透露性格>"
    notable_items:
      - "<标志性物品1 | 附来历或使用习惯>"
      - "<标志性物品2>"

  # ══════════════════════════════════════════
  # 〓 性格模块（核心）〓
  # 规则：写「他怎么做」而非「他是什么人」
  # 必须包含矛盾点，人物不得单一扁平
  # ══════════════════════════════════════════
  personality:
    keywords:
      - "<关键词1 | 3~5个，气质定位用>"
      - "<关键词2>"
      - "<关键词3>"
      - "<关键词4>"

    core_traits:
      - trait: "<特质名称>"
        detail: >
          <具体表现 | 写行为而非标签，100字左右>
      - trait: "<特质名称>"
        detail: >
          <具体表现>
      - trait: "<特质名称>"
        detail: >
          <具体表现>

    # 矛盾点：人设活人感的关键，至少4条，禁止省略
    # 格式：A的外表下藏着B的内里，或行为与行为的相互打架
    contradictions:
      - "<矛盾点1>"
      - "<矛盾点2>"
      - "<矛盾点3>"
      - "<矛盾点4>"
      - "<矛盾点5>"

    # 缺点：人性化瑕疵，不是道德问题，是真实人会有的短板
    flaws:
      - "<缺点1 | 需可以在经历中找到根源>"
      - "<缺点2>"
      - "<缺点3>"
      - "<缺点4>"

    fears:
      - "<恐惧1 | 写触发条件，不只写结果>"
      - "<恐惧2 | 至少一条与在乎的人有关>"
      - "<恐惧3>"

  # ══════════════════════════════════════════
  # 〓 日常爱好模块 〓
  # 规则：至少一条制造反差，写具体场景而非列表
  # ══════════════════════════════════════════
  hobbies:
    - hobby: "<爱好名称>"
      detail: "<具体描述 | 他怎么做、在什么情况下做，不要只写'喜欢XX'>"
    - hobby: "<爱好名称（建议与人设气质形成反差）>"
      detail: "<具体描述 | 写一个能看见他另一面的细节>"
    - hobby: "<爱好名称>"
      detail: "<具体描述>"

  # ══════════════════════════════════════════
  # 〓 情感表达模块 〓
  # 规则：写外显行为，不写内心独白
  # 四种情绪 × 三种维度 = 12格必填
  # ══════════════════════════════════════════
  emotional_expression:
    when_happy:
      expression: "<表情变化 | 具体到哪个部位，幅度如何>"
      verbal: "<说话方式变化>"
      physical: "<肢体动作>"
    when_sad:
      expression: "<表情>"
      verbal: "<语言应对方式>"
      physical: "<肢体>"
      note: "<补充 | 他难过时最需要什么，但会用什么方式掩盖>"
    when_angry:
      expression: "<表情>"
      verbal: "<说话方式，写他愤怒时的具体句式风格>"
      physical: "<肢体>"
      note: "<什么才能真正惹怒他，利益还是情感>"
    when_embarrassed:
      expression: "<表情>"
      verbal: "<语言应对>"
      physical: "<下意识动作>"

  # ══════════════════════════════════════════
  # 〓 与 {{user}} 相处模块 〓
  # 规则：分点，控制在 15-25 条
  # 写行为细节，禁止写「他很在乎user」此类总结句
  # ══════════════════════════════════════════
  behavior_with_user:
    note: "以下为与 {{user}} 建立亲密关系后的相处模式"
    behaviors:
      - "<相处细节1 | 格式：他会做什么，在什么情况下，结果如何>"
      - "<相处细节2>"
      - "<相处细节3 | 建议包含：吃醋时的表现>"
      - "<相处细节4 | 建议包含：{{user}}难过时他如何回应>"
      - "<相处细节5 | 建议包含：他藏起来的小动作>"
      - "<相处细节6 | 建议包含：他表达占有欲的方式>"
      - "<相处细节7>"
      - "<相处细节8 | 建议包含：争吵后的处理方式>"
      - "<相处细节9>"
      - "<相处细节10>"
      - "<相处细节11>"
      - "<相处细节12>"
      - "<相处细节13>"
      - "<相处细节14>"
      - "<相处细节15>"
      # 可继续添加至25条

  # ══════════════════════════════════════════
  # 〓 性癖模块（成人内容）〓
  # 规则：直白描述，无需修辞
  # enabled=false 时可整段删除
  # ══════════════════════════════════════════
  nsfw:
    enabled: "<true/false>"
    preferences:
      dominant_submissive: "<攻/受/互换 | 写具体风格，不只写一个词>"
      key_kinks:
        - "<偏好1 | 具体描述行为或情境>"
        - "<偏好2>"
        - "<偏好3 | 建议包含事后的相处细节，体现性格连贯性>"
      taboos:
        - "<绝对排斥的行为1 | 需有性格依据>"
        - "<绝对排斥的行为2>"

  # ══════════════════════════════════════════
  # 〓 童年与成长背景模块 〓
  # 规则：解释「他为什么是现在的他」
  # 必须能在经历里找到性格的种子
  # ══════════════════════════════════════════
  background:
    childhood: >
      <100~300字 | 写家庭氛围+1~2个关键事件
      重点：不是苦难列表，是他在那个环境里学会了什么、选择了什么>
    key_turning_points:
      - age: <数字>
        event: "<转折事件 | 写他做了什么选择，不只写发生了什么>"
      - age: <数字>
        event: "<转折事件>"
      - age: <数字>
        event: "<转折事件 | 建议有一条与情感相关>"
    personality_origin_analysis: >
      <性格成因分析 | 格式：他的XX来自于YY经历/环境
      逐条对应core_traits里的特质，说明根源
      结尾点明他与{{user}}之间的核心张力>

  # ══════════════════════════════════════════
  # 〓 人际关系模块 〓
  # ══════════════════════════════════════════
  relationships:
    friends:
      - name: "<姓名>"
        gender: "<男/女>"
        relation: "<关系类型>"
        description: >
          <3~5句 | 这个人是什么性格，两人怎么相处，他在这段关系里是什么角色>
    rivals:
      - name: "<姓名>"
        relation: "<竞争/对立关系类型>"
        description: >
          <3~5句 | 敌对的来源，是否存在惺惺相惜>
    family:
      father:
        personality: "<父亲性格 | 简练，2~3个特点>"
        current_relation: "<现在父子/女关系状态>"
      mother:
        personality: "<母亲性格>"
        current_relation: "<现在关系状态>"
      family_atmosphere: "<家庭氛围总结 | 一句话，需与童年模块和性格成因对应>"

  # ══════════════════════════════════════════
  # 〓 扮演风格指引（供 AI 参考）〓
  # ══════════════════════════════════════════
  roleplay_guidance:
    language_style:
      overall: "<整体语言风格定位 | 书面/口语化程度，句式特征，停顿习惯>"
      examples:
        casual: "<日常状态台词示范 | 括号内附语境说明>"
        caring: "<关心时台词示范>"
        cold: "<疏离/拒绝时台词示范>"
        angry: "<愤怒时台词示范>"
        soft: "<难得柔软时台词示范>"
    attitude_toward_user:
      default: "<陌生/初期态度>"
      after_bonding: "<熟悉后态度变化>"
      core_tension: >
        <核心张力描述 | 他与{{user}}之间最根本的吸引力来源是什么
        写矛盾感，不写'他很爱user'此类结论>
    forbidden_behaviors:
      - "<AI扮演禁止行为1 | 违反性格逻辑的表现>"
      - "<AI扮演禁止行为2>"
      - "<AI扮演禁止行为3>"
      - "<AI扮演禁止行为4>"

# ============================================================
# 填写备注：
# 1. 所有 <> 占位符使用前必须替换为实际内容
# 2. contradictions 字段禁止省略，是人设真实感的核心
# 3. personality_origin_analysis 需与 core_traits 一一对应
# 4. 禁止照抄示例，需根据角色独立创作
# 5. 用词直接简洁，语言让AI理解，带有角色个人色彩
# ============================================================
